<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="SpendWise"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#09090f"/>
<meta name="description" content="SpendWise — Complete Personal Finance OS"/>
<title>SpendWise — Finance OS</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090f;--bg2:#0f0f1a;--card:#13132a;--card2:#1a1a30;
  --border:#ffffff0d;--b2:#ffffff16;--b3:#ffffff24;
  --ac:#6c63ff;--ac2:#a78bfa;
  --g:#10d9a0;--r:#ff4d6d;--am:#f59e0b;--bl:#38bdf8;--pk:#ec4899;
  --t:#eeeeff;--t2:#9090b8;--t3:#50507a;
  --fd:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--fm:'JetBrains Mono',monospace;
  --rr:11px;--r2:18px;
}
html{font-size:16px;-webkit-tap-highlight-color:transparent;scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--bg);color:var(--t);min-height:100dvh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 50% at 15% 0%,#6c63ff11,transparent 60%),
             radial-gradient(ellipse 50% 40% at 85% 100%,#10d9a00d,transparent 60%)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#ffffff15;border-radius:2px}

/* LOCK */
#lock{position:fixed;inset:0;z-index:9999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.ll{font-family:var(--fd);font-size:1.8rem;font-weight:800;letter-spacing:-1px;
  background:linear-gradient(135deg,var(--ac),var(--ac2),var(--g));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ls{color:var(--t3);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase}
.pd{display:flex;gap:10px}
.pdd{width:11px;height:11px;border-radius:50%;border:2px solid var(--b2);transition:.2s}
.pdd.on{background:var(--ac);border-color:var(--ac);box-shadow:0 0 10px var(--ac)}
.ppad{display:grid;grid-template-columns:repeat(3,64px);gap:8px}
.pb{width:64px;height:64px;border-radius:50%;border:1px solid var(--b2);background:var(--card);
  color:var(--t);font-family:var(--fd);font-size:1.2rem;font-weight:600;
  cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center}
.pb:active{background:var(--ac);transform:scale(.91)}
.pb.z{grid-column:2}.pb.dl{grid-column:3;font-size:.85rem;color:var(--t2)}
.ph{color:var(--t3);font-size:.68rem}.pe{color:var(--r);animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* APP SHELL */
#app{display:none;flex-direction:column;min-height:100dvh;position:relative;z-index:1}
.topbar{padding:12px 13px 0;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;background:linear-gradient(to bottom,var(--bg) 80%,transparent)}
.tl{font-family:var(--fd);font-size:1.1rem;font-weight:800;
  background:linear-gradient(135deg,var(--ac),var(--ac2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tm{display:flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border);
  border-radius:28px;padding:5px 10px;cursor:pointer;font-size:.76rem;color:var(--t2)}
.tbb{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);
  background:var(--card);color:var(--t2);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.85rem;transition:.15s;position:relative}
.tbb:active{background:var(--card2)}
.tbb .badge-dot{position:absolute;top:2px;right:2px;width:7px;height:7px;
  border-radius:50%;background:var(--r);border:1px solid var(--bg)}

/* PAGES */
.pg{display:none}.pg.on{display:block}
.cnt{padding:12px 12px 90px;display:flex;flex-direction:column;gap:13px}

/* HERO */
.hero{background:linear-gradient(135deg,#15163a 0%,#0f182e 55%,#0a1220 100%);
  border:1px solid var(--b2);border-radius:var(--r2);padding:18px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-24px;right:-24px;width:120px;height:120px;
  border-radius:50%;background:radial-gradient(#6c63ff18,transparent 70%);pointer-events:none}
.hl{color:var(--t3);font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px}
.ha{font-family:var(--fd);font-size:2rem;font-weight:800;letter-spacing:-2px;line-height:1}
.ha .rr{font-size:1.3rem;font-weight:400;color:var(--t2)}
.ht{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-top:4px;font-size:.73rem;color:var(--t2)}
.up{color:var(--g)}.dn{color:var(--r)}
.hs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:13px}
.hsi{background:#ffffff05;border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;transition:.15s}
.hsi:active{background:#ffffff0a}
.hsil{font-size:.55rem;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.hsiv{font-family:var(--fm);font-size:.78rem;font-weight:500}

/* NOTICE BANNERS */
.notice{border-radius:11px;padding:10px 12px;display:flex;align-items:flex-start;gap:8px;font-size:.76rem;line-height:1.5}
.notice.am{background:#f59e0b0d;border:1px solid #f59e0b26}
.notice.g{background:#10d9a00d;border:1px solid #10d9a026}
.notice.bl{background:#38bdf80d;border:1px solid #38bdf826}
.notice.r{background:#ff4d6d0d;border:1px solid #ff4d6d26}
.notice strong{color:var(--t);font-weight:600}

/* ACCOUNTS STRIP */
.astrip{display:flex;gap:8px;overflow-x:auto;padding-bottom:3px;scroll-snap-type:x mandatory}
.astrip::-webkit-scrollbar{height:0}
.achip{min-width:145px;scroll-snap-align:start;background:var(--card);border:1px solid var(--border);
  border-radius:13px;padding:11px;flex-shrink:0;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.achip.low{border-color:#f59e0b40}
.acb{font-size:.6rem;color:var(--t3);text-transform:uppercase;letter-spacing:.09em}
.acn{font-size:.82rem;font-weight:500;margin:2px 0}
.aca{font-family:var(--fm);font-size:.98rem;font-weight:500;color:var(--g)}
.act{display:inline-block;font-size:.58rem;background:var(--ac)16;color:var(--ac2);padding:2px 6px;border-radius:20px;margin-top:3px}
.aadd{min-width:95px;scroll-snap-align:start;background:transparent;border:1px dashed var(--b2);
  border-radius:13px;padding:11px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:4px;cursor:pointer;flex-shrink:0;color:var(--t3);font-size:.68rem;transition:.2s}
.aadd:hover{border-color:var(--ac);color:var(--ac)}

/* QUICK ACTIONS */
.qg{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.qb{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:.18s}
.qb:active{transform:scale(.94);background:var(--card2)}
.qi{font-size:1.15rem}.ql{font-size:.59rem;color:var(--t2);text-align:center;font-weight:500}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:15px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.st{font-family:var(--fd);font-size:.88rem;font-weight:700}
.sa{color:var(--ac);font-size:.72rem;cursor:pointer}

/* CHART */
.cbr{display:flex;align-items:flex-end;gap:4px;height:72px;padding:2px 0}
.bw{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.bar{width:100%;border-radius:3px 3px 0 0;background:linear-gradient(to top,var(--ac),var(--ac2));transition:height .4s ease;min-height:2px}
.bw.cur .bar{background:linear-gradient(to top,var(--g),#34d399)}
.bl2{font-size:.52rem;color:var(--t3)}.bamt{font-size:.46rem;color:var(--t2);font-family:var(--fm)}

/* TRANSACTIONS */
.txl{display:flex;flex-direction:column;gap:5px}
.txi{display:flex;align-items:center;gap:8px;padding:9px 10px;background:var(--card2);border-radius:var(--rr);border:1px solid var(--border);cursor:pointer;transition:.15s}
.txi:active{background:var(--card)}
.tico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.tico.sp{background:#ff4d6d12}.tico.sv{background:#10d9a012}.tico.em{background:#6c63ff12}.tico.cr{background:#10d9a012}.tico.cc{background:#f59e0b12}
.txn{font-size:.8rem;font-weight:500}.txs{font-size:.62rem;color:var(--t3);margin-top:1px}
.txa{font-family:var(--fm);font-size:.84rem;font-weight:500;white-space:nowrap}
.txa.db{color:var(--r)}.txa.cb{color:var(--g)}

/* EMI */
.eil{display:flex;flex-direction:column;gap:7px}
.ei{background:var(--card2);border:1px solid var(--border);border-radius:var(--rr);
  padding:11px 12px;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden;transition:.15s}
.ei::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(to bottom,var(--ac),var(--ac2));border-radius:2px 0 0 2px}
.ei.cl::before{background:linear-gradient(to bottom,var(--am),#fcd34d)}
.ei.paid-ei::before{background:linear-gradient(to bottom,var(--g),#34d399)}
.ei.paid-ei{opacity:.7}
.eii{font-size:1.1rem;flex-shrink:0}
.ein{flex:1;min-width:0}
.enn{font-size:.82rem;font-weight:500}
.enm{font-size:.62rem;color:var(--t3);margin-top:1px}
.ep{height:3px;background:var(--b2);border-radius:2px;margin-top:5px}
.ebar{height:100%;border-radius:2px;background:linear-gradient(to right,var(--ac),var(--ac2))}
.eir{text-align:right;flex-shrink:0}
.eia{font-family:var(--fm);font-size:.9rem;font-weight:500;color:var(--am)}
.eil2{font-size:.6rem;color:var(--t3);margin-top:2px}
.paybtn{font-size:.6rem;background:var(--ac)18;color:var(--ac2);border:1px solid var(--ac)36;
  border-radius:20px;padding:3px 8px;cursor:pointer;margin-top:3px;display:inline-block;transition:.15s}
.paybtn:active{background:var(--ac);color:#fff}
.paybtn.paid{background:var(--g)18;color:var(--g);border-color:var(--g)36}
.emi-status-badge{font-size:.58rem;padding:2px 7px;border-radius:20px;font-weight:600;display:inline-block;margin-top:3px}
.emi-status-badge.pending{background:#f59e0b18;color:var(--am)}
.emi-status-badge.paid{background:#10d9a018;color:var(--g)}
.emi-status-badge.partial{background:#38bdf818;color:var(--bl)}
.emi-status-badge.skipped{background:#ff4d6d18;color:var(--r)}

/* INVESTMENTS */
.invg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.invc{background:var(--card2);border:1px solid var(--border);border-radius:var(--rr);padding:11px;cursor:pointer;transition:.15s}
.invc:active{background:var(--card)}
.invt{font-size:.6rem;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.invn{font-size:.8rem;font-weight:500;margin:3px 0 2px}
.inva{font-family:var(--fm);font-size:.92rem;color:var(--g);font-weight:500}
.invr{font-size:.62rem;color:var(--ac2);margin-top:2px}

/* PROGRESS BAR */
.pb2{height:6px;background:var(--b2);border-radius:4px;margin-top:5px;overflow:hidden}
.pf{height:100%;border-radius:4px;transition:width .5s ease}
.pf.g{background:linear-gradient(to right,var(--g),#34d399)}.pf.a{background:linear-gradient(to right,var(--am),#fcd34d)}
.pf.r{background:linear-gradient(to right,var(--r),#f87171)}.pf.bl{background:linear-gradient(to right,var(--bl),#7dd3fc)}
.pf.pk{background:linear-gradient(to right,var(--pk),#f472b6)}

/* BADGE */
.bdg{display:inline-flex;align-items:center;font-size:.6rem;padding:2px 7px;border-radius:20px;font-weight:600}
.bdg.g{background:#10d9a014;color:var(--g)}.bdg.r{background:#ff4d6d14;color:var(--r)}
.bdg.a{background:#f59e0b14;color:var(--am)}.bdg.bl{background:#38bdf814;color:var(--bl)}
.bdg.p{background:#6c63ff14;color:var(--ac2)}.bdg.pk{background:#ec489914;color:var(--pk)}

/* ADVISER */
.advc{background:linear-gradient(135deg,#181e3a,#0f1628);border:1px solid #6c63ff22;
  border-radius:var(--r2);padding:15px;position:relative;overflow:hidden}
.advc::before{content:'';position:absolute;top:-16px;right:-16px;width:80px;height:80px;
  border-radius:50%;background:radial-gradient(#6c63ff22,transparent 70%)}
.advh{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.advav{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));
  display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.advn{font-family:var(--fd);font-size:.9rem;font-weight:700}
.advst{font-size:.62rem;color:var(--g);display:flex;align-items:center;gap:3px}
.advst::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--g);display:inline-block}
.insl{display:flex;flex-direction:column;gap:7px}
.ins{background:#ffffff04;border-radius:8px;padding:10px;font-size:.76rem;line-height:1.55;color:var(--t2);border-left:2px solid var(--ac)}
.ins.w{border-color:var(--am);background:#f59e0b04}.ins.ok{border-color:var(--g);background:#10d9a004}
.ins.tip{border-color:var(--bl);background:#38bdf804}
.ins strong{color:var(--t);font-weight:500}
.askrow{display:flex;gap:6px;margin-top:10px}
.askin{flex:1;background:#ffffff06;border:1px solid var(--b2);border-radius:26px;
  padding:8px 12px;color:var(--t);font-family:var(--fb);font-size:.79rem;outline:none;transition:.2s}
.askin:focus{border-color:var(--ac)}.askin::placeholder{color:var(--t3)}
.askgo{background:var(--ac);border:none;border-radius:26px;padding:8px 14px;
  color:#fff;font-weight:600;font-size:.79rem;cursor:pointer;white-space:nowrap;transition:.2s}
.askgo:active{transform:scale(.95)}
.typ{display:flex;align-items:center;gap:3px;padding:6px 0}
.tyd{width:5px;height:5px;border-radius:50%;background:var(--ac2);animation:tyd 1.2s infinite}
.tyd:nth-child(2){animation-delay:.2s}.tyd:nth-child(3){animation-delay:.4s}
@keyframes tyd{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--bg2);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:5px 0 calc(6px + env(safe-area-inset-bottom))}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:5px 0;position:relative}
.niic{font-size:1.05rem;transition:.15s}.nilb{font-size:.57rem;color:var(--t3);font-weight:500}
.ni.on .nilb{color:var(--ac)}.ni.on .niic{transform:translateY(-2px)}
.ni.on::after{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:18px;height:2px;background:var(--ac);border-radius:0 0 2px 2px}
.nadd{width:46px;height:46px;border-radius:50%;margin:0 3px;flex-shrink:0;
  background:linear-gradient(135deg,var(--ac),var(--ac2));
  display:flex;align-items:center;justify-content:center;font-size:1.25rem;
  box-shadow:0 4px 16px #6c63ff45;cursor:pointer;transition:.18s}
.nadd:active{transform:scale(.91)}

/* MODALS */
.ov{position:fixed;inset:0;z-index:500;background:#00000085;display:flex;align-items:flex-end;
  justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.ov.on{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border-radius:18px 18px 0 0;border:1px solid var(--border);border-bottom:none;
  width:100%;max-width:520px;transform:translateY(100%);transition:transform .26s cubic-bezier(.34,1.56,.64,1);max-height:92dvh;overflow-y:auto}
.ov.on .modal{transform:translateY(0)}
.mh{width:34px;height:3px;background:var(--b2);border-radius:2px;margin:8px auto 0}
.mhd{padding:14px 14px 0;display:flex;align-items:center;justify-content:space-between}
.mt{font-family:var(--fd);font-size:.95rem;font-weight:700}
.mc{width:26px;height:26px;border-radius:50%;background:var(--card2);border:none;color:var(--t2);font-size:.88rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mb{padding:14px}

/* FORMS */
.fg{margin-bottom:12px}
.fl{font-size:.7rem;color:var(--t2);margin-bottom:4px;display:block;font-weight:500}
.fi,.fs{width:100%;background:var(--card);border:1px solid var(--b2);border-radius:var(--rr);
  padding:10px 11px;color:var(--t);font-family:var(--fb);font-size:.84rem;outline:none;transition:.2s;appearance:none;-webkit-appearance:none}
.fi:focus,.fs:focus{border-color:var(--ac)}.fs option{background:var(--card2);color:var(--t)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fhint{font-size:.63rem;color:var(--t3);margin-top:3px}
.sbtn{width:100%;padding:12px;border-radius:var(--rr);border:none;
  background:linear-gradient(135deg,var(--ac),var(--ac2));
  color:#fff;font-family:var(--fd);font-size:.88rem;font-weight:700;cursor:pointer;transition:.15s;letter-spacing:.02em}
.sbtn:active{transform:scale(.98)}.sbtn:disabled{opacity:.5;cursor:not-allowed}
.sbtn.sec{background:var(--card2);border:1px solid var(--b2);color:var(--t2)}
.sbtn.danger{background:transparent;border:1px solid var(--r);color:var(--r)}
.sbtn.sm{padding:8px;font-size:.78rem}
.tabrow{display:flex;background:var(--card);border-radius:9px;padding:3px;gap:3px;margin-bottom:14px}
.tab{flex:1;padding:7px;border-radius:6px;border:none;background:transparent;
  color:var(--t2);font-size:.78rem;font-weight:500;cursor:pointer;transition:.15s;font-family:var(--fb)}
.tab.on{background:var(--ac);color:#fff}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:.74rem}
.tbl th{text-align:left;padding:6px 7px;color:var(--t3);font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);font-weight:500}
.tbl td{padding:6px 7px;border-bottom:1px solid var(--border);color:var(--t2)}
.tbl tr:last-child td{border:none}
.tbl .mn{color:var(--t);font-family:var(--fm);font-size:.74rem}
.tbl tr.hilite td{background:var(--card2)}

/* CC CARDS */
.cc-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:3px;scroll-snap-type:x mandatory}
.cc-strip::-webkit-scrollbar{height:0}
.ccc{min-width:175px;scroll-snap-align:start;border-radius:14px;padding:13px;flex-shrink:0;cursor:pointer;transition:.2s;position:relative;overflow:hidden;border:1px solid var(--b2)}
.ccc.warn{border-color:#ff4d6d50!important}
.ccbn{font-size:.58rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.1em}
.ccn{font-size:.88rem;font-weight:700;margin:3px 0;color:#fff}
.cco{font-family:var(--fm);font-size:1.05rem;font-weight:600;color:#fff}
.ccl{font-size:.62rem;color:rgba(255,255,255,.6);margin-top:2px}
.cc-util-bar{height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin-top:7px;overflow:hidden}
.cc-util-fill{height:100%;border-radius:2px;transition:width .4s ease}
.ccduerow{display:flex;justify-content:space-between;font-size:.6rem;color:rgba(255,255,255,.5);margin-top:5px}
.cc-pay-btn{font-size:.6rem;background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.3);
  border-radius:20px;padding:3px 9px;cursor:pointer;margin-top:5px;display:inline-block;transition:.15s}
.cc-pay-btn:active{background:rgba(255,255,255,.35)}

/* UPCOMING / DUE WIDGET */
.due-list{display:flex;flex-direction:column;gap:6px}

<script>
// ══════════════════════════════════════════════════════════
//  STATE & DATA SCHEMA
// ══════════════════════════════════════════════════════════
const D = {
  pin: '1234',
  sel: null,
  data: {
    accounts: [],
    // {id,name,bank,type,balance,alert}
    expenses: [],
    // {id,date,category,desc,amount,accountId,ccId,payMethod,note,recurring}
    incomes: [],
    // {id,date,forMonth,type,amount,accountId,note} — itemized income ledger; type='Salary' is the main income
    emis: [],
    // {id,name,principal,monthly,dueDay,remaining,total,interest,type,accountId,lender,startYM,
    //  payHistory:{YYYY-MM:{status,paidAmt,paidDate,note}}}
    investments: [],
    // {id,name,type,principal,interest,startDate,maturityDate,sip,sipAccountId,currentValue,declaredMaturity}
    ccCards: [],
    // {id,name,bank,limit,billDay,dueDay,outstanding,color,interest,minDuePct,active}
    ccSpends: [],
    // {id,cardId,expenseId,date,desc,amount,category}
    ccPayments: [],
    // {id,cardId,amount,date,accountId,payType,note}
    chits: [],
    // {id,name,monthly,months,startDate,nextDue,totalExpected,actualReceived,status,accountId,payouts[],
    //  contribHistory:{YYYY-MM:{status,paidAmt,paidDate,note}}} — payouts=money chit gives you, contribHistory=your monthly payments into it
    budgets: [],
    // {id,category,amount,month}  month='YYYY-MM'
    transactions: [],
    // {id,accountId,type:'cr'|'dr',amount,desc,date}
    people: [],
    // {id,name,color}  -- friends/family who use your cards or borrow money
    friendTxns: [],
    // {id,personId,type:'lent'|'returned',amount,date,note,method,expenseId,accountId}
    defaultIncome: 0,
    budgetIncome: {},
    incomeByType: {},
    // {YYYY-MM:{Salary:n,Freelance:n,Bonus:n,...}}
    lastBackupAt: null,
    netWorthSnapshots: {},
    // {YYYY-MM: value} — auto-recorded each time the app is opened in that month
    settings: { pin:'1234', activationMonth: null, theme:'dark' }
  }
};

// ══════════════════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════════════════
const MN  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MS  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const td  = () => new Date().toISOString().split('T')[0];
const mk  = (y, m) => `${y}-${String(m+1).padStart(2,'0')}`;
const mkp = s => { const [y,m]=s.split('-'); return {y:+y, m:+m-1}; };
const fmt = n => '₹' + Math.abs(n||0).toLocaleString('en-IN',{maximumFractionDigits:0});
const fmtFull = n => '₹' + (n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
const pct = (a,b) => b>0 ? Math.min(100,Math.max(0,(a/b)*100)) : 0;
const accById  = id => D.data.accounts.find(a=>a.id===id);
const ccById   = id => D.data.ccCards.find(c=>c.id===id);
const chitById = id => D.data.chits.find(c=>c.id===id);
const invById  = id => D.data.investments.find(i=>i.id===id);
const emiById  = id => D.data.emis.find(e=>e.id===id);
const expById  = id => D.data.expenses.find(e=>e.id===id);
const personById = id => D.data.people.find(p=>p.id===id);
function splitBadge(item) {
  if(item.personId){ const p=personById(item.personId); return p?` <span style="color:var(--ac)">· 👤 ${p.name}</span>`:''; }
  if(item.splitWith&&item.splitWith.length){
    const names=item.splitWith.map(id=>(personById(id)||{}).name||'?').join(', ');
    return ` <span style="color:var(--ac)">· 🔀 ${names}${item.splitIncludeMe===false?'':' +you'}</span>`;
  }
  return '';
}
function friendLent(personId){ return D.data.friendTxns.filter(t=>t.personId===personId&&t.type==='lent').reduce((s,t)=>s+t.amount,0); }
function friendReturned(personId){ return D.data.friendTxns.filter(t=>t.personId===personId&&t.type==='returned').reduce((s,t)=>s+t.amount,0); }
function friendBalance(personId){ return friendLent(personId)-friendReturned(personId); } // positive = they owe you
function totalFriendsOwed(){ return D.data.people.reduce((s,p)=>s+Math.max(0,friendBalance(p.id)),0); }
function staleFriendDebts(days) {
  const now = new Date();
  return D.data.people.map(p=>{
    if(friendBalance(p.id)<=0) return null;
    const lentTxns = D.data.friendTxns.filter(t=>t.personId===p.id&&t.type==='lent').sort((a,b)=>a.date.localeCompare(b.date));
    const oldest = lentTxns[0]; if(!oldest) return null;
    const daysSince = Math.floor((now-new Date(oldest.date))/86400000);
    return daysSince>=days ? {person:p, days:daysSince, balance:friendBalance(p.id)} : null;
  }).filter(Boolean).sort((a,b)=>b.days-a.days);
}

const CAT_ICONS = {food:'🍔',groceries:'🛒',transport:'🚗',fuel:'⛽',shopping:'🛍️',
  bills:'⚡',health:'💊',entertainment:'🎬',dining:'🍽️',travel:'✈️',
  recharge:'📱',gym:'💪',insurance:'🛡️',rent:'🏠',education:'📚',family:'👨‍👩‍👧',
  subscription:'📺',medical:'💉',emi:'🔁',savings:'💰',salary:'💼',other:'📦'};
const EMI_ICONS = {home:'🏠',car:'🚗',personal:'💳',education:'📚',device:'📱',other:'📦'};
const INC_ICONS = {Salary:'💼',Freelance:'💻',Bonus:'🎁',Rental:'🏠',Interest:'🏦',Other:'📦'};
const INV_LABELS = {fd:'Fixed Deposit',rd:'Recurring Deposit',mf:'Mutual Fund',
  gold:'Gold',ppf:'PPF/NPS',stocks:'Stocks',crypto:'Crypto',insurance:'Insurance/ULIP',other:'Other',chit:'Chit Funds'};
const PAY_METHODS = {cash:'💵 Cash',account:'🏦 Bank/UPI',cc:'💳 Credit Card',debit:'💳 Debit Card'};

// ══════════════════════════════════════════════════════════
//  STORAGE
// ══════════════════════════════════════════════════════════
function save() {
  try {
    localStorage.setItem('sw4', JSON.stringify(D.data));
    localStorage.setItem('sw4pin', D.pin);
  } catch(e) { console.warn('Save failed',e); }
}
function load() {
  // Migrate from old keys
  const legacy = localStorage.getItem('sw3');
  if (legacy && !localStorage.getItem('sw4')) {
    try {
      const old = JSON.parse(legacy);
      localStorage.setItem('sw4', JSON.stringify(old));
    } catch(e){}
  }
  const raw = localStorage.getItem('sw4');
  if (raw) {
    try {
      const p = JSON.parse(raw);
      const arr = ['accounts','expenses','incomes','emis','investments','transactions',
                   'ccCards','ccSpends','ccPayments','chits','budgets','goals','people','friendTxns'];
      arr.forEach(k=>{ if(!p[k]) p[k]=[]; });
      if (!p.budgetIncome) p.budgetIncome={};
      if (!p.incomeByType) p.incomeByType={};
      if (!p.netWorthSnapshots) p.netWorthSnapshots={};
      if (!p.settings) p.settings={pin:'1234',activationMonth:null};
      // One-time migration: old lump-sum monthly income -> itemized income ledger
      if ((p.incomes||[]).length===0) {
        const months = new Set([...Object.keys(p.incomeByType||{}), ...Object.keys(p.budgetIncome||{})]);
        months.forEach(mKey=>{
          const byType = (p.incomeByType||{})[mKey];
          if (byType && Object.keys(byType).length) {
            Object.keys(byType).forEach(t=>{
              const amt=byType[t];
              if(amt>0) p.incomes.push({id:uid(),date:mKey+'-01',forMonth:mKey,type:t,amount:amt,accountId:null,note:'Migrated from earlier version'});
            });
          } else {
            const amt=(p.budgetIncome||{})[mKey];
            if(amt>0) p.incomes.push({id:uid(),date:mKey+'-01',forMonth:mKey,type:'Salary',amount:amt,accountId:null,note:'Migrated from earlier version'});
          }
        });
      }
      // Ensure payHistory on all EMIs
      (p.emis||[]).forEach(e=>{ if(!e.payHistory) e.payHistory={}; });
      // Ensure contribHistory on all chits
      (p.chits||[]).forEach(c=>{ if(!c.contribHistory) c.contribHistory={}; });
      D.data = p;
    } catch(e) { console.warn('Load failed',e); }
  }
  D.pin = localStorage.getItem('sw4pin') || D.data.settings?.pin || '1234';
}

function debit(accountId, amount, desc, date) {
  if (!accountId || amount <= 0) return;
  const acc = accById(accountId);
  if (!acc) return;
  acc.balance -= amount;
  if (acc.alert && acc.balance < acc.alert) toast('⚠ Low balance: ' + acc.name, 'err');
  D.data.transactions.push({id:uid(), accountId, type:'dr', amount, desc, date:date||td()});
}
function credit(accountId, amount, desc, date) {
  if (!accountId || amount <= 0) return;
  const acc = accById(accountId);
  if (!acc) return;
  acc.balance += amount;
  D.data.transactions.push({id:uid(), accountId, type:'cr', amount, desc, date:date||td()});
}
function editAccountBalance(id, newBal, reason) {
  const acc = accById(id); if (!acc) return;
  const diff = newBal - acc.balance;
  acc.balance = newBal;
  D.data.transactions.push({id:uid(), accountId:id, type:diff>=0?'cr':'dr',
    amount:Math.abs(diff), desc:(reason||'Manual correction'), date:td()});
}

// ══════════════════════════════════════════════════════════
//  INTEREST CALCULATIONS
// ══════════════════════════════════════════════════════════
function calcMaturityValue(principal, annualRate, startDate, maturityDate) {
  if (!principal || !annualRate || !startDate || !maturityDate) return principal||0;
  const s = new Date(startDate), e = new Date(maturityDate);
  const years = Math.max(0,(e-s)/(365.25*24*3600*1000));
  return Math.round(principal * Math.pow(1+annualRate/100, years));
}
function calcSIPValue(monthlyAmt, annualRate, months) {
  if (!monthlyAmt || !months) return 0;
  const r = annualRate/100/12;
  if (r===0) return monthlyAmt*months;
  return Math.round(monthlyAmt * ((Math.pow(1+r,months)-1)/r) * (1+r));
}
function calcEMIAmount(principal, annualRate, tenureMonths) {
  if (!principal||!tenureMonths) return 0;
  if (!annualRate) return Math.round(principal/tenureMonths);
  const r = annualRate/100/12;
  return Math.round(principal * r * Math.pow(1+r,tenureMonths) / (Math.pow(1+r,tenureMonths)-1));
}
function calcPrepaymentSaving(monthly, remaining, extraAmt, annualRate) {
  if (!annualRate||!remaining) return {newRemaining:remaining, savedInterest:0};
  const r = annualRate/100/12;
  const outstanding = monthly * (1 - Math.pow(1+r, -remaining)) / r;
  const newOutstanding = Math.max(0, outstanding - extraAmt);
  const newRemaining = Math.ceil(Math.log(monthly/(monthly-newOutstanding*r)) / Math.log(1+r));
  const currentInterest = monthly * remaining - outstanding;
  const newInterest = monthly * newRemaining - newOutstanding;
  return {newRemaining: isFinite(newRemaining)?newRemaining:0, savedInterest: Math.round(currentInterest - newInterest)};
}

//  UPCOMING PAYMENTS
// ══════════════════════════════════════════════════════════
function getUpcomingPayments() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth(), today = now.getDate();
  const upcoming = [];

  // EMIs pending this month
  pendingEMIsForMonth(y, m).forEach(e => {
    const daysUntil = e.dueDay - today;
    upcoming.push({
      type:'emi', name:e.name, amount:e.monthly, day:e.dueDay,
      daysUntil, status: daysUntil<0?'overdue':daysUntil<=3?'urgent':'upcoming'
    });
  });

  // CC due dates
  D.data.ccCards.filter(c=>c.outstanding>0).forEach(c => {
    const daysUntil = c.dueDay - today;
    upcoming.push({
      type:'cc', name:c.name+' (CC)', amount:c.outstanding, day:c.dueDay,
      daysUntil, status: daysUntil<0?'overdue':daysUntil<=5?'urgent':'upcoming'
    });
  });

  // Chit contributions
  D.data.chits.filter(c=>c.status==='active').forEach(c => {
    if (!c.nextDue) return;
    const dueDate = new Date(c.nextDue);
    const daysUntil = Math.round((dueDate-now)/86400000);
    upcoming.push({
      type:'chit', name:c.name+' (Chit)', amount:c.monthly, day:dueDate.getDate(),
      daysUntil, status: daysUntil<0?'overdue':daysUntil<=3?'urgent':'upcoming'
    });
  });

  return upcoming.sort((a,b)=>a.daysUntil-b.daysUntil);
}

function noSpendStreakDays() {
  const daily = {};
  D.data.expenses.forEach(e=>{ if(!e.personId){ daily[e.date]=(daily[e.date]||0)+e.amount; } });
  let streak=0;
  for(let i=0;i<90;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    const key=d.toISOString().split('T')[0];
    if((daily[key]||0)>0) break;
    if(i===0 && !(key in daily)) { streak++; continue; } // today with no entries yet still counts
    streak++;
  }
  return streak;
}

  return D.data.expenses.filter(e=>e.date>=from&&e.date<=td()&&!e.personId).reduce((s,e)=>s+e.amount,0);

// ══════════════════════════════════════════════════════════
const SMS_PATTERNS = [
  // HDFC debited
  /(?:INR|Rs\.?|₹)\s*([\d,]+(?:\.\d{1,2})?)\s+(?:has been\s+)?debited/i,
  // debited INR/Rs X
  /debited\s+(?:INR|Rs\.?|₹)\s*([\d,]+(?:\.\d{1,2})?)/i,
  // spent Rs X at
  /spent\s+(?:INR|Rs\.?|₹)\s*([\d,]+(?:\.\d{1,2})?)/i,
  // paid Rs X to
  /(?:paid|transferred)\s+(?:INR|Rs\.?|₹)\s*([\d,]+(?:\.\d{1,2})?)/i,
  // Rs 1234 debited (SBI/Kotak)
  /(?:INR|Rs\.?|₹)\s*([\d,]+(?:\.\d{1,2})?)\s*(?:debited|deducted|paid)/i,
  // Info: your A/c has been debited by Rs X
  /debited\s+by\s+(?:INR|Rs\.?|₹)\s*([\d,]+(?:\.\d{1,2})?)/i,
  // UPI: X debited for Y
  /([\d,]+(?:\.\d{1,2})?)\s+(?:has been\s+)?debited/i,
];

function extractAmtFromSMS(line) {
  for (const pat of SMS_PATTERNS) {
    const m = line.match(pat);
    if (m) {
      const v = parseFloat(m[1].replace(/,/g,''));
      if (v > 0 && v < 10000000) return v;
    }
  }
  return 0;
}

function extractDescFromSMS(line) {
  // Try to get merchant / to name
  const patterns = [
    /(?:at|to|for|Info:)\s+([A-Za-z0-9 &._\-*]+?)(?:\s+on|\s+Ref|\s+UPI|\s+txn|\s+dated|\s*\.|$)/i,
    /UPI-([A-Za-z0-9 &._\-]+)/i,
    /trf\s+to\s+([A-Za-z0-9 ]+)/i,
  ];
  for (const p of patterns) {
    const m = line.match(p);
    if (m && m[1] && m[1].trim().length > 2) return m[1].trim().slice(0,50);
  }
  // Fallback: extract bank name
  const bank = line.match(/(HDFC|ICICI|SBI|Axis|Kotak|YES|IDFC|IndusInd|Federal|BOB|PNB|Canara)/i);
  return bank ? bank[1]+' transaction' : 'Bank debit';
}

function extractDateFromSMS(line) {
  const patterns = [
    /(\d{2})[\/\-](\d{2})[\/\-](\d{2,4})/,   // dd-mm-yy
    /(\d{2})-([A-Za-z]{3})-(\d{2,4})/,         // dd-Mon-yy
    /on\s+(\d{1,2})\s+([A-Za-z]+)\s*'?(\d{2,4})/i,
  ];
  const now = new Date(); const today = td();
  for (const p of patterns) {
    const m = line.match(p);
    if (!m) continue;
    try {
      // Try numeric: dd-mm-yy
      if (/\d/.test(m[2])) {
        let [,d,mo,yr]=m;
        if (yr.length===2) yr='20'+yr;
        const dt = new Date(yr,mo-1,d);
        if (!isNaN(dt)) return dt.toISOString().split('T')[0];
      } else {
        // dd-Mon-yy
        const dt = new Date(m[0].replace(/[\/\-]/g,' '));
        if (!isNaN(dt)) return dt.toISOString().split('T')[0];
      }
    } catch(e){}
  }
  return today;
}

function parseSMSBulk(text) {
  const lines = text.split('\n').map(l=>l.trim()).filter(l=>l.length>8);
  const results = [];
  const seen = new Set();
  for (const line of lines) {
    const amount = extractAmtFromSMS(line);
    if (!amount) continue;
    const desc = extractDescFromSMS(line);
    const date = extractDateFromSMS(line);
    const category = guessCategory(desc + ' ' + line);
    const key = `${amount}-${date}-${desc.slice(0,8)}`;
    if (seen.has(key)) continue;
    seen.add(key);
    results.push({ id:uid(), amount, desc, date, category, raw:line.slice(0,100) });
  }
  return results;
}

// ══════════════════════════════════════════════════════════
//  CSV STATEMENT PARSER — HDFC, ICICI, SBI, Axis
// ══════════════════════════════════════════════════════════
function splitCSVLine(line) {
  const cols=[]; let cur=''; let inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){inQ=!inQ;continue;}
    if(ch===','&&!inQ){cols.push(cur.trim());cur='';continue;}
    cur+=ch;
  }
  cols.push(cur.trim());
  return cols;
}
function parseDateStr(s) {
  s=(s||'').replace(/"/g,'').trim();
  let m=s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{2,4})$/);
  if(m){let[,d,mo,y]=m;if(y.length===2)y='20'+y;return `${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`;}
  m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m)return s;
  // Try JS Date parse
  const dt=new Date(s);
  if(!isNaN(dt))return dt.toISOString().split('T')[0];
  return '';
}
function parseAmt(s){const v=parseFloat((s+'').replace(/[₹,\s"]/g,''));return isNaN(v)?0:Math.abs(v);}

function parseCSVStatement(text) {
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
  const results=[];
  // Find header row
  let headerIdx=0;
  for(let i=0;i<Math.min(lines.length,15);i++){
    const l=lines[i].toLowerCase();
    if(l.includes('narration')||l.includes('description')||l.includes('withdrawal')||l.includes('debit')){
      headerIdx=i; break;
    }
  }
  const headers=splitCSVLine(lines[headerIdx]).map(h=>h.replace(/"/g,'').trim().toLowerCase());
  // Identify column indices
  const dateCol = headers.findIndex(h=>h.includes('date')||h.includes('txn'));
  const descCol = headers.findIndex(h=>h.includes('narration')||h.includes('description')||h.includes('particulars')||h.includes('details'));
  const debitCol= headers.findIndex(h=>h.includes('withdrawal')||h.includes('debit')||h.includes('dr'));
  const seen=new Set();
  for(const line of lines.slice(headerIdx+1)){
    const cols=splitCSVLine(line);
    if(cols.length<3)continue;
    const date=parseDateStr(cols[dateCol>=0?dateCol:0]);
    const desc=(cols[descCol>=0?descCol:1]||'').replace(/"/g,'').trim();
    let amount=0;
    if(debitCol>=0){amount=parseAmt(cols[debitCol]);}
    else{// scan cols for a positive number that looks like a debit
      for(const ci of[4,3,5,2,6]){const v=parseAmt(cols[ci]);if(v>0&&v<10000000){amount=v;break;}}}
    if(!amount||amount<=0)continue;
    if(!date)continue;
    if(!desc||desc.length<2)continue;
    const key=`${amount}-${date}-${desc.slice(0,8)}`;
    if(seen.has(key))continue;
    seen.add(key);
    results.push({id:uid(),amount,desc:desc.slice(0,60),date,category:guessCategory(desc),raw:line.slice(0,80)});
  }
  return results;
}

function runSMSParse() {
  const text=document.getElementById('smsText')?.value||'';
  if(!text.trim())return toast('Paste SMS messages first','err');
  const rows=parseSMSBulk(text);
  if(!rows.length)return toast('No debit transactions found — try a different format','am');
  _importRows=rows.map(r=>({...r,selected:true}));
  toast('✅ Found '+rows.length+' transaction'+(rows.length!==1?'s':''),'ok');
  renderImport();
}

function runCSVFile(input) {
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const rows=parseCSVStatement(e.target.result);
    if(!rows.length)return toast('No debit transactions found in CSV','am');
    _importRows=rows.map(r=>({...r,selected:true}));
    toast('✅ Found '+rows.length+' debit transactions','ok');
    renderImport();
  };
  reader.readAsText(file);
}

function runCSVText() {
  const text=document.getElementById('csvText')?.value||'';
  if(!text.trim())return toast('Paste CSV content first','err');
  const rows=parseCSVStatement(text);
  if(!rows.length)return toast('No debit transactions found','am');
  _importRows=rows.map(r=>({...r,selected:true}));
  toast('✅ Found '+rows.length+' transactions','ok');
  renderImport();
}

function importSelectAll(v) {
  _importRows.forEach(r=>r.selected=v);
  renderImport();
}

function doImport() {
  const method=document.getElementById('importMethod')?.value||'account';
  const selected=_importRows.filter(r=>r.selected);
  if(!selected.length)return toast('Select at least one transaction','err');
  let added=0,dupes=0;
  for(const r of selected){
    const isDupe=D.data.expenses.some(e=>e.date===r.date&&Math.abs(e.amount-r.amount)<0.5&&(e.desc||'').slice(0,10)===(r.desc||'').slice(0,10));
    if(isDupe){dupes++;continue;}
    D.data.expenses.push({id:uid(),date:r.date,category:r.category,desc:r.desc,amount:r.amount,accountId:null,ccId:null,payMethod:method,note:'Imported',recurring:''});
    added++;
  }
  save();renderAll();
  _importRows=[];
  toast('✅ Imported '+added+(dupes>0?' ('+dupes+' dupes skipped)':''),'ok');
  renderImport();
}

    const d=parseInt((e.date||'').split('-')[2]||0);

    dayMap[d].spend+=e.amount;
    dayMap[d].events.push(e.desc||e.category);
  });
  // EMI due dates
  D.data.emis.filter(e=>e.remaining>0).forEach(e=>{
    const d=e.dueDay;

function init() {
  load();

  D.sel = {y:now.getFullYear(), m:now.getMonth()};
  if (!D.data.settings.activationMonth) {
    D.data.settings.activationMonth = mk(now.getFullYear(), now.getMonth());
    save();
  }
  recordNetWorthSnapshot();
  save();
  setTopMonth();
}
function setTopMonth() {
  document.getElementById('tMonth').textContent = MS[D.sel.m]+' '+D.sel.y;
}

function openPage(name) {
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  const pg = document.getElementById('pg'+name);
  const nv = document.getElementById('n'+name);
  if (pg) pg.classList.add('on');
  if (nv) nv.classList.add('on');
  renderPage(name);
}
function renderPage(name) {
  if      (name==='Home')     renderHome();
  else if (name==='EMI')      renderEMI();
  else if (name==='Savings')  renderSavings();
  else if (name==='CC')       renderCC();
  else if (name==='Report')   renderReport();
  else if (name==='Adviser')  renderAdviser();
  else if (name==='CashFlow') renderCashFlow();
  else if (name==='Import')   renderImport();
  else if (name==='Calendar') renderCalendar();
  else if (name==='Recurring') renderRecurring();
  else if (name==='Friends') renderFriends();
}
function renderAll() {
  setTopMonth();
  renderHome();
  const cur = document.querySelector('.pg.on');
  if (cur) { const id=cur.id.replace('pg',''); if(id!=='Home') renderPage(id); }
}
// Expose openPage globally for nav shortcuts
function navTo(page) {
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  // Calendar and Recurring share the Import page DOM node
  const domPage = (page==='Calendar'||page==='Recurring') ? 'Import' : page;
  const pg = document.getElementById('pg'+domPage);
  if (pg) pg.classList.add('on');
  renderPage(page);
  closeAll();
}
function openMonthPicker() {
  const now = new Date();
  const opts = [];
  for(let i=-6;i<=3;i++){
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    opts.push({y:d.getFullYear(),m:d.getMonth()});
  }
  openMod('Select Month', opts.map(o=>{
    const isCur=o.y===now.getFullYear()&&o.m===now.getMonth();
    const isSel=o.y===D.sel.y&&o.m===D.sel.m;
    const isFut=new Date(o.y,o.m,1)>new Date(now.getFullYear(),now.getMonth(),1);
    return `<div style="padding:11px 12px;border-radius:9px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:${isSel?'var(--ac)18':'transparent'};border:1px solid ${isSel?'var(--ac)40':'transparent'};margin-bottom:5px" onclick="selMonth(${o.y},${o.m})">
      <span style="font-size:.86rem">${MN[o.m]} ${o.y}</span>
      ${isCur?'<span class="bdg p">Current</span>':''}${isFut?'<span class="bdg bl">Future</span>':''}
    </div>`;
  }).join(''));
}
function selMonth(y, m) { D.sel={y,m}; closeAll(); renderAll(); }

function addPersonPrompt() {

function viewPerson(id) {

function settleFriend(personId) {
  const bal=friendBalance(personId); if(bal<=0) return;
  if(!confirm(`Mark ${fmt(bal)} as fully paid back?`)) return;
  D.data.friendTxns.push({id:uid(),personId,type:'returned',amount:bal,date:td(),note:'Settled in full',method:'cash'});
  save(); closeAll(); renderAll(); navTo('Friends');
  toast(`✅ Settled up`,'ok');
}
function recordFriendReturn(personId) {
  const amt=parseFloat(prompt('Amount returned (₹):')||'');
  if(!amt||amt<=0) return;
  D.data.friendTxns.push({id:uid(),personId,type:'returned',amount:amt,date:td(),note:'Repayment',method:'cash'});
  save(); closeAll(); renderAll(); navTo('Friends');
  toast(`✅ ${fmt(amt)} logged as returned`,'ok');
}
function deletePerson(id) {
  if(!confirm('Remove this person? Their linked spends stay recorded as-is (split amounts are not recalculated), and their return history is cleared.')) return;
  D.data.expenses.forEach(e=>{ if(e.personId===id) e.personId=null; if(e.splitWith) e.splitWith=e.splitWith.filter(pid=>pid!==id); });
  D.data.ccSpends.forEach(s=>{ if(s.personId===id) s.personId=null; if(s.splitWith) s.splitWith=s.splitWith.filter(pid=>pid!==id); });
  D.data.friendTxns=D.data.friendTxns.filter(t=>t.personId!==id);
  D.data.people=D.data.people.filter(p=>p.id!==id);
  save(); closeAll(); renderAll(); navTo('Friends');
  toast('Person removed','ok');
}

function renderEMI() {
  const {y,m} = D.sel;
  const now = new Date();
  const isCurM = y===now.getFullYear()&&m===now.getMonth();
  const all = D.data.emis;
  const active = all.filter(e=>e.remaining>0);
  const closed = all.filter(e=>e.remaining<=0);
  const pendingList = isCurM ? pendingEMIsForMonth(y,m) : active;
  const paidList    = isCurM ? paidEMIsForMonth(y,m)    : [];
  const totalMonthly = active.reduce((s,e)=>s+e.monthly,0);
  const totalPending = active.reduce((s,e)=>s+e.monthly*e.remaining,0);
  const activeChits = D.data.chits.filter(c=>c.status==='active');
  const chitMonthly = activeChits.reduce((s,c)=>s+c.monthly,0);
  const closing = active.filter(e=>e.remaining<=3);
  let showPaid = D._emiShowPaid || false;

  // Combined upcoming payments (EMIs + chit contributions) sorted by due date — clearer than a flat "pending" count
  const upcoming = [];
  if (isCurM) {
    pendingList.forEach(e=>{
      upcoming.push({kind:'emi', id:e.id, name:e.name, icon:EMI_ICONS[e.type]||'📦', amount:e.monthly, dueDate:new Date(y,m,e.dueDay)});
    });
    pendingChitsForMonth(y,m).forEach(c=>{
      let dd = c.nextDue ? new Date(c.nextDue) : null;
      if (!dd || dd.getFullYear()!==y || dd.getMonth()!==m) dd = new Date(y,m,(new Date(c.startDate).getDate())||1);
      upcoming.push({kind:'chit', id:c.id, name:c.name, icon:'🏺', amount:c.monthly, dueDate:dd});
    });
    upcoming.sort((a,b)=>a.dueDate-b.dueDate);
  }

  // 12-month forecast
  const forecast=[];
  for(let i=0;i<12;i++){
    const fd=new Date(now.getFullYear(),now.getMonth()+i,1);
    const at=active.filter(e=>e.remaining>i);
    forecast.push({label:MS[fd.getMonth()]+' '+fd.getFullYear(),total:at.reduce((s,e)=>s+e.monthly,0),count:at.length});
  }

  document.getElementById('cEMI').innerHTML = `
  <div class="hero fi2">
    <div class="hl">Monthly EMI Burden</div>
    <div class="ha"><span class="rr">₹</span>${totalMonthly.toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
    <div class="ht">
      <span style="color:var(--r)">${active.length} active loan${active.length!==1?'s':''}</span>
      <span style="margin-left:auto;color:var(--am)">${fmt(totalPending)} total pending</span>
    </div>
    ${chitMonthly>0?`<div style="margin-top:8px;font-size:.68rem;color:var(--t3)">+ ${fmt(chitMonthly)}/mo in chit fund contributions (${activeChits.length} active) — total monthly commitment: <strong style="color:var(--t2)">${fmt(totalMonthly+chitMonthly)}</strong></div>`:''}
  </div>

  ${closing.length?`<div class="advc fi2"><div class="advh"><div class="advav">🤖</div>
    <div><div class="advn">EMI Closing Soon!</div><div class="advst">Investment opportunity</div></div></div>
    <div class="insl">${closing.map(e=>{const s70=Math.round(e.monthly*.7);const fv=calcSIPValue(s70,12,120);return`<div class="ins w">
      <strong>🎉 ${e.name}</strong> closes in <strong>${e.remaining} month${e.remaining!==1?'s':''}!</strong>
      Free up <strong>${fmt(e.monthly)}/mo</strong> → redirect <strong>${fmt(s70)}/mo</strong> into SIP → <strong>${fmt(fv)}</strong> in 10 yrs.
      <span style="color:var(--ac);cursor:pointer;font-size:.7rem;margin-left:6px" onclick="openAdd('investment')">→ Start SIP</span>
    </div>`;}).join('')}</div></div>`:''}

  <!-- DUE SOON — clearer than a flat pending count -->
  ${isCurM&&upcoming.length?`<div class="fi2">
    <div class="sh"><div class="st">📌 Due Soon</div><span class="bdg am">${upcoming.length} payment${upcoming.length!==1?'s':''}</span></div>
    <div class="eil">
      ${upcoming.slice(0,8).map(u=>{
        const days=daysUntilDate(u.dueDate); const lbl=dueLabel(days);
        return `<div class="ei" style="cursor:pointer" onclick="${u.kind==='emi'?`viewEMIHistory('${u.id}')`:`viewChitHistory('${u.id}')`}">
          <div class="eii">${u.icon}</div>
          <div class="ein">
            <div class="enn">${u.name}</div>
            <div class="enm">${u.kind==='emi'?'EMI':'Chit contribution'} · ${u.dueDate.toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</div>
            <span class="emi-status-badge" style="color:${lbl.color};background:${lbl.color}18">${lbl.text.toUpperCase()}</span>
          </div>
          <div class="eir">
            <div class="eia">${fmt(u.amount)}</div>
            <div class="paybtn" onclick="event.stopPropagation();${u.kind==='emi'?`quickPayEMI('${u.id}')`:`quickPayChit('${u.id}')`}">Pay Now</div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`:isCurM?`<div class="notice g fi2"><span>🎉</span><div><strong>Nothing due right now.</strong> All EMIs and chit contributions are paid up for ${MS[m]}.</div></div>`:''}

  <!-- TOGGLE -->
  ${isCurM?`<div style="display:flex;gap:8px">
    <button class="sbtn sm ${!showPaid?'':'sec'}" style="flex:1" onclick="D._emiShowPaid=false;renderEMI()">📋 All EMIs (${pendingList.length})</button>
    <button class="sbtn sm ${showPaid?'':'sec'}" style="flex:1" onclick="D._emiShowPaid=true;renderEMI()">✅ Paid This Month (${paidList.length})</button>
  </div>`:''}

  <!-- MARK ALL PAID -->
  ${isCurM&&pendingList.length>0&&!showPaid?`<button class="sbtn sec sm" onclick="markAllEMIPaid()">✅ Mark All EMIs Paid for ${MS[m]}</button>`:''}

  <div class="fi2">
    <div class="sh">
      <div class="st">${showPaid?'✅ Paid EMIs':'📋 All EMIs'} — ${MN[m]} ${y}</div>
      <div class="sa" onclick="openAdd('emi')">+ Add</div>
    </div>
    <div class="eil">
      ${(showPaid?paidList:isCurM?pendingList:active).length?(showPaid?paidList:isCurM?pendingList:active).map(e=>{
        const pct2=e.total>0?((e.total-e.remaining)/e.total*100):0;
        const st=isCurM?getEMIMonthStatus(e.id,y,m):{status:e.remaining>0?'pending':'paid'};
        const acc=accById(e.accountId);
        const isCl=e.remaining<=3;
        const dLbl=isCurM&&st.status==='pending'?dueLabel(daysUntilDate(new Date(y,m,e.dueDay))):null;
        const statusColor={pending:'var(--am)',paid:'var(--g)',partial:'var(--bl)',skipped:'var(--r)'};
        return`<div class="ei ${isCl?'cl':''} ${st.status==='paid'?'paid-ei':''}" onclick="viewEMIHistory('${e.id}')">
          <div class="eii">${EMI_ICONS[e.type]||'📦'}</div>
          <div class="ein">
            <div class="enn">${e.name}</div>
            <div class="enm">Due ${e.dueDay}th · ${e.interest||0}% p.a.${acc?' · '+acc.name:''} · ${e.remaining} left</div>
            <div class="ep"><div class="ebar" style="width:${pct2.toFixed(0)}%"></div></div>
            ${isCurM?(dLbl?`<span class="emi-status-badge" style="color:${dLbl.color};background:${dLbl.color}18">${dLbl.text.toUpperCase()}</span>`:`<span class="emi-status-badge ${st.status}">${st.status.toUpperCase()}${st.paidDate?' · '+st.paidDate:''}</span>`):''}
          </div>
          <div class="eir">
            <div class="eia">${fmt(e.monthly)}</div>
            <div class="eil2">${fmt(e.monthly*e.remaining)} left</div>
            ${st.status!=='paid'?`<div class="paybtn" onclick="event.stopPropagation();quickPayEMI('${e.id}')">Pay Now</div>`
            :`<div class="paybtn paid" onclick="event.stopPropagation();editEMIStatus('${e.id}')">✓ Paid</div>`}
            <div class="paybtn" style="background:var(--bl)18;color:var(--bl);border-color:var(--bl)36;margin-top:2px" onclick="event.stopPropagation();viewEMIHistory('${e.id}')">📅 History</div>
          </div>
        </div>`;}).join('')
      :`<div class="empty"><div class="eic">${showPaid?'📭':'🎉'}</div><div class="em">${showPaid?'No paid EMIs yet.':'All EMIs paid this month!'}</div></div>`}
    </div>
  </div>

  <!-- EMI SIMULATOR -->
  <div class="card fi2">
    <div class="st" style="margin-bottom:12px">🔢 EMI Calculator / Simulator</div>
    <div class="frow">
      <div class="fg"><label class="fl">Principal (₹)</label><input class="fi" id="simP" type="number" placeholder="500000" oninput="runSimulator()"/></div>
      <div class="fg"><label class="fl">Interest (% p.a.)</label><input class="fi" id="simR" type="number" placeholder="8.5" step=".1" oninput="runSimulator()"/></div>
    </div>
    <div class="frow">
      <div class="fg"><label class="fl">Tenure (months)</label><input class="fi" id="simT" type="number" placeholder="60" oninput="runSimulator()"/></div>
      <div class="fg"><label class="fl">Extra Prepayment (₹)</label><input class="fi" id="simX" type="number" placeholder="0" oninput="runSimulator()"/></div>
    </div>
    <div id="simResult" style="background:var(--card2);border-radius:var(--rr);padding:11px;font-size:.78rem;color:var(--t2);line-height:1.8"></div>
  </div>

  <!-- 12 MONTH FORECAST -->
  <div class="card fi2">
    <div class="st" style="margin-bottom:12px">📅 12-Month Forecast</div>
    <div style="overflow-x:auto"><table class="tbl">
      <thead><tr><th>Month</th><th>EMI Total</th><th>Loans</th></tr></thead>
      <tbody>${forecast.map((f,i)=>`<tr class="${i===0?'hilite':''}"><td>${f.label}${i===0?' <span class="bdg p">Now</span>':''}</td><td class="mn">${fmt(f.total)}</td><td style="color:var(--t3)">${f.count}</td></tr>`).join('')}</tbody>
    </table></div>
  </div>

  ${closed.length?`<div class="fi2"><div class="sh"><div class="st">✅ Closed Loans</div></div>
    <div class="eil">${closed.map(e=>`<div class="ei" style="opacity:.55;cursor:pointer" onclick="viewEMIHistory('${e.id}')"><div class="eii">${EMI_ICONS[e.type]||'📦'}</div>
      <div class="ein"><div class="enn">${e.name}</div><div class="enm">Loan closed · Tap for history</div>
      <div class="ep"><div class="ebar" style="width:100%;background:var(--g)"></div></div></div>
      <div class="eir"><div class="eia" style="color:var(--g)">PAID OFF 🎉</div></div></div>`).join('')}

function runSimulator() {
  const P=parseFloat(document.getElementById('simP')?.value)||0;
  const R=parseFloat(document.getElementById('simR')?.value)||0;
  const T=parseInt(document.getElementById('simT')?.value)||0;
  const X=parseFloat(document.getElementById('simX')?.value)||0;
  const el=document.getElementById('simResult');
  if (!P||!T){if(el)el.innerHTML='Enter principal and tenure to calculate.';return;}
  const emi=calcEMIAmount(P,R,T);
  const totalPay=emi*T;
  const totalInt=totalPay-P;
  let html=`Monthly EMI: <strong style="color:var(--am)">${fmt(emi)}</strong> &nbsp;|&nbsp; Total Interest: <strong style="color:var(--r)">${fmt(totalInt)}</strong> &nbsp;|&nbsp; Total Payable: <strong>${fmt(totalPay)}</strong>`;
  if(X>0&&R>0){
    const res=calcPrepaymentSaving(emi,T,X,R);
    const saved=res.savedInterest;
    html+=`<br><span style="color:var(--g)">With ₹${X.toLocaleString('en-IN')} prepayment: ${res.newRemaining} months left, save ₹${saved.toLocaleString('en-IN')} interest</span>`;
  }
  if(el) el.innerHTML=html;
}

function confirmEMIPayment(emiId) {
  const emi=emiById(emiId); if(!emi) return;
  const payType=document.getElementById('qPayType').value;
  const paidAmt=payType==='partial'?(parseFloat(document.getElementById('qPartialAmt')?.value)||0):emi.monthly;
  const accId=document.getElementById('qPayAcc').value;
  const date=document.getElementById('qPayDate').value;
  const note=document.getElementById('qPayNote').value;
  const {y,m}=D.sel;
  if(payType==='partial'&&paidAmt<=0) return toast('Enter partial payment amount','err');
  if(payType==='partial'&&paidAmt>emi.monthly) {
    if(!confirm('Partial amount '+fmt(paidAmt)+' exceeds EMI of '+fmt(emi.monthly)+'. Continue?')) return;
  }
  // Update monthly status
  setEMIMonthStatus(emi.id,y,m,payType,paidAmt,date,note);
  // Deduct from account if full/partial paid
  if((payType==='paid'||payType==='partial')&&accId) debit(accId,paidAmt,'EMI: '+emi.name,date);
  // Reduce remaining count only on full payment
  if(payType==='paid') emi.remaining=Math.max(0,emi.remaining-1);
  save(); renderAll(); closeAll();
  const msg=payType==='paid'?`✅ ${emi.name} paid ${fmt(emi.monthly)}${emi.remaining===0?' 🎉 Loan closed!':''}`:
    payType==='partial'?`✅ Partial: ${fmt(paidAmt)} for ${emi.name}`:`⚠ ${emi.name} marked skipped`;
  toast(msg, payType==='skipped'?'am':'ok');
}

// ── EMI HISTORY VIEW ────────────────────────────────────────────────────────
function viewEMIHistory(emiId) {
  const emi = emiById(emiId); if (!emi) return;
  if (!emi.payHistory) emi.payHistory = {};
  const histKeys = Object.keys(emi.payHistory).sort().reverse().slice(0,24);
  const now = new Date();
  const currentKey = mk(now.getFullYear(), now.getMonth());
  // Also build future months
  const futureMonths = [];
  for (let i=1; i<=Math.min(emi.remaining,3); i++) {
    const fd = new Date(now.getFullYear(), now.getMonth()+i, 1);
    futureMonths.push(mk(fd.getFullYear(), fd.getMonth()));
  }
  const allKeys = [...new Set([currentKey, ...futureMonths, ...histKeys])].sort().reverse();

  openMod('📅 EMI History: ' + emi.name,
    `<div style="background:var(--card2);border-radius:var(--rr);padding:11px;margin-bottom:13px">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">
        <div><div style="font-size:.58rem;color:var(--t3)">Monthly</div><div style="font-family:var(--fm);font-size:.9rem">${fmt(emi.monthly)}</div></div>
        <div><div style="font-size:.58rem;color:var(--t3)">Remaining</div><div style="font-family:var(--fm);font-size:.9rem;color:var(--am)">${emi.remaining}</div></div>

      </div>

function saveEMIStatusEdit(emiId) {
  const emi=emiById(emiId); if(!emi) return;
  const {y,m}=D.sel;
  const oldSt=getEMIMonthStatus(emi.id,y,m);
  const newStatus=document.getElementById('eEMIStatus').value;
  const paidAmt=parseFloat(document.getElementById('eEMIPaidAmt').value)||0;
  const date=document.getElementById('eEMIDate').value;
  const note=document.getElementById('eEMINote').value;
  // If switching from paid to pending, add back to remaining
  if(oldSt.status==='paid' && newStatus!=='paid') emi.remaining=Math.min(emi.remaining+1, emi.total||999);
  if(oldSt.status!=='paid' && newStatus==='paid') emi.remaining=Math.max(0,emi.remaining-1);
  setEMIMonthStatus(emi.id,y,m,newStatus,paidAmt,date,note);
  save(); renderAll(); closeAll();
  toast('✅ EMI status updated','ok');
}

function markAllEMIPaid() {
  if(!confirm('Mark ALL pending EMIs as paid for '+MN[D.sel.m]+' '+D.sel.y+'?')) return;
  const {y,m}=D.sel;
  pendingEMIsForMonth(y,m).forEach(e=>{
    setEMIMonthStatus(e.id,y,m,'paid',e.monthly,td(),'Bulk marked paid');
    e.remaining=Math.max(0,e.remaining-1);
  });
  save(); renderAll();
  toast('✅ All EMIs marked paid for '+MN[m],'ok');
}

//  ADVISER PAGE
// ══════════════════════════════════════════════════════════
function renderAdviser() {
  const {y,m}=D.sel;
  const income=monthIncome(y,m);
  const exps=monthExpenses(y,m);
  const spent=exps.reduce((s,e)=>s+e.amount,0);
  const emiAmt=D.data.emis.filter(e=>e.remaining>0).reduce((s,e)=>s+e.monthly,0);
  const sipAmt=totalSIP();
  const invTot=totalInvestments();
  const ccOut=totalCCOutstanding();
  const saved=income-spent-emiAmt-sipAmt;
  const spPct=income>0?spent/income*100:0;
  const emPct=income>0?emiAmt/income*100:0;
  const closing=D.data.emis.filter(e=>e.remaining>0&&e.remaining<=3);
  const cats={}; exps.forEach(e=>{cats[e.category]=(cats[e.category]||0)+e.amount;});
  const lmD=new Date(y,m-1,1); const lastCats={};
  monthExpenses(lmD.getFullYear(),lmD.getMonth()).forEach(e=>{lastCats[e.category]=(lastCats[e.category]||0)+e.amount;});
  let biggestJump=null;
  Object.keys(cats).forEach(cat=>{
    const now2=cats[cat], prev=lastCats[cat]||0;
    if(prev>=500){ const diffPct=(now2-prev)/prev*100;
      if(diffPct>25 && (!biggestJump||diffPct>biggestJump.diffPct)) biggestJump={cat,now2,prev,diffPct};
    }
  });
  const s1=income>0?Math.max(0,100-spPct):0;
  const s2=income>0?Math.max(0,100-emPct*2):50;
  const s3=income>0?Math.min(100,sipAmt/income*1000):0;
  const s4=income>0?Math.min(100,Math.max(0,saved/income*100*3)):0;
  const overall=Math.round((s1+s2+s3+s4)/4);
  const grade=overall>=80?{g:'A',c:'var(--g)'}:overall>=60?{g:'B',c:'var(--bl)'}:overall>=40?{g:'C',c:'var(--am)'}:{g:'D',c:'var(--r)'};

  const insights=[];
  if(income===0)insights.push({t:'w',m:'Set your monthly income in Settings to get personalized insights.'});
  if(spPct>70)insights.push({t:'w',m:`<strong>High spending alert:</strong> ${spPct.toFixed(0)}% of income on expenses. Target: under 50%.`});
  else if(spPct>0&&spPct<50)insights.push({t:'ok',m:`<strong>Spending in control!</strong> Only ${spPct.toFixed(0)}% of income spent — ${fmt(income-spent)} still available.`});
  if(emPct>40)insights.push({t:'w',m:`<strong>Heavy EMI load:</strong> ${emPct.toFixed(0)}% of income (${fmt(emiAmt)}/mo). Recommended: under 35%. Consider prepayment.`});
  if(ccOut>income*0.5&&income>0)insights.push({t:'w',m:`<strong>High CC outstanding: ${fmt(ccOut)}</strong> — that's ${(ccOut/income*100).toFixed(0)}% of your income. Prioritize paying this down.`});
  else if(ccOut>0)insights.push({t:'tip',m:`CC outstanding: ${fmt(ccOut)}. Aim to pay full dues each month to avoid ${((D.data.ccCards[0]||{}).interest||36)}% interest.`});
  if(sipAmt===0&&income>0)insights.push({t:'tip',m:`<strong>No SIP running.</strong> Starting just ₹1,000/mo at 12% CAGR = ${fmt(calcSIPValue(1000,12,120))} in 10 yrs. Start small!`});

  closing.forEach(e=>{const fv=calcSIPValue(Math.round(e.monthly*.7),12,120);insights.push({t:'ok',m:`<strong>🎉 ${e.name}</strong> closes in ${e.remaining} month${e.remaining!==1?'s':''}! Redirect ${fmt(Math.round(e.monthly*.7))}/mo into SIP → <strong>${fmt(fv)}</strong> in 10 yrs.`});});
  const totalDebt=D.data.emis.filter(e=>e.remaining>0).reduce((s,e)=>s+e.monthly*e.remaining,0);

async function askAI() {
  const inp=document.getElementById('advIn');
  const q=inp.value.trim(); if(!q) return;
  inp.value='';
  const rep=document.getElementById('advReply');
  rep.innerHTML='<div class="typ"><div class="tyd"></div><div class="tyd"></div><div class="tyd"></div></div>';
  const {y,m}=D.sel;
  const inc=monthIncome(y,m),sp=monthExpenses(y,m).reduce((s,e)=>s+e.amount,0),emi=D.data.emis.filter(e=>e.remaining>0).reduce((s,e)=>s+e.monthly,0),sip=totalSIP(),inv=totalInvestments(),cc=totalCCOutstanding();
  const pendEMICount=pendingEMIsForMonth(y,m).length;
  const totalDebt=D.data.emis.filter(e=>e.remaining>0).reduce((s2,e)=>s2+e.monthly*e.remaining,0);
  const ctx=`You are SpendWise, a concise Indian personal finance adviser. Current month (${MS[m]} ${y}) data: Income ₹${inc}, Spent ₹${sp} (${inc>0?(sp/inc*100).toFixed(0):0}% of income), EMI ₹${emi}/mo, SIP ₹${sip}/mo, Portfolio ₹${inv}, CC Outstanding ₹${cc}, Total Debt ₹${totalDebt}, Pending EMIs: ${pendEMICount}. Reply in 2-4 sentences, use ₹, give ONE concrete actionable advice specific to this user's numbers.`;
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:ctx,messages:[{role:'user',content:q}]})});
    const d=await res.json();
    const txt=(d.content||[]).map(c=>c.text||'').join('')||'Unable to respond.';
    rep.innerHTML=`<div class="ins tip" style="margin-top:8px">${txt}</div>`;
  } catch {
    rep.innerHTML='<div class="ins w" style="margin-top:8px">AI unavailable. Add income and expenses to see adviser tips.</div>';
  }
}

function onPayMethodChange() {

function quickAddSplitPerson() {
  const name=(prompt('Friend / person name:')||'').trim();
  if(!name) return;
  const p={id:uid(),name,color:'#6c63ff'};
  D.data.people.push(p); save();
  const wrap=document.getElementById('fSplitPeople');
  if(wrap){
    const lbl=document.createElement('label');
    lbl.style.cssText='display:flex;align-items:center;gap:5px;background:var(--card2);padding:6px 10px;border-radius:20px;font-size:.72rem;cursor:pointer;border:1px solid var(--border)';
    lbl.innerHTML=`<input type="checkbox" class="fSplitChk" value="${p.id}" checked style="margin:0"/> 👤 ${p.name}`;
    wrap.insertBefore(lbl, wrap.lastElementChild);
  }
}
function onIncMonthChange() {
  const sel=document.getElementById('fIncMonth'); if(!sel) return;
  const mKey=sel.value;
  const {y,m}=mkp(mKey);
  const now=new Date();
  const isFut=new Date(y,m,1)>new Date(now.getFullYear(),now.getMonth(),1);
  const list=monthIncomes(y,m);
  const hint=document.getElementById('fIncHint');
  const info=document.getElementById('fIncExisting');
  if(hint) hint.innerHTML=isFut?`<span style="color:var(--am)">⏭ Budget for ${MN[m]} ${y}. Account updates today.</span>`:'';
  if(info){
    if(!list.length){ info.innerHTML='No income recorded yet for this month.'; }
    else {
      const rows=list.map(i=>`${i.type==='Salary'?'💼':'💰'} ${i.type}: <strong>${fmt(i.amount)}</strong>`).join(' &nbsp;·&nbsp; ');
      const total=list.reduce((s,i)=>s+i.amount,0);
      info.innerHTML=rows+`<br><span style="color:var(--t3)">Total so far: ${fmt(total)}</span>`;
    }
  }
}
function onCCPayCardChange() {
  const cardId=document.getElementById('fCPCard')?.value;
  const card=ccById(cardId);
  const el=document.getElementById('fCPOut');
  const mel=document.getElementById('fCPMinDue');
  if(el&&card) el.textContent=fmt(card.outstanding||0);
  if(mel&&card) mel.textContent=card.minDuePct?'Min due: '+fmt((card.outstanding||0)*card.minDuePct/100):'';
  onCCPayTypeChange();
}
function onCCPayTypeChange() {
  const cardId=document.getElementById('fCPCard')?.value;
  const card=ccById(cardId);
  const t=document.getElementById('fCPType')?.value;
  const amtEl=document.getElementById('fCPAmt');
  if(!card||!amtEl) return;
  if(t==='full') amtEl.value=card.outstanding||0;
  else if(t==='minimum') amtEl.value=Math.round((card.outstanding||0)*(card.minDuePct||5)/100);
  else amtEl.value='';
}
function autoCalcEMI() {
  const p=parseFloat(document.getElementById('fEprinc')?.value)||0;
  const r=parseFloat(document.getElementById('fEint')?.value)||0;
  const t=parseInt(document.getElementById('fErem')?.value)||0;
  const emiEl=document.getElementById('fEemi');
  if(p>0&&t>0&&emiEl&&!emiEl.dataset.manual) {
    const emi=calcEMIAmount(p,r,t);
    if(emi>0) emiEl.value=emi;
  }
}
function updateSIPHint() {
  const sip=parseFloat(document.getElementById('fIsip')?.value)||0;

  const el=document.getElementById('sipHint');
  if(el&&sip>0) el.innerHTML=`${fmt(sip)}/mo @ ${ret}% → ${fmt(calcSIPValue(sip,ret,120))} in 10 yrs · ${fmt(calcSIPValue(sip,ret,240))} in 20 yrs`;
  else if(el) el.textContent='';
}

function saveExpense(editId) {
  const cat=document.getElementById('fCat').value;
  const desc=document.getElementById('fDesc').value.trim();
  const billAmt=parseFloat(document.getElementById('fAmt').value);
  const date=document.getElementById('fDate').value;
  const method=document.getElementById('fPayMethod')?.value||'cash';
  const accId=method==='account'?(document.getElementById('fAcc')?.value||''):'';
  const ccId=method==='cc'?(document.getElementById('fCC')?.value||''):'';
  const note=document.getElementById('fNote')?.value||'';
  const recurring=document.getElementById('fRecurring')?.value||'';
  const splitWith=Array.from(document.querySelectorAll('.fSplitChk:checked')).map(el=>el.value);
  const splitIncludeMe=document.getElementById('fSplitIncludeMe')?.checked!==false;
  if(!billAmt||billAmt<=0) return toast('Enter a valid amount','err');
  if(!date) return toast('Pick a date','err');
  if(method==='cc'&&!ccId) return toast('Select a credit card','err');

  const isSplit=splitWith.length>0;
  const shareCount=isSplit?(splitIncludeMe?splitWith.length+1:splitWith.length):1;
  const perShare=isSplit?billAmt/shareCount:billAmt;
  const personalAmt=isSplit?(splitIncludeMe?perShare:0):billAmt;
  const legacyPersonId=(!isSplit)?'':''; // split UI fully replaces the old single-person tag

  if(editId) {
    const ex=expById(editId); if(!ex) return;
    const oldFull=(typeof ex.splitTotal==='number')?ex.splitTotal:ex.amount;
    // Reverse old account/CC effects using the FULL original bill amount
    if(ex.payMethod==='account'&&ex.accountId){const old=accById(ex.accountId);if(old)old.balance+=oldFull;}
    if(ex.payMethod==='cc'&&ex.ccId){const oc=ccById(ex.ccId);if(oc)oc.outstanding=Math.max(0,(oc.outstanding||0)-oldFull);D.data.ccSpends=D.data.ccSpends.filter(s=>s.expenseId!==editId);}
    D.data.friendTxns=D.data.friendTxns.filter(t=>t.expenseId!==editId);
    Object.assign(ex,{category:cat,desc:desc||cat,amount:personalAmt,date,accountId:accId||null,ccId:ccId||null,payMethod:method,note,recurring,
      personId:null,splitWith:isSplit?splitWith:null,splitIncludeMe:isSplit?splitIncludeMe:null,splitTotal:isSplit?billAmt:null});
    if(isSplit) splitWith.forEach(pid=>D.data.friendTxns.push({id:uid(),personId:pid,type:'lent',amount:perShare,date,note:desc||cat,method,expenseId:editId}));
    // Apply new CC/account effects using the full bill amount
    if(method==='account'&&accId) debit(accId,billAmt,desc||cat,date);
    if(method==='cc'&&ccId){
      const card=ccById(ccId);
      if(card){card.outstanding=(card.outstanding||0)+billAmt;D.data.ccSpends.push({id:uid(),cardId:ccId,expenseId:editId,date,desc:desc||cat,amount:billAmt,category:cat,personId:null,splitWith:isSplit?splitWith:null});}
    }
  } else {
    const expId=uid();
    D.data.expenses.push({id:expId,date,category:cat,desc:desc||cat,amount:personalAmt,accountId:accId||null,ccId:ccId||null,payMethod:method,note,recurring,
      personId:null,splitWith:isSplit?splitWith:null,splitIncludeMe:isSplit?splitIncludeMe:null,splitTotal:isSplit?billAmt:null});
    if(method==='account'&&accId) debit(accId,billAmt,desc||cat,date);
    if(method==='cc'&&ccId) {
      const card=ccById(ccId);
      if(card){card.outstanding=(card.outstanding||0)+billAmt;D.data.ccSpends.push({id:uid(),cardId:ccId,expenseId:expId,date,desc:desc||cat,amount:billAmt,category:cat,personId:null,splitWith:isSplit?splitWith:null});}
    }
    if(isSplit) splitWith.forEach(pid=>D.data.friendTxns.push({id:uid(),personId:pid,type:'lent',amount:perShare,date,note:desc||cat,method,expenseId:expId}));
  }
  save(); renderAll(); closeAll();
  const card=ccById(ccId);const acc=accById(accId);
  toast(`✅ ${fmt(billAmt)} ${editId?'updated':'added'}${isSplit?' · split '+shareCount+' ways':card?' on '+card.name:acc?' from '+acc.name:''}`, 'ok');
}

function duplicateExpense(id) {
  const ex = expById(id); if (!ex) return;
  const newId = uid();
  const copy = Object.assign({}, ex, {id:newId, date:td()});
  D.data.expenses.push(copy);
  const fullAmt=(typeof copy.splitTotal==='number')?copy.splitTotal:copy.amount;
  if (copy.payMethod==='account'&&copy.accountId) debit(copy.accountId, fullAmt, '(Duplicate) '+copy.desc, copy.date);
  if (copy.payMethod==='cc'&&copy.ccId) {
    const card=ccById(copy.ccId);
    if (card) {
      card.outstanding=(card.outstanding||0)+fullAmt;
      D.data.ccSpends.push({id:uid(),cardId:copy.ccId,expenseId:newId,date:copy.date,desc:'(Dup) '+copy.desc,amount:fullAmt,category:copy.category,personId:null,splitWith:copy.splitWith||null});
    }
  }
  if (copy.splitWith&&copy.splitWith.length) {
    const shareCount=copy.splitIncludeMe?copy.splitWith.length+1:copy.splitWith.length;
    const perShare=fullAmt/shareCount;
    copy.splitWith.forEach(pid=>D.data.friendTxns.push({id:uid(),personId:pid,type:'lent',amount:perShare,date:copy.date,note:'(Dup) '+copy.desc,method:copy.payMethod,expenseId:newId}));
  }
  save(); renderAll(); closeAll();
  toast('✅ Expense duplicated for today','ok');
}

function viewChitHistory(chitId) {
  const c=chitById(chitId); if(!c) return;
  if(!c.contribHistory) c.contribHistory={};
  const histKeys=Object.keys(c.contribHistory).sort().reverse().slice(0,24);
  const now=new Date();
  const currentKey=mk(now.getFullYear(),now.getMonth());
  const futureMonths=[];
  for(let i=1;i<=3;i++){const fd=new Date(now.getFullYear(),now.getMonth()+i,1);futureMonths.push(mk(fd.getFullYear(),fd.getMonth()));}
  const allKeys=[...new Set([currentKey,...futureMonths,...histKeys])].sort().reverse();
  openMod('📅 Contribution History: '+c.name,`
    <div style="background:var(--card2);border-radius:var(--rr);padding:11px;margin-bottom:13px">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">

        <div><div style="font-size:.58rem;color:var(--t3)">Contributed</div><div style="font-family:var(--fm);font-size:.9rem;color:var(--g)">${chitContributedMonths(chitId)}/${c.months}</div></div>
        <div><div style="font-size:.58rem;color:var(--t3)">Total Paid In</div><div style="font-family:var(--fm);font-size:.9rem;color:var(--am)">${fmt(chitContributedMonths(chitId)*c.monthly)}</div></div>
      </div>
    </div>
    <div style="font-size:.75rem;font-weight:500;margin-bottom:8px;color:var(--t2)">Month-wise Contribution History</div>
    <div style="display:flex;flex-direction:column;gap:2px">
      ${allKeys.map(key=>{
        const {y,m}=mkp(key);
        const st=c.contribHistory[key]||{status:key>currentKey?'upcoming':'pending'};
        const isCur=key===currentKey; const isFut=key>currentKey;
        const statusLabel=isFut?'upcoming':st.status;
        const colors={paid:'var(--g)',pending:'var(--am)',partial:'var(--bl)',skipped:'var(--r)',upcoming:'var(--t3)'};
        return `<div class="emi-hist-row" style="${isCur?'background:var(--card2);border-radius:6px;padding:5px 7px':''}">
          <span class="emi-hist-month">${MS[m]} ${y}${isCur?' ●':''}</span>
          <span class="emi-hist-status ${statusLabel}" style="color:${colors[statusLabel]||'var(--t2)'};background:${colors[statusLabel]||'var(--t2)'}18">${statusLabel.toUpperCase()}</span>
          ${st.paidAmt>0?`<span class="emi-hist-amt">${fmt(st.paidAmt)}</span>`:''}
          ${st.paidDate?`<span class="emi-hist-date">${st.paidDate}</span>`:''}
          ${!isFut&&statusLabel!=='paid'?`<span class="paybtn" style="font-size:.58rem;margin-left:4px" onclick="closeAll();quickPayChit('${chitId}')">Pay</span>`:''}
        </div>`;
      }).join('')}
    </div>`);
}

  const amt=parseFloat(document.getElementById('fCRamt')?.value)||0;
  const el=document.getElementById('fCRdiff');
  if(!el||!amt) return;
  const diff=amt-expected;
  el.innerHTML=diff===0?'✅ Exact match':(diff>0?`<span style="color:var(--g)">▲ ${fmt(diff)} more than calculated</span>`:`<span style="color:var(--am)">▼ ${fmt(Math.abs(diff))} less than calculated</span>`);
}
function saveChitPayout(id) {
  const c=chitById(id); if(!c) return;
  const amt=parseFloat(document.getElementById('fCRamt').value)||0;
  const accId=document.getElementById('fCRacc').value;
  const date=document.getElementById('fCRdate').value;
  const status=document.getElementById('fCRstatus').value;
  if(!amt||amt<=0) return toast('Enter received amount','err');
  c.actualReceived=(c.actualReceived||0)+amt;
  c.payouts=c.payouts||[];
  c.payouts.push({amount:amt,date,accountId:accId});
  if(status==='closed') c.status='closed';
  if(accId) credit(accId,amt,'Chit payout: '+c.name,date);
  save(); renderAll(); closeAll();
  const expected=c.totalExpected||c.monthly*c.months||0;
  const diff=amt-expected;
  toast(`✅ ${fmt(amt)} received${Math.abs(diff)>0?' ('+(diff>=0?'+':'')+fmt(diff)+' vs calc)':''}`,'ok');
}

function saveBudgets() {
  const mKey=mk(D.sel.y,D.sel.m);
  D.data.budgets=D.data.budgets.filter(b=>b.month!==mKey);
  ['food','groceries','dining','transport','fuel','shopping','bills','health','entertainment','travel','recharge','subscription'].forEach(cat=>{
    const val=parseFloat(document.getElementById('bgt_'+cat)?.value)||0;
    if(val>0) D.data.budgets.push({id:uid(),category:cat,amount:val,month:mKey});
  });
  save(); renderAll(); closeAll(); toast('✅ Budgets saved','ok');
}

function saveGoal(editId) {
  if(!D.data.goals) D.data.goals=[];
  const emoji=document.getElementById('fGemoji').value||'🎯';
  const name=document.getElementById('fGname').value.trim();
  const target=parseFloat(document.getElementById('fGtarget').value)||0;
  const saved=parseFloat(document.getElementById('fGsaved').value)||0;
  if(!name||!target) return toast('Enter name and target amount','err');
  if(editId) {
    const g=D.data.goals.find(g=>g.id===editId); if(!g) return;
    Object.assign(g,{emoji,name,target,saved});
  } else {
    D.data.goals.push({id:uid(),emoji,name,target,saved});
  }
  save(); renderAll(); closeAll(); toast('✅ Goal saved','ok');
}
function editGoal(id) { openAdd('goal',id); }
function deleteGoal(id) {
  if(!confirm('Delete this goal?')) return;
  D.data.goals=(D.data.goals||[]).filter(g=>g.id!==id);
  save(); renderAll(); closeAll(); toast('Goal deleted','ok');
}

function saveSettings() {
  const def=parseFloat(document.getElementById('sDef').value)||0;
  const pin=document.getElementById('sPin').value;
  const pin2=document.getElementById('sPin2').value;
  const autoLockEl=document.getElementById('sAutoLock');
  D.data.defaultIncome=def;
  if(autoLockEl) D.data.settings.autoLock = autoLockEl.value!=='no';
  if(pin){
    if(!/^\d{4}$/.test(pin)) return toast('PIN must be 4 digits','err');
    if(pin!==pin2) return toast('PINs do not match','err');
    D.pin=pin; D.data.settings.pin=pin;
  }
  save(); renderAll(); closeAll(); toast('✅ Settings saved','ok');
}

function clearSection(key, label) {
  if(!confirm(`Clear ALL ${label}? This only affects ${label} — nothing else is touched.`)) return;
  if(key==='ccCards') {
    D.data.ccCards=[]; D.data.ccSpends=[]; D.data.ccPayments=[];
  } else if(key==='expenses') {
    D.data.expenses=[];
    // Also remove CC spend links
    D.data.ccSpends=[];
  } else if(key==='people') {
    D.data.people=[]; D.data.friendTxns=[];
  } else {
    D.data[key]=[];
  }
  if(key==='accounts') D.data.transactions=[];
  save(); renderAll(); closeAll();
  toast(`✅ ${label} cleared`,'ok');
}

function clearAllData() {
  localStorage.removeItem('sw4'); localStorage.removeItem('sw4pin');
  location.reload();
}

function closeAll() {
  document.getElementById('modMain').classList.remove('on');

let _tt;
function toast(msg,type='') {
  const el=document.getElementById('toast');

  el.className='toast show'+(type?' '+type:'');

function showInstallBanner() {
  if(!_dp||document.getElementById('iBanner')) return;
  var b=document.createElement('div');
  b.id='iBanner';
  b.style.cssText='position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#6c63ff,#a78bfa);color:#fff;border-radius:28px;padding:10px 18px;display:flex;align-items:center;gap:10px;font-family:DM Sans,sans-serif;font-size:.82rem;font-weight:500;box-shadow:0 4px 24px rgba(108,99,255,.4);z-index:999;white-space:nowrap;max-width:92vw;';
  var icon=document.createElement('span');icon.textContent='📲';icon.style.fontSize='1.1rem';

  btn.addEventListener('click',installPWA);
  var close=document.createElement('span');close.textContent='✕';close.style.cssText='opacity:.7;padding:2px 4px;cursor:pointer';
  close.addEventListener('click',function(){b.remove();});
  b.appendChild(icon);b.appendChild(label);b.appendChild(btn);b.appendChild(close);
  document.body.appendChild(b);
}
function installPWA() {
  if(!_dp) return;
  _dp.prompt();
  _dp.userChoice.then(function(r){
    _dp=null;
    var b=document.getElementById('iBanner');if(b)b.remove();
    if(r.outcome==='accepted')toast('SpendWise installed!','ok');
  });
}
window.addEventListener('appinstalled',function(){
  var b=document.getElementById('iBanner');if(b)b.remove();_dp=null;
});
