<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#09090f"/>
<title>SpendWise — Finance OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090f;--bg2:#0f0f1a;--card:#13132a;--card2:#1a1a30;
  --border:#ffffff0d;--b2:#ffffff16;
  --ac:#6c63ff;--ac2:#a78bfa;
  --g:#10d9a0;--r:#ff4d6d;--am:#f59e0b;--bl:#38bdf8;
  --t:#eeeeff;--t2:#9090b8;--t3:#50507a;
  --fd:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--fm:'JetBrains Mono',monospace;
  --rr:11px;--r2:18px;
}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{font-family:var(--fb);background:var(--bg);color:var(--t);min-height:100dvh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 50% at 15% 0%,#6c63ff11,transparent 60%),
             radial-gradient(ellipse 50% 40% at 85% 100%,#10d9a00d,transparent 60%)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#ffffff15;border-radius:2px}

/* ── LOCK ── */
#lock{position:fixed;inset:0;z-index:9999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.ll{font-family:var(--fd);font-size:1.8rem;font-weight:800;letter-spacing:-1px;
  background:linear-gradient(135deg,var(--ac),var(--ac2),var(--g));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ls{color:var(--t3);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase}
.pd{display:flex;gap:10px}
.pdd{width:11px;height:11px;border-radius:50%;border:2px solid var(--b2);transition:.2s}
.pdd.on{background:var(--ac);border-color:var(--ac);box-shadow:0 0 10px var(--ac)}
.ppad{display:grid;grid-template-columns:repeat(3,64px);gap:8px}
.pb{width:64px;height:64px;border-radius:50%;border:1px solid var(--b2);background:var(--card);
  color:var(--t);font-family:var(--fd);font-size:1.2rem;font-weight:600;
  cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center}
.pb:active{background:var(--ac);transform:scale(.91)}
.pb.z{grid-column:2}.pb.dl{grid-column:3;font-size:.85rem;color:var(--t2)}
.ph{color:var(--t3);font-size:.68rem}.pe{color:var(--r);animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* ── APP SHELL ── */
#app{display:none;flex-direction:column;min-height:100dvh;position:relative;z-index:1}
.topbar{padding:14px 13px 0;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;background:linear-gradient(to bottom,var(--bg) 80%,transparent)}
.tl{font-family:var(--fd);font-size:1.1rem;font-weight:800;
  background:linear-gradient(135deg,var(--ac),var(--ac2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tm{display:flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border);
  border-radius:28px;padding:5px 10px;cursor:pointer;font-size:.76rem;color:var(--t2)}
.tbb{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);
  background:var(--card);color:var(--t2);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.85rem;transition:.15s}
.tbb:active{background:var(--card2)}

/* ── PAGES ── */
.pg{display:none}.pg.on{display:block}
.cnt{padding:12px 12px 88px;display:flex;flex-direction:column;gap:13px}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,#15163a 0%,#0f182e 55%,#0a1220 100%);
  border:1px solid var(--b2);border-radius:var(--r2);padding:18px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-24px;right:-24px;width:110px;height:110px;
  border-radius:50%;background:radial-gradient(#6c63ff16,transparent 70%);pointer-events:none}
.hl{color:var(--t3);font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px}
.ha{font-family:var(--fd);font-size:2rem;font-weight:800;letter-spacing:-2px;line-height:1}
.ha .rr{font-size:1.3rem;font-weight:400;color:var(--t2)}
.ht{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-top:4px;font-size:.73rem;color:var(--t2)}
.up{color:var(--g)}.dn{color:var(--r)}
.hs{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:14px}
.hsi{background:#ffffff05;border-radius:8px;padding:8px 4px;text-align:center}
.hsil{font-size:.56rem;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.hsiv{font-family:var(--fm);font-size:.8rem;font-weight:500}

/* ── NOTICE BANNERS ── */
.notice{border-radius:11px;padding:10px 12px;display:flex;align-items:flex-start;gap:8px;font-size:.76rem;line-height:1.5}
.notice.am{background:#f59e0b0d;border:1px solid #f59e0b26}
.notice.g{background:#10d9a00d;border:1px solid #10d9a026}
.notice.bl{background:#38bdf80d;border:1px solid #38bdf826}
.notice.r{background:#ff4d6d0d;border:1px solid #ff4d6d26}
.notice strong{color:var(--t);font-weight:600}

/* ── ACCOUNTS STRIP ── */
.astrip{display:flex;gap:8px;overflow-x:auto;padding-bottom:3px;scroll-snap-type:x mandatory}
.astrip::-webkit-scrollbar{height:0}
.achip{min-width:145px;scroll-snap-align:start;background:var(--card);border:1px solid var(--border);
  border-radius:13px;padding:11px;flex-shrink:0;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.achip.low{border-color:#f59e0b40}
.acb{font-size:.6rem;color:var(--t3);text-transform:uppercase;letter-spacing:.09em}
.acn{font-size:.82rem;font-weight:500;margin:2px 0}
.aca{font-family:var(--fm);font-size:.98rem;font-weight:500;color:var(--g)}
.act{display:inline-block;font-size:.58rem;background:var(--ac)16;color:var(--ac2);padding:2px 6px;border-radius:20px;margin-top:3px}
.aadd{min-width:95px;scroll-snap-align:start;background:transparent;border:1px dashed var(--b2);
  border-radius:13px;padding:11px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:4px;cursor:pointer;flex-shrink:0;color:var(--t3);font-size:.68rem;transition:.2s}
.aadd:hover{border-color:var(--ac);color:var(--ac)}

/* ── QUICK ACTIONS ── */
.qg{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.qb{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:.18s}
.qb:active{transform:scale(.94);background:var(--card2)}
.qi{font-size:1.15rem}.ql{font-size:.59rem;color:var(--t2);text-align:center;font-weight:500}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:15px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.st{font-family:var(--fd);font-size:.88rem;font-weight:700}
.sa{color:var(--ac);font-size:.72rem;cursor:pointer}

/* ── CHART ── */
.cbr{display:flex;align-items:flex-end;gap:4px;height:68px;padding:2px 0}
.bw{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.bar{width:100%;border-radius:3px 3px 0 0;background:linear-gradient(to top,var(--ac),var(--ac2));transition:height .4s ease;min-height:2px}
.bw.cur .bar{background:linear-gradient(to top,var(--g),#34d399)}
.bl2{font-size:.52rem;color:var(--t3)}.bamt{font-size:.48rem;color:var(--t2);font-family:var(--fm)}

/* ── TRANSACTIONS ── */
.txl{display:flex;flex-direction:column;gap:5px}
.txi{display:flex;align-items:center;gap:8px;padding:9px 10px;background:var(--card2);border-radius:var(--rr);border:1px solid var(--border);cursor:pointer}
.tico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.tico.sp{background:#ff4d6d12}.tico.sv{background:#10d9a012}.tico.em{background:#6c63ff12}.tico.cr{background:#10d9a012}
.txn{font-size:.8rem;font-weight:500}.txs{font-size:.62rem;color:var(--t3);margin-top:1px}
.txa{font-family:var(--fm);font-size:.84rem;font-weight:500;white-space:nowrap}
.txa.db{color:var(--r)}.txa.cb{color:var(--g)}

/* ── EMI ── */
.eil{display:flex;flex-direction:column;gap:7px}
.ei{background:var(--card2);border:1px solid var(--border);border-radius:var(--rr);
  padding:11px 12px;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden}
.ei::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(to bottom,var(--ac),var(--ac2));border-radius:2px 0 0 2px}
.ei.cl::before{background:linear-gradient(to bottom,var(--am),#fcd34d)}
.eii{font-size:1.1rem;flex-shrink:0}
.ein{flex:1;min-width:0}
.enn{font-size:.82rem;font-weight:500}
.enm{font-size:.62rem;color:var(--t3);margin-top:1px}
.ep{height:3px;background:var(--b2);border-radius:2px;margin-top:5px}
.ebar{height:100%;border-radius:2px;background:linear-gradient(to right,var(--ac),var(--ac2))}
.eir{text-align:right;flex-shrink:0}
.eia{font-family:var(--fm);font-size:.9rem;font-weight:500;color:var(--am)}
.eil2{font-size:.6rem;color:var(--t3);margin-top:2px}
.paybtn{font-size:.6rem;background:var(--ac)18;color:var(--ac2);border:1px solid var(--ac)36;
  border-radius:20px;padding:3px 8px;cursor:pointer;margin-top:3px;display:inline-block;transition:.15s}
.paybtn:active{background:var(--ac);color:#fff}

/* ── INVESTMENTS ── */
.invg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.invc{background:var(--card2);border:1px solid var(--border);border-radius:var(--rr);padding:11px}
.invt{font-size:.6rem;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.invn{font-size:.8rem;font-weight:500;margin:3px 0 2px}
.inva{font-family:var(--fm);font-size:.92rem;color:var(--g);font-weight:500}
.invr{font-size:.62rem;color:var(--ac2);margin-top:2px}

/* ── PROGRESS BAR ── */
.pb2{height:6px;background:var(--b2);border-radius:4px;margin-top:5px;overflow:hidden}
.pf{height:100%;border-radius:4px;transition:width .5s ease}
.pf.g{background:linear-gradient(to right,var(--g),#34d399)}.pf.a{background:linear-gradient(to right,var(--am),#fcd34d)}
.pf.r{background:linear-gradient(to right,var(--r),#f87171)}.pf.bl{background:linear-gradient(to right,var(--bl),#7dd3fc)}

/* ── BADGE ── */
.bdg{display:inline-flex;align-items:center;font-size:.6rem;padding:2px 7px;border-radius:20px;font-weight:600}
.bdg.g{background:#10d9a014;color:var(--g)}.bdg.r{background:#ff4d6d14;color:var(--r)}
.bdg.a{background:#f59e0b14;color:var(--am)}.bdg.bl{background:#38bdf814;color:var(--bl)}
.bdg.p{background:#6c63ff14;color:var(--ac2)}

/* ── ADVISER ── */
.advc{background:linear-gradient(135deg,#181e3a,#0f1628);border:1px solid #6c63ff22;
  border-radius:var(--r2);padding:15px;position:relative;overflow:hidden}
.advc::before{content:'';position:absolute;top:-16px;right:-16px;width:80px;height:80px;
  border-radius:50%;background:radial-gradient(#6c63ff22,transparent 70%)}
.advh{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.advav{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));
  display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.advn{font-family:var(--fd);font-size:.9rem;font-weight:700}
.advst{font-size:.62rem;color:var(--g);display:flex;align-items:center;gap:3px}
.advst::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--g);display:inline-block}
.insl{display:flex;flex-direction:column;gap:7px}
.ins{background:#ffffff04;border-radius:8px;padding:10px;font-size:.76rem;line-height:1.55;color:var(--t2);border-left:2px solid var(--ac)}
.ins.w{border-color:var(--am);background:#f59e0b04}.ins.ok{border-color:var(--g);background:#10d9a004}
.ins.tip{border-color:var(--bl);background:#38bdf804}
.ins strong{color:var(--t);font-weight:500}
.askrow{display:flex;gap:6px;margin-top:10px}
.askin{flex:1;background:#ffffff06;border:1px solid var(--b2);border-radius:26px;
  padding:8px 12px;color:var(--t);font-family:var(--fb);font-size:.79rem;outline:none;transition:.2s}
.askin:focus{border-color:var(--ac)}.askin::placeholder{color:var(--t3)}
.askgo{background:var(--ac);border:none;border-radius:26px;padding:8px 14px;
  color:#fff;font-weight:600;font-size:.79rem;cursor:pointer;white-space:nowrap;transition:.2s}
.askgo:active{transform:scale(.95)}
.typ{display:flex;align-items:center;gap:3px;padding:6px 0}
.tyd{width:5px;height:5px;border-radius:50%;background:var(--ac2);animation:tyd 1.2s infinite}
.tyd:nth-child(2){animation-delay:.2s}.tyd:nth-child(3){animation-delay:.4s}
@keyframes tyd{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--bg2);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:5px 0 calc(6px + env(safe-area-inset-bottom))}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:5px 0;position:relative}
.niic{font-size:1.05rem;transition:.15s}.nilb{font-size:.57rem;color:var(--t3);font-weight:500}
.ni.on .nilb{color:var(--ac)}.ni.on .niic{transform:translateY(-2px)}
.ni.on::after{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:18px;height:2px;background:var(--ac);border-radius:0 0 2px 2px}
.nadd{width:46px;height:46px;border-radius:50%;margin:0 3px;flex-shrink:0;
  background:linear-gradient(135deg,var(--ac),var(--ac2));
  display:flex;align-items:center;justify-content:center;font-size:1.25rem;
  box-shadow:0 4px 16px #6c63ff45;cursor:pointer;transition:.18s}
.nadd:active{transform:scale(.91)}

/* ── MODALS ── */
.ov{position:fixed;inset:0;z-index:500;background:#00000085;display:flex;align-items:flex-end;
  justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.ov.on{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border-radius:18px 18px 0 0;border:1px solid var(--border);border-bottom:none;
  width:100%;max-width:520px;transform:translateY(100%);transition:transform .26s cubic-bezier(.34,1.56,.64,1);max-height:92dvh;overflow-y:auto}
.ov.on .modal{transform:translateY(0)}
.mh{width:34px;height:3px;background:var(--b2);border-radius:2px;margin:8px auto 0}
.mhd{padding:14px 14px 0;display:flex;align-items:center;justify-content:space-between}
.mt{font-family:var(--fd);font-size:.95rem;font-weight:700}
.mc{width:26px;height:26px;border-radius:50%;background:var(--card2);border:none;color:var(--t2);font-size:.88rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mb{padding:14px}

/* ── FORMS ── */
.fg{margin-bottom:12px}
.fl{font-size:.7rem;color:var(--t2);margin-bottom:4px;display:block;font-weight:500}
.fi,.fs{width:100%;background:var(--card);border:1px solid var(--b2);border-radius:var(--rr);
  padding:10px 11px;color:var(--t);font-family:var(--fb);font-size:.84rem;outline:none;transition:.2s;appearance:none;-webkit-appearance:none}
.fi:focus,.fs:focus{border-color:var(--ac)}.fs option{background:var(--card2);color:var(--t)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fhint{font-size:.63rem;color:var(--t3);margin-top:3px}
.sbtn{width:100%;padding:12px;border-radius:var(--rr);border:none;
  background:linear-gradient(135deg,var(--ac),var(--ac2));
  color:#fff;font-family:var(--fd);font-size:.88rem;font-weight:700;cursor:pointer;transition:.15s;letter-spacing:.02em}
.sbtn:active{transform:scale(.98)}
.sbtn.sec{background:var(--card2);border:1px solid var(--b2);color:var(--t2)}
.tabrow{display:flex;background:var(--card);border-radius:9px;padding:3px;gap:3px;margin-bottom:14px}
.tab{flex:1;padding:7px;border-radius:6px;border:none;background:transparent;
  color:var(--t2);font-size:.78rem;font-weight:500;cursor:pointer;transition:.15s;font-family:var(--fb)}
.tab.on{background:var(--ac);color:#fff}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:.74rem}
.tbl th{text-align:left;padding:6px 7px;color:var(--t3);font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);font-weight:500}
.tbl td{padding:6px 7px;border-bottom:1px solid var(--border);color:var(--t2)}
.tbl tr:last-child td{border:none}
.tbl .mn{color:var(--t);font-family:var(--fm);font-size:.74rem}

/* ── MISC ── */
.divider{height:1px;background:var(--border);margin:2px 0}
.empty{text-align:center;padding:30px 14px;color:var(--t3)}
.empty .eic{font-size:1.8rem;margin-bottom:8px}.empty .em{font-size:.78rem;line-height:1.5}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-60px);
  background:var(--card2);border:1px solid var(--b2);border-radius:26px;
  padding:8px 15px;font-size:.78rem;color:var(--t);z-index:9999;
  transition:transform .26s cubic-bezier(.34,1.56,.64,1);
  display:flex;align-items:center;gap:5px;white-space:nowrap;box-shadow:0 4px 20px #00000050}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--g);color:var(--g)}.toast.err{border-color:var(--r);color:var(--r)}
@keyframes fi2{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fi2{animation:fi2 .24s ease both}
@media(min-width:520px){
  .cnt{padding-left:calc((100vw - 520px)/2 + 12px);padding-right:calc((100vw - 520px)/2 + 12px)}
  .bnav{justify-content:center}
}
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock">
  <div class="ll">💰 SpendWise</div>
  <div class="ls">Finance OS</div>
  <div class="pd">
    <div class="pdd" id="pd0"></div><div class="pdd" id="pd1"></div>
    <div class="pdd" id="pd2"></div><div class="pdd" id="pd3"></div>
  </div>
  <div class="ppad">
    <button class="pb" onclick="pp('1')">1</button><button class="pb" onclick="pp('2')">2</button><button class="pb" onclick="pp('3')">3</button>
    <button class="pb" onclick="pp('4')">4</button><button class="pb" onclick="pp('5')">5</button><button class="pb" onclick="pp('6')">6</button>
    <button class="pb" onclick="pp('7')">7</button><button class="pb" onclick="pp('8')">8</button><button class="pb" onclick="pp('9')">9</button>
    <button class="pb z" onclick="pp('0')">0</button><button class="pb dl" onclick="pd()">⌫</button>
  </div>
  <div class="ph" id="phint">Default PIN: 1234</div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tl">💰 SpendWise</div>
    <div class="tm" onclick="openMonthPicker()"><span id="tMonth">—</span> ▾</div>
    <div style="display:flex;gap:5px">
      <div class="tbb" onclick="openPage('Adviser')" title="AI Adviser">🤖</div>
      <div class="tbb" onclick="openSettings()" title="Settings">⚙️</div>
    </div>
  </div>

  <div id="pgHome"    class="pg on"><div class="cnt" id="cHome"></div></div>
  <div id="pgEMI"     class="pg">   <div class="cnt" id="cEMI"></div></div>
  <div id="pgSavings" class="pg">   <div class="cnt" id="cSavings"></div></div>
  <div id="pgReport"  class="pg">   <div class="cnt" id="cReport"></div></div>
  <div id="pgAdviser" class="pg">   <div class="cnt" id="cAdviser"></div></div>

  <div class="bnav">
    <div class="ni on" id="nHome"    onclick="openPage('Home')">   <div class="niic">🏠</div><div class="nilb">Home</div></div>

  </div>
</div>

    <div class="mb" id="modSetB"></div>
  </div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
const D = {
  pin: '1234',
  sel: null,          // {y, m} — selected month
  startMonth: null,   // {y, m} — the month user set up the app
  data: {
    accounts: [],     // {id, name, bank, type, balance, alert}
    expenses: [],     // {id, date, category, desc, amount, accountId, note}
    incomes: [],      // {id, date, amount, type, accountId, budgetMonth} — budgetMonth = 'YYYY-MM'
    emis: [],         // {id, name, monthly, dueDay, remaining, total, interest, type, accountId, startYM}
    investments: [],  // {id, name, type, principal, interest, startDate, maturityDate, sip, sipAccountId, currentValue}
    transactions: [], // ledger {id, accountId, type:'cr'|'dr', amount, desc, date}
    defaultIncome: 0,
    budgetIncome: {},  // 'YYYY-MM' -> number
    settings: { pin:'1234', activationMonth: null }
  }
};

// ════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════
const MN = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const td   = () => new Date().toISOString().split('T')[0];
const mk   = (y, m) => `${y}-${String(m+1).padStart(2,'0')}`;  // m is 0-based
const mkp  = s => { const [y,m] = s.split('-'); return {y:+y, m:+m-1}; };
const fmt  = n => '₹' + Math.abs(n||0).toLocaleString('en-IN',{maximumFractionDigits:0});
const fmtD = n => (n<0?'-':'')+fmt(Math.abs(n));
const accById = id => D.data.accounts.find(a=>a.id===id);

const CAT_ICONS = {food:'🍔',groceries:'🛒',transport:'🚗',fuel:'⛽',shopping:'🛍️',
  bills:'⚡',health:'💊',entertainment:'🎬',dining:'🍽️',travel:'✈️',
  recharge:'📱',gym:'💪',insurance:'🛡️',rent:'🏠',education:'📚',
  emi:'🔁',savings:'💰',salary:'💼',other:'📦'};
const EMI_ICONS = {home:'🏠',car:'🚗',personal:'💳',education:'📚',device:'📱',other:'📦'};
const INV_LABELS = {fd:'Fixed Deposit',rd:'Recurring Deposit',mf:'Mutual Fund',
  gold:'Gold',ppf:'PPF/NPS',stocks:'Stocks',crypto:'Crypto',insurance:'Insurance/ULIP',other:'Other'};

// ════════════════════════════════════════════════
//  STORAGE
// ════════════════════════════════════════════════
function save() { localStorage.setItem('sw3', JSON.stringify(D.data)); localStorage.setItem('sw3pin', D.pin); }
function load() {
  const raw = localStorage.getItem('sw3');
  if (raw) {
    const p = JSON.parse(raw);
    ['accounts','expenses','incomes','emis','investments','transactions'].forEach(k=>{ if(!p[k]) p[k]=[]; });
    if(!p.budgetIncome) p.budgetIncome={};
    if(!p.settings) p.settings={pin:'1234',activationMonth:null};
    D.data = p;
  }
  D.pin = localStorage.getItem('sw3pin') || D.data.settings?.pin || '1234';
}

// ════════════════════════════════════════════════
//  ACTIVATION / START MONTH
// ════════════════════════════════════════════════
function getActivationYM() {
  if (D.data.settings.activationMonth) return mkp(D.data.settings.activationMonth);
  const now = new Date();
  return { y: now.getFullYear(), m: now.getMonth() };
}
// Returns true if a given {y,m} is the activation month or earlier
function isSetupMonth(y, m) {
  const act = getActivationYM();
  return y < act.y || (y === act.y && m <= act.m);
}
// "Deductions active from next month" — EMI auto-deductions only fire from the month AFTER activation
function deductionsActive(y, m) {
  const act = getActivationYM();
  const actNext = new Date(act.y, act.m + 1, 1);
  const target  = new Date(y, m, 1);
  return target >= actNext;
}

// ════════════════════════════════════════════════
//  ACCOUNT OPS
// ════════════════════════════════════════════════
function debit(accountId, amount, desc, date) {
  if (!accountId || amount <= 0) return;
  const acc = accById(accountId);
  if (!acc) return;
  acc.balance -= amount;
  if (acc.balance < 0 && (acc.alert || 0) > 0) toast('⚠ Low balance on ' + acc.name, 'err');
  else if (acc.alert && acc.balance < acc.alert)  toast('⚠ Balance below alert on ' + acc.name, 'err');
  D.data.transactions.push({id:uid(), accountId, type:'dr', amount, desc, date: date||td()});
}
function credit(accountId, amount, desc, date) {
  if (!accountId || amount <= 0) return;
  const acc = accById(accountId);
  if (!acc) return;
  acc.balance += amount;
  D.data.transactions.push({id:uid(), accountId, type:'cr', amount, desc, date: date||td()});
}

// ════════════════════════════════════════════════
//  MONTH DATA ACCESSORS
// ════════════════════════════════════════════════
function monthExpenses(y, m) {
  const key = mk(y, m);
  return D.data.expenses.filter(e => e.date.startsWith(key));
}
function monthIncome(y, m) {
  const key = mk(y, m);
  return D.data.budgetIncome[key] || D.data.defaultIncome || 0;
}
function totalEMI() {
  return D.data.emis.filter(e=>e.remaining>0).reduce((s,e)=>s+e.monthly,0);
}
function totalBalance() {
  return D.data.accounts.reduce((s,a)=>s+a.balance,0);
}
function totalInvestments() {
  return D.data.investments.reduce((s,i)=>s+(i.currentValue||i.principal||0),0);
}
function totalSIP() {
  return D.data.investments.filter(i=>i.sip>0).reduce((s,i)=>s+i.sip,0);
}

// ════════════════════════════════════════════════
//  INTEREST CALCULATIONS
// ════════════════════════════════════════════════
// Compound interest for FD / investments
function calcMaturityValue(principal, annualRate, startDate, maturityDate) {
  if (!principal || !annualRate || !startDate || !maturityDate) return principal;
  const s = new Date(startDate), e = new Date(maturityDate);
  const years = Math.max(0, (e - s) / (365.25 * 24 * 3600 * 1000));
  return Math.round(principal * Math.pow(1 + annualRate/100, years));
}
// SIP future value  FV = P * [((1+r)^n - 1) / r] * (1+r)
function calcSIPValue(monthlyAmt, annualRate, months) {
  if (!monthlyAmt || !months) return 0;
  const r = annualRate / 100 / 12;
  if (r === 0) return monthlyAmt * months;
  return Math.round(monthlyAmt * ((Math.pow(1+r, months)-1)/r) * (1+r));
}
// EMI total interest paid
function emiInterestPaid(monthly, remaining, total, annualRate) {
  if (!annualRate || !total) return 0;
  const r = annualRate / 100 / 12;
  const original = monthly * total;
  const principal = r > 0 ? monthly * (1 - Math.pow(1+r, -total)) / r : monthly * total;
  return Math.round(original - principal);
}

// ════════════════════════════════════════════════
//  PIN LOCK
// ════════════════════════════════════════════════
let pinBuf = '';
function pp(d) {
  if (pinBuf.length >= 4) return;
  pinBuf += d;
  document.getElementById('pd'+(pinBuf.length-1)).classList.add('on');
  if (pinBuf.length === 4) {
    setTimeout(() => {
      if (pinBuf === D.pin) {
        const lock = document.getElementById('lock');
        lock.style.transition = '.25s'; lock.style.opacity = '0';
        setTimeout(() => {
          lock.style.display = 'none';
          document.getElementById('app').style.display = 'flex';
          renderAll();
        }, 250);
      } else {
        document.getElementById('phint').innerHTML = '<span class="pe">Wrong PIN</span>';
        pinBuf = '';
        for(let i=0;i<4;i++) document.getElementById('pd'+i).classList.remove('on');
      }
    }, 120);
  }
}
function pd() {
  if (!pinBuf.length) return;
  pinBuf = pinBuf.slice(0,-1);
  document.getElementById('pd'+pinBuf.length).classList.remove('on');
}

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
function init() {
  load();
  const now = new Date();
  D.sel = { y: now.getFullYear(), m: now.getMonth() };
  if (!D.data.settings.activationMonth) {
    D.data.settings.activationMonth = mk(now.getFullYear(), now.getMonth());
    save();
  }
  setTopMonth();
}

function setTopMonth() {
  document.getElementById('tMonth').textContent = MS[D.sel.m] + ' ' + D.sel.y;
}

// ════════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════════
function openPage(name) {
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  document.getElementById('pg'+name).classList.add('on');
  const nav = document.getElementById('n'+name);
  if (nav) nav.classList.add('on');
  renderPage(name);
}
function renderPage(name) {
  if (name==='Home')    renderHome();
  if (name==='EMI')     renderEMI();
  if (name==='Savings') renderSavings();
  if (name==='Report')  renderReport();
  if (name==='Adviser') renderAdviser();
}
function renderAll() {
  setTopMonth();
  renderHome();
  // Only render active page (avoid re-rendering invisible pages)
  const cur = document.querySelector('.pg.on');
  if (cur) {
    const id = cur.id.replace('pg','');
    if (id !== 'Home') renderPage(id);
  }
}

function openMonthPicker() {
  const now = new Date();
  const opts = [];
  for (let i = -6; i <= 2; i++) {
    const d = new Date(now.getFullYear(), now.getMonth()+i, 1);
    opts.push({y:d.getFullYear(), m:d.getMonth()});
  }
  openMod('Select Month', opts.map(o=>{
    const isCur = o.y===now.getFullYear()&&o.m===now.getMonth();
    const isSel = o.y===D.sel.y&&o.m===D.sel.m;
    const isFut = new Date(o.y,o.m,1) > new Date(now.getFullYear(),now.getMonth(),1);
    return `<div style="padding:11px 12px;border-radius:9px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;
      background:${isSel?'var(--ac)18':'transparent'};border:1px solid ${isSel?'var(--ac)40':'transparent'};margin-bottom:5px"
      onclick="selMonth(${o.y},${o.m})">
      <span style="font-size:.86rem">${MN[o.m]} ${o.y}</span>
      ${isCur?'<span class="bdg p">Now</span>':''}${isFut?'<span class="bdg bl">Future</span>':''}
    </div>`;
  }).join(''));
}
function selMonth(y, m) {
  D.sel = {y, m}; closeAll(); renderAll();
}

// ════════════════════════════════════════════════
//  HOME PAGE
// ════════════════════════════════════════════════
function renderHome() {
  const {y, m} = D.sel;
  const exps    = monthExpenses(y, m);
  const income  = monthIncome(y, m);
  const spent   = exps.reduce((s,e)=>s+e.amount, 0);
  const emiAmt  = totalEMI();
  const sipAmt  = totalSIP();
  const bal     = totalBalance();
  const invTot  = totalInvestments();
  const saved   = income - spent - emiAmt - sipAmt;
  const savePct = income > 0 ? Math.max(0, Math.min(100, saved/income*100)) : 0;
  const daysInM = new Date(y, m+1, 0).getDate();
  const dayNow  = (y===new Date().getFullYear()&&m===new Date().getMonth()) ? new Date().getDate() : daysInM;
  const dailyAvg= dayNow > 0 ? spent/dayNow : 0;
  const proj    = Math.round(dailyAvg * daysInM);

  // 6-month chart
  const chart6 = [];
  for (let i=5; i>=0; i--) {
    const d = new Date(y, m-i, 1);
    const cy=d.getFullYear(), cm=d.getMonth();
    chart6.push({y:cy,m:cm,v:monthExpenses(cy,cm).reduce((s,e)=>s+e.amount,0)});
  }
  const maxV = Math.max(...chart6.map(c=>c.v), 1);

  // Recent transactions
  const recent = [...exps].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,6);

  // Next month income preset?
  const nextD = new Date(y, m+1, 1);
  const nextKey = mk(nextD.getFullYear(), nextD.getMonth());
  const nextInc = D.data.budgetIncome[nextKey];

  // Activation notice
  const now = new Date();
  const isCurrentMonth = y===now.getFullYear()&&m===now.getMonth();
  const daysLeft = daysInM - now.getDate();
  const act = getActivationYM();
  const isActMonth = y===act.y && m===act.m;

  document.getElementById('cHome').innerHTML = `
  <!-- HERO -->
  <div class="hero fi2">
    <div class="hl">Total Balance Across All Accounts</div>
    <div class="ha"><span class="rr">₹</span>${bal.toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
    <div class="ht">
      <span class="${saved>=0?'up':'dn'}">${saved>=0?'▲':'▼'} ${fmt(Math.abs(saved))} ${saved>=0?'saved':'over budget'}</span>
      <span style="margin-left:auto;opacity:.7">${savePct.toFixed(0)}% savings rate</span>
    </div>
    <div class="hs">
      <div class="hsi"><div class="hsil">Income</div><div class="hsiv" style="color:var(--g)">${fmt(income)}</div></div>
      <div class="hsi"><div class="hsil">Spent</div><div class="hsiv" style="color:var(--r)">${fmt(spent)}</div></div>
      <div class="hsi"><div class="hsil">EMIs</div><div class="hsiv" style="color:var(--am)">${fmt(emiAmt)}</div></div>
      <div class="hsi"><div class="hsil">Invest</div><div class="hsiv" style="color:var(--bl)">${fmt(invTot)}</div></div>
    </div>
  </div>

  ${isActMonth && isCurrentMonth && daysLeft <= 3 ? `
  <div class="notice am fi2">
    <span style="font-size:1.1rem">⚡</span>
    <div><strong>Setting up with ${daysLeft} day${daysLeft!==1?'s':''} left this month.</strong>
    Add your accounts &amp; income now. EMI auto-deductions and full tracking kick in from <strong>${MN[act.m<11?act.m+1:0]} ${act.m<11?act.y:act.y+1}</strong>.</div>
  </div>` : ''}

  ${nextInc ? `
  <div class="notice bl fi2" style="cursor:pointer" onclick="selMonth(${nextD.getFullYear()},${nextD.getMonth()})">
    <span style="font-size:1.1rem">⏭</span>
    <div><strong>Next month income pre-set: ${fmt(nextInc)}</strong> for ${MN[nextD.getMonth()]} ${nextD.getFullYear()}.
    <span style="color:var(--ac2)">Tap to view →</span></div>
  </div>` : ''}

  <!-- ACCOUNTS -->
  <div class="fi2">
    <div class="sh"><div class="st">Accounts</div><div class="sa" onclick="openAdd('account')">+ Add</div></div>
    <div class="astrip">
      ${D.data.accounts.map(a=>`
        <div class="achip ${a.alert&&a.balance<a.alert?'low':''}" onclick="viewAccount('${a.id}')">
          <div class="acb">${a.bank||'Bank'}</div>
          <div class="acn">${a.name}</div>
          <div class="aca">${fmt(a.balance)}</div>
          <div class="act">${a.type}</div>
          ${a.alert&&a.balance<a.alert?`<div style="color:var(--am);font-size:.58rem;margin-top:2px">⚠ Low balance</div>`:''}
        </div>`).join('')}
      <div class="aadd" onclick="openAdd('account')"><div style="font-size:1.3rem">🏦</div><div>Add Account</div></div>
    </div>
  </div>

  <!-- QUICK ACTIONS -->
  <div class="qg fi2">
    <div class="qb" onclick="openAdd('expense')"><div class="qi">💸</div><div class="ql">Expense</div></div>
    <div class="qb" onclick="openAdd('income')"><div class="qi">💼</div><div class="ql">Add Income</div></div>
    <div class="qb" onclick="openAdd('emi_pay')"><div class="qi">💳</div><div class="ql">Pay EMI</div></div>
    <div class="qb" onclick="openAdd('transfer')"><div class="qi">↔️</div><div class="ql">Transfer</div></div>
  </div>

  <!-- 6-MONTH CHART -->
  <div class="card fi2">
    <div class="sh">
      <div class="st">6-Month Spending</div>
      <span class="bdg p">${fmt(spent)} this month</span>
    </div>
    <div class="cbr">
      ${chart6.map((c,i)=>`
        <div class="bw ${c.y===y&&c.m===m?'cur':''}" onclick="selMonth(${c.y},${c.m})">
          <div class="bamt">${c.v>0?fmt(c.v):''}</div>
          <div class="bar" style="height:${(c.v/maxV*100).toFixed(0)}%"></div>
          <div class="bl2">${MS[c.m]}</div>
        </div>`).join('')}
    </div>
  </div>

  <!-- STATS ROW -->
  <div class="card fi2">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;text-align:center">
      <div>
        <div style="font-size:.6rem;color:var(--t3);margin-bottom:3px">Daily Avg</div>
        <div style="font-family:var(--fm);font-size:.9rem">${fmt(dailyAvg)}</div>
      </div>
      <div>
        <div style="font-size:.6rem;color:var(--t3);margin-bottom:3px">Projection</div>
        <div style="font-family:var(--fm);font-size:.9rem;color:${proj>income&&income>0?'var(--r)':'var(--t)'}">${fmt(proj)}</div>
      </div>
      <div>
        <div style="font-size:.6rem;color:var(--t3);margin-bottom:3px">SIP/mo</div>
        <div style="font-family:var(--fm);font-size:.9rem;color:var(--bl)">${fmt(sipAmt)}</div>
      </div>
    </div>
  </div>

  <!-- RECENT EXPENSES -->
  <div class="fi2">
    <div class="sh"><div class="st">Recent Transactions</div><div class="sa" onclick="openPage('Report')">All →</div></div>
    <div class="txl">
      ${recent.length ? recent.map(tx=>{
        const acc = accById(tx.accountId);
        return `<div class="txi">
          <div class="tico sp">${CAT_ICONS[tx.category]||'📦'}</div>
          <div style="flex:1;min-width:0">
            <div class="txn">${tx.desc||tx.category}</div>
            <div class="txs">${tx.category}${acc?' · '+acc.name:''} · ${tx.date}</div>
          </div>
          <div class="txa db">-${fmt(tx.amount)}</div>
        </div>`;}).join('')
      : `<div class="empty"><div class="eic">📭</div><div class="em">No expenses this month.<br>Tap + to start tracking.</div></div>`}
    </div>
  </div>`;
}

// ════════════════════════════════════════════════
//  EMI PAGE
// ════════════════════════════════════════════════
function renderEMI() {
  const emis    = D.data.emis;
  const active  = emis.filter(e=>e.remaining>0).sort((a,b)=>a.remaining-b.remaining);
  const closed  = emis.filter(e=>e.remaining<=0);
  const monthly = active.reduce((s,e)=>s+e.monthly,0);
  const pending = active.reduce((s,e)=>s+e.monthly*e.remaining,0);
  const closing = active.filter(e=>e.remaining<=3);
  const now = new Date();

  // 12-month EMI forecast
  const forecast = [];
  for (let i=0; i<12; i++) {
    const fd = new Date(now.getFullYear(), now.getMonth()+i, 1);
    const activeAt = emis.filter(e=>e.remaining > i && e.remaining > 0);
    forecast.push({
      label: MS[fd.getMonth()]+' '+fd.getFullYear(),
      total: activeAt.reduce((s,e)=>s+e.monthly,0),
      count: activeAt.length
    });
  }

  document.getElementById('cEMI').innerHTML = `
  <div class="hero fi2">
    <div class="hl">Monthly EMI Outflow</div>
    <div class="ha"><span class="rr">₹</span>${monthly.toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
    <div class="ht">
      <span style="color:var(--r)">${active.length} active loan${active.length!==1?'s':''}</span>
      <span style="margin-left:auto;color:var(--am)">${fmt(pending)} total pending</span>
    </div>
  </div>

  ${closing.length ? `
  <div class="advc fi2">
    <div class="advh">
      <div class="advav">🤖</div>
      <div><div class="advn">Adviser: EMI Closing Soon</div><div class="advst">Opportunity detected</div></div>
    </div>
    <div class="insl">
      ${closing.map(e=>{
        const freed = e.monthly;
        const sip70 = Math.round(freed*0.7);
        const growTo = calcSIPValue(sip70, 12, 120); // 10yr @12%
        return `<div class="ins w">
          <strong>🎉 ${e.name}</strong> closes in <strong>${e.remaining} month${e.remaining!==1?'s':''}!</strong>
          You'll free up <strong>${fmt(freed)}/mo</strong>.
          Redirect <strong>${fmt(sip70)}/mo</strong> (70%) into a SIP → could grow to
          <strong>${fmt(growTo)}</strong> in 10 yrs at 12% CAGR.
          <div style="margin-top:6px">
            <span class="bdg a">₹${freed.toLocaleString('en-IN')} freeing</span>
            <span style="color:var(--ac);font-size:.7rem;cursor:pointer;margin-left:8px" onclick="openAdd('investment')">→ Start SIP</span>
          </div>
        </div>`;}).join('')}
    </div>
  </div>` : ''}

  <div class="fi2">
    <div class="sh"><div class="st">Active EMIs</div><div class="sa" onclick="openAdd('emi')">+ Add</div></div>
    <div class="eil">
      ${active.length ? active.map(e=>{

function renderReport() {
  const {y, m} = D.sel;

  const spent  = exps.reduce((s,e)=>s+e.amount,0);
  const emiAmt = totalEMI();
  const sipAmt = totalSIP();
  const saved  = income - spent - emiAmt - sipAmt;
  const spPct  = income>0 ? Math.min(100,spent/income*100) : 0;
  const emPct  = income>0 ? Math.min(100,emiAmt/income*100) : 0;
  const svPct  = income>0 ? Math.max(0,Math.min(100,saved/income*100)) : 0;

  // Category breakdown
  const cats = {};

function renderAdviser() {
  const {y, m} = D.sel;
  const income = monthIncome(y, m);
  const exps   = monthExpenses(y, m);
  const spent  = exps.reduce((s,e)=>s+e.amount,0);
  const emiAmt = totalEMI();
  const sipAmt = totalSIP();
  const invTot = totalInvestments();
  const saved  = income - spent - emiAmt - sipAmt;
  const spPct  = income>0 ? spent/income*100 : 0;
  const emPct  = income>0 ? emiAmt/income*100 : 0;
  const closing = D.data.emis.filter(e=>e.remaining>0&&e.remaining<=3);

  const insights = [];
  if (income===0) insights.push({t:'w',m:`<strong>Set your income</strong> in Settings (⚙️) or tap the income quick action. Without it, savings calculations won't work.`});
  if (spPct>70)   insights.push({t:'w',m:`<strong>High spending:</strong> ${spPct.toFixed(0)}% of income on expenses. Aim to keep it under 50% for a healthy savings rate.`});
  if (emPct>40)   insights.push({t:'w',m:`<strong>Heavy EMI load:</strong> ${emPct.toFixed(0)}% of income goes to EMIs. Advisers recommend keeping it under 30-35%.`});
  if (sipAmt===0&&income>0) insights.push({t:'tip',m:`<strong>No SIP running.</strong> Even ₹500/mo in an index fund grows to ${fmt(calcSIPValue(500,12,120))} in 10 years at 12% CAGR.`});
  closing.forEach(e=>{
    const fv = calcSIPValue(Math.round(e.monthly*0.7), 12, 120);
    insights.push({t:'ok',m:`<strong>${e.name}</strong> closes in ${e.remaining} month${e.remaining!==1?'s':''}! Redirect ${fmt(Math.round(e.monthly*0.7))}/mo into a SIP → ${fmt(fv)} in 10 years.`});
  });
  if (spPct>0&&spPct<50&&income>0) insights.push({t:'ok',m:`<strong>Great control!</strong> Only ${spPct.toFixed(0)}% of income on expenses. You're building wealth.`});
  if (invTot>0) {
    const yr = income*12;
    if (invTot<yr) insights.push({t:'tip',m:`<strong>Portfolio gap:</strong> Your investments (${fmt(invTot)}) are less than 1 year's income. Aim for 6–12× annual income for retirement security.`});
  }
  if (!insights.length) insights.push({t:'ok',m:`<strong>Looking good!</strong> Keep adding transactions and I'll surface patterns and opportunities.`});

  // Health score
  const s1 = income>0 ? Math.max(0,100-spPct) : 0;
  const s2 = income>0 ? Math.max(0,100-emPct*2) : 50;
  const s3 = income>0 ? Math.min(100,sipAmt/income*1000) : 0;
  const s4 = income>0 ? Math.min(100,Math.max(0,saved/income*100*3)) : 0;
  const overall = Math.round((s1+s2+s3+s4)/4);
  const grade = overall>=80?{g:'A',c:'var(--g)'}:overall>=60?{g:'B',c:'var(--bl)'}:overall>=40?{g:'C',c:'var(--am)'}:{g:'D',c:'var(--r)'};

  document.getElementById('cAdviser').innerHTML = `
  <div class="advc fi2">
    <div class="advh">
      <div class="advav">🤖</div>
      <div><div class="advn">SpendWise Adviser</div><div class="advst">Analysing your finances</div></div>
    </div>
    <div class="insl">
      ${insights.map(i=>`<div class="ins ${i.t==='w'?'w':i.t==='ok'?'ok':'tip'}">${i.m}</div>`).join('')}
    </div>
    <div class="askrow">
      <input class="askin" id="advIn" placeholder="Ask anything about your money…" onkeydown="if(event.key==='Enter')askAI()"/>
      <button class="askgo" onclick="askAI()">Ask AI</button>
    </div>
    <div id="advReply"></div>
  </div>

  <div class="card fi2">
    <div class="st" style="margin-bottom:14px">💯 Financial Health Score</div>
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
      <div style="width:60px;height:60px;border-radius:50%;border:3px solid ${grade.c};display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
        <div style="font-family:var(--fd);font-size:1.4rem;font-weight:800;color:${grade.c}">${grade.g}</div>
        <div style="font-size:.58rem;color:var(--t3)">${overall}/100</div>
      </div>
      <div>
        <div style="font-size:.84rem;font-weight:500">Score: <span style="color:${grade.c}">${overall}</span></div>
        <div style="font-size:.72rem;color:var(--t2);margin-top:3px">${overall>=80?'Excellent — keep it up!':overall>=60?'Good, room to grow.':overall>=40?'Needs attention.':'Take action now.'}</div>
      </div>
    </div>
    ${[
      {l:'Spending Control', s:s1, t:'Keep expenses < 50% of income'},
      {l:'EMI Burden',       s:s2, t:'Keep EMIs < 30% of income'},
      {l:'SIP Discipline',  s:s3, t:'Invest ≥ 10% of income monthly'},
      {l:'Savings Rate',    s:s4, t:'Save ≥ 20% of income'},
    ].map(sc=>`
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:.76rem;margin-bottom:3px">
          <span>${sc.l}</span><span style="font-family:var(--fm)">${sc.s.toFixed(0)}/100</span>
        </div>
        <div class="pb2"><div class="pf ${sc.s>=70?'g':sc.s>=40?'a':'r'}" style="width:${sc.s.toFixed(0)}%"></div></div>
        <div style="font-size:.6rem;color:var(--t3);margin-top:2px">${sc.t}</div>
      </div>`).join('')}
  </div>`;
}

async function askAI() {
  const inp = document.getElementById('advIn');
  const q = inp.value.trim(); if(!q) return;
  inp.value = '';
  const rep = document.getElementById('advReply');
  rep.innerHTML = `<div class="typ"><div class="tyd"></div><div class="tyd"></div><div class="tyd"></div></div>`;
  const {y,m} = D.sel;
  const inc=monthIncome(y,m), sp=monthExpenses(y,m).reduce((s,e)=>s+e.amount,0),
        emi=totalEMI(), sip=totalSIP(), inv=totalInvestments();
  const ctx = `You are SpendWise, a concise Indian personal finance adviser. User data: Income ₹${inc}, Spent ₹${sp}, EMI ₹${emi}/mo, SIP ₹${sip}/mo, Investments ₹${inv}. EMIs closing soon: ${D.data.emis.filter(e=>e.remaining>0&&e.remaining<=3).map(e=>e.name).join(',')||'none'}. Reply in 2-4 sentences, use ₹, give one concrete action.`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:ctx,messages:[{role:'user',content:q}]})
    });
    const d = await res.json();
    const txt = (d.content||[]).map(c=>c.text||'').join('') || 'Unable to respond.';
    rep.innerHTML = `<div class="ins tip" style="margin-top:8px">${txt}</div>`;
  } catch {
    rep.innerHTML = `<div class="ins w" style="margin-top:8px">AI unavailable. Tip: ${sip===0?'Start a SIP with even ₹500/mo.':'You\'re doing well! Keep tracking.'}</div>`;
  }
}

          <input class="fi" type="number" id="fAmt" placeholder="0" inputmode="decimal"/></div>
        <div class="fg"><label class="fl">Date</label>
          <input class="fi" type="date" id="fDate" value="${td()}"/></div>
      </div>
      <div class="fg"><label class="fl">Paid From Account</label>
        <select class="fs" id="fAcc">
          <option value="">💵 Cash (balance not updated)</option>${accOpts}
        </select>
        <div class="fhint">Selecting an account deducts the amount from its balance immediately.</div>
      </div>
      <button class="sbtn" onclick="saveExpense()">Add &amp; Deduct from Account</button>`);
  }

  // ── INCOME ──
  else if (type === 'income') {
    const now = new Date();
    const opts = [];
    for (let i=-2; i<=3; i++) {
      const d = new Date(now.getFullYear(), now.getMonth()+i, 1);
      const oy=d.getFullYear(), om=d.getMonth();
      const ok = mk(oy,om);
      const isCur  = i===0;
      const isFut  = i>0;
      const isSel  = oy===D.sel.y && om===D.sel.m;
      opts.push(`<option value="${ok}" ${isSel?'selected':''}>${MN[om]} ${oy}${isCur?' (this month)':''}${isFut?' ⏭ next month':''}</option>`);
    }
    const defMk = mk(D.sel.y, D.sel.m);
    const existingIncome = D.data.budgetIncome[defMk]||0;

    openMod('💼 Add Income / Salary', `
      <div style="background:var(--card2);border-radius:var(--rr);padding:10px;margin-bottom:13px;font-size:.76rem;color:var(--t2)">
        💡 <strong>Salary credited early?</strong> Choose next month below — it counts in that month's budget. Your account balance updates today either way.
      </div>
      <div class="fg"><label class="fl">Budget Month (which month's income is this?)</label>
        <select class="fs" id="fIncMonth" onchange="onIncMonthChange()">${opts.join('')}</select>
        <div class="fhint" id="fIncMonthHint"></div>
      </div>
      <div style="background:var(--card2);border-radius:var(--rr);padding:9px 11px;margin-bottom:12px;font-size:.76rem;color:var(--t2)" id="fIncExisting">
        Income set for selected month: <strong>${fmt(existingIncome)}</strong>
      </div>
      <div class="fg"><label class="fl">Amount (₹)</label>
        <input class="fi" type="number" id="fIncAmt" placeholder="e.g. 75000" value="${existingIncome||''}" inputmode="decimal"/></div>
      <div class="fg"><label class="fl">Type</label>
        <select class="fs" id="fIncType">
          <option value="Salary">💼 Salary</option>
          <option value="Freelance">💻 Freelance</option>
          <option value="Bonus">🎁 Bonus</option>
          <option value="Rental">🏠 Rental</option>
          <option value="Interest">🏦 Interest/Dividend</option>
          <option value="Other">📦 Other</option>
        </select></div>
      <div class="fg"><label class="fl">Credit to Account (balance updates today)</label>
        <select class="fs" id="fIncAcc">
          <option value="">Don't update account balance</option>${accOpts}
        </select></div>
      <div class="fg"><label class="fl">Set as default monthly income?</label>
        <select class="fs" id="fIncDef">
          <option value="no">No — just for selected month</option>
          <option value="yes">Yes — use as default for all months</option>
        </select></div>
      <button class="sbtn" onclick="saveIncome()">💾 Save Income</button>`);

    setTimeout(onIncMonthChange, 40);
  }

  // ── EMI ──
  else if (type === 'emi') {
    openMod('🔁 Add Loan / EMI', `
      <div class="fg"><label class="fl">Loan Name</label>
        <input class="fi" id="fEname" placeholder="e.g. Home Loan – SBI"/></div>
      <div class="frow">
        <div class="fg"><label class="fl">Monthly EMI (₹)</label>
          <input class="fi" type="number" id="fEemi" placeholder="0" inputmode="decimal"/></div>
        <div class="fg"><label class="fl">Due Date (day)</label>
          <input class="fi" type="number" id="fEdue" placeholder="5" min="1" max="31"/></div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">EMIs Remaining</label>
          <input class="fi" type="number" id="fErem" placeholder="24"/></div>
        <div class="fg"><label class="fl">Total EMIs (original)</label>
          <input class="fi" type="number" id="fEtot" placeholder="36"/></div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Interest Rate (% p.a.)</label>
          <input class="fi" type="number" id="fEint" placeholder="8.5" step="0.1"/></div>
        <div class="fg"><label class="fl">Type</label>
          <select class="fs" id="fEtype">
            <option value="home">🏠 Home Loan</option><option value="car">🚗 Car</option>
            <option value="personal">💳 Personal</option><option value="education">📚 Education</option>
            <option value="device">📱 Device</option><option value="other">📦 Other</option>
          </select></div>
      </div>
      <div class="fg"><label class="fl">Auto-deduct from Account (active from next month)</label>
        <select class="fs" id="fEacc">
          <option value="">No auto-deduction</option>${accOpts}
        </select>
        <div class="fhint" style="color:var(--am)">⚡ EMI deductions will be active from next month. This month you're setting up.</div>
      </div>
      <button class="sbtn" onclick="saveEMI()">Add EMI</button>`);
  }

  // ── INVESTMENT ──
  else if (type === 'investment') {
    openMod('📈 Add Investment', `
      <div class="fg"><label class="fl">Name</label>
        <input class="fi" id="fIname" placeholder="e.g. HDFC Nifty 50 Index Fund"/></div>
      <div class="fg"><label class="fl">Type</label>
        <select class="fs" id="fItype">
          <option value="mf">📈 Mutual Fund / SIP</option><option value="fd">🏦 Fixed Deposit</option>
          <option value="rd">📅 Recurring Deposit</option><option value="gold">🥇 Gold</option>
          <option value="ppf">🏛️ PPF / NPS</option><option value="stocks">📊 Stocks / ETF</option>
          <option value="crypto">🪙 Crypto</option><option value="insurance">🛡️ Insurance/ULIP</option>
          <option value="other">💼 Other</option>
        </select></div>
      <div class="frow">
        <div class="fg"><label class="fl">Principal / Current Value (₹)</label>
          <input class="fi" type="number" id="fIprinc" placeholder="0" inputmode="decimal"/></div>
        <div class="fg"><label class="fl">Expected Return (% p.a.)</label>
          <input class="fi" type="number" id="fIret" placeholder="12" step="0.1"/></div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Start Date</label>
          <input class="fi" type="date" id="fIstart" value="${td()}"/></div>
        <div class="fg"><label class="fl">Maturity Date (if fixed)</label>
          <input class="fi" type="date" id="fImatur"/></div>
      </div>
      <div class="fg"><label class="fl">Monthly SIP / Contribution (₹) — 0 for lump sum</label>
        <input class="fi" type="number" id="fIsip" placeholder="0" inputmode="decimal"/>
        <div class="fhint" id="sipFVHint"></div>
      </div>
      <div class="fg"><label class="fl">Deduct SIP from Account</label>
        <select class="fs" id="fIsacc">
          <option value="">No auto-deduction</option>${accOpts}
        </select></div>
      <button class="sbtn" onclick="saveInvestment()">Add Investment</button>`);

    // Live SIP FV preview
    const sipInput = document.getElementById('fIsip');
    const retInput = document.getElementById('fIret');
    const updateSIPHint = () => {
      const sip = parseFloat(sipInput?.value)||0;
      const ret = parseFloat(retInput?.value)||12;
      if (sip>0) {
        const fv10 = calcSIPValue(sip, ret, 120);
        const fv20 = calcSIPValue(sip, ret, 240);
        document.getElementById('sipFVHint').textContent =
          `${fmt(sip)}/mo @ ${ret}% → ${fmt(fv10)} in 10 yrs, ${fmt(fv20)} in 20 yrs`;
      } else document.getElementById('sipFVHint').textContent = '';
    };
    setTimeout(()=>{
      document.getElementById('fIsip')?.addEventListener('input', updateSIPHint);
      document.getElementById('fIret')?.addEventListener('input', updateSIPHint);
    }, 60);
  }

  // ── ACCOUNT ──
  else if (type === 'account') {
    openMod('🏦 Add Account', `
      <div class="fg"><label class="fl">Account Name</label>
        <input class="fi" id="fAname" placeholder="e.g. HDFC Salary Account"/></div>
      <div class="fg"><label class="fl">Bank / Institution</label>
        <input class="fi" id="fAbank" placeholder="e.g. HDFC, SBI, ICICI"/></div>
      <div class="frow">
        <div class="fg"><label class="fl">Type</label>
          <select class="fs" id="fAtype">
            <option value="Savings">💰 Savings</option><option value="Salary">💼 Salary</option>

          </select></div>
        <div class="fg"><label class="fl">Current Balance (₹)</label>
          <input class="fi" type="number" id="fAbal" placeholder="0" inputmode="decimal"/></div>
      </div>
      <div class="fg"><label class="fl">Low Balance Alert</label>
        <select class="fs" id="fAalert">
          <option value="0">No alert</option><option value="2000">Below ₹2,000</option>
          <option value="5000">Below ₹5,000</option><option value="10000" selected>Below ₹10,000</option>
          <option value="20000">Below ₹20,000</option><option value="50000">Below ₹50,000</option>
        </select></div>
      <button class="sbtn" onclick="saveAccount()">Add Account</button>`);
  }

  // ── TRANSFER ──
  else if (type === 'transfer') {
    openMod('↔️ Transfer', `
      <div class="fg"><label class="fl">From Account</label>
        <select class="fs" id="fTfrom">${accOpts||'<option>No accounts</option>'}</select></div>
      <div class="fg"><label class="fl">To Account</label>
        <select class="fs" id="fTto">${accOpts||'<option>No accounts</option>'}</select></div>
      <div class="frow">
        <div class="fg"><label class="fl">Amount (₹)</label>
          <input class="fi" type="number" id="fTamt" placeholder="0" inputmode="decimal"/></div>
        <div class="fg"><label class="fl">Date</label>
          <input class="fi" type="date" id="fTdate" value="${td()}"/></div>
      </div>
      <button class="sbtn" onclick="saveTransfer()">Transfer</button>`);
  }

  // ── PAY EMI ──
  else if (type === 'emi_pay') {
    const active = D.data.emis.filter(e=>e.remaining>0);
    openMod('💳 Mark EMI Paid', `
      ${active.length===0 ? '<div class="empty"><div class="eic">🎉</div><div class="em">No active EMIs!</div></div>' : `
      <div class="fg"><label class="fl">EMI</label>
        <select class="fs" id="fEPayId">
          ${active.map(e=>`<option value="${e.id}">${e.name} — ${fmt(e.monthly)}/mo (${e.remaining} left)</option>`).join('')}
        </select></div>
      <div class="fg"><label class="fl">Pay From Account</label>
        <select class="fs" id="fEPayAcc">
          <option value="">Cash (not tracked)</option>${accOpts}
        </select></div>
      <div class="fg"><label class="fl">Date</label>
        <input class="fi" type="date" id="fEPayDate" value="${td()}"/></div>
      <button class="sbtn" onclick="payEMI()">Mark Paid &amp; Deduct</button>`}`);
  }

  // ── SIP DEDUCT ──
  else if (type === 'sip_deduct') {
    const sips = D.data.investments.filter(i=>i.sip>0);
    openMod('📊 Record SIP Deduction', `
      ${sips.length===0 ? '<div class="empty"><div class="eic">📈</div><div class="em">No SIPs configured.<br>Add an investment first.</div></div>' : `
      <div class="fg"><label class="fl">SIP</label>
        <select class="fs" id="fSipId">
          ${sips.map(i=>`<option value="${i.id}">${i.name} — ${fmt(i.sip)}/mo</option>`).join('')}
        </select></div>
      <div class="fg"><label class="fl">Deduct From Account</label>
        <select class="fs" id="fSipAcc">
          <option value="">Cash (not tracked)</option>${accOpts}
        </select></div>
      <div class="fg"><label class="fl">Date</label>
        <input class="fi" type="date" id="fSipDate" value="${td()}"/></div>
      <button class="sbtn" onclick="recordSIP()">Deduct SIP from Account</button>`}`);
  }
}

// ── income month change helper ──
function onIncMonthChange() {
  const sel  = document.getElementById('fIncMonth');
  if (!sel) return;
  const mKey = sel.value;
  const {y,m} = mkp(mKey);
  const now  = new Date();
  const isNow = y===now.getFullYear() && m===now.getMonth();
  const isFut = new Date(y,m,1) > new Date(now.getFullYear(),now.getMonth(),1);
  const existing = D.data.budgetIncome[mKey]||0;
  const hint = document.getElementById('fIncMonthHint');
  const info = document.getElementById('fIncExisting');
  if (hint) hint.innerHTML = isFut ? `<span style="color:var(--am)">⏭ Budget will be assigned to ${MN[m]} ${y}. Account balance updates today.</span>` : '';
  if (info) info.innerHTML = `Income set for ${MN[m]} ${y}: <strong>${fmt(existing)}</strong>`;
  const amtEl = document.getElementById('fIncAmt');
  if (amtEl && existing>0 && !amtEl.value) amtEl.value = existing;
}

// ════════════════════════════════════════════════
//  SAVE FUNCTIONS
// ════════════════════════════════════════════════
function saveExpense() {
  const cat  = document.getElementById('fCat').value;
  const desc = document.getElementById('fDesc').value.trim();
  const amt  = parseFloat(document.getElementById('fAmt').value);
  const date = document.getElementById('fDate').value;
  const accId= document.getElementById('fAcc').value;
  if (!amt||amt<=0) return toast('Enter a valid amount','err');
  if (!date)        return toast('Pick a date','err');
  const acc  = accById(accId);
  D.data.expenses.push({id:uid(), date, category:cat, desc:desc||(CAT_ICONS[cat]?cat:'expense'), amount:amt, accountId:accId||null});
  if (accId) debit(accId, amt, desc||cat, date);
  save(); renderAll(); closeAll();
  toast(`✅ ${fmt(amt)} recorded${acc?' from '+acc.name:''}`, 'ok');
}

function saveIncome() {
  const amt   = parseFloat(document.getElementById('fIncAmt').value);
  if (!amt||amt<=0) return toast('Enter a valid amount','err');
  const mKey  = document.getElementById('fIncMonth').value;
  const accId = document.getElementById('fIncAcc').value;
  const type  = document.getElementById('fIncType').value;
  const setDef= document.getElementById('fIncDef').value === 'yes';
  const {y,m} = mkp(mKey);
  const now   = new Date();
  const isFut = new Date(y,m,1) > new Date(now.getFullYear(),now.getMonth(),1);

  D.data.budgetIncome[mKey] = amt;
  if (setDef) D.data.defaultIncome = amt;
  // Credit account balance today regardless of which month
  if (accId) credit(accId, amt, type + (isFut ? ` (for ${MN[m]} ${y})` : ''), td());
  save(); renderAll(); closeAll();
  toast(`✅ ${fmt(amt)} ${type} set for ${MN[m]} ${y}${accId?' · '+accById(accId)?.name:''}`, 'ok');
}

function saveEMI() {
  const name   = document.getElementById('fEname').value.trim();
  const monthly= parseFloat(document.getElementById('fEemi').value);
  const dueDay = parseInt(document.getElementById('fEdue').value)||5;
  const rem    = parseInt(document.getElementById('fErem').value)||0;
  const total  = parseInt(document.getElementById('fEtot').value)||rem;
  const int_   = parseFloat(document.getElementById('fEint').value)||0;
  const type   = document.getElementById('fEtype').value;
  const accId  = document.getElementById('fEacc').value;
  if (!name||!monthly) return toast('Fill name and EMI amount','err');
  const now = new Date();
  D.data.emis.push({id:uid(), name, monthly, dueDay, remaining:rem, total, interest:int_, type, accountId:accId,
    startYM: mk(now.getFullYear(), now.getMonth())});
  save(); renderAll(); closeAll();
  toast('✅ EMI added: '+name, 'ok');
}

function saveInvestment() {
  const name   = document.getElementById('fIname').value.trim();
  const type   = document.getElementById('fItype').value;
  const princ  = parseFloat(document.getElementById('fIprinc').value)||0;
  const ret    = parseFloat(document.getElementById('fIret').value)||0;
  const start  = document.getElementById('fIstart').value;
  const matur  = document.getElementById('fImatur').value;
  const sip    = parseFloat(document.getElementById('fIsip').value)||0;
  const sipAcc = document.getElementById('fIsacc').value;
  if (!name) return toast('Enter investment name','err');
  D.data.investments.push({id:uid(), name, type, principal:princ, currentValue:princ, interest:ret, startDate:start, maturityDate:matur, sip, sipAccountId:sipAcc});
  // Deduct lump sum if account selected
  if (princ>0 && sipAcc) debit(sipAcc, princ, 'Investment: '+name, start||td());
  save(); renderAll(); closeAll();
  toast('✅ Investment added: '+name, 'ok');
}

function saveAccount() {
  const name  = document.getElementById('fAname').value.trim();
  const bank  = document.getElementById('fAbank').value.trim();
  const type  = document.getElementById('fAtype').value;
  const bal   = parseFloat(document.getElementById('fAbal').value)||0;
  const alert_= parseInt(document.getElementById('fAalert').value)||0;
  if (!name) return toast('Enter account name','err');
  D.data.accounts.push({id:uid(), name, bank, type, balance:bal, alert:alert_});
  save(); renderAll(); closeAll();
  toast('✅ Account added: '+name, 'ok');
}

function saveTransfer() {
  const from = document.getElementById('fTfrom').value;
  const to   = document.getElementById('fTto').value;
  const amt  = parseFloat(document.getElementById('fTamt').value);
  const date = document.getElementById('fTdate').value;
  if (!from||!to||!amt||from===to) return toast('Select two different accounts and amount','err');
  debit(from,  amt, 'Transfer → '+accById(to)?.name, date);
  credit(to,   amt, 'Transfer ← '+accById(from)?.name, date);
  save(); renderAll(); closeAll();
  toast(`✅ Transferred ${fmt(amt)}: ${accById(from)?.name} → ${accById(to)?.name}`, 'ok');
}

function payEMI() {
  const emiId = document.getElementById('fEPayId').value;
  const accId = document.getElementById('fEPayAcc').value;
  const date  = document.getElementById('fEPayDate').value;
  const emi   = D.data.emis.find(e=>e.id===emiId);
  if (!emi) return toast('Select an EMI','err');
  if (accId) debit(accId, emi.monthly, 'EMI: '+emi.name, date);
  emi.remaining = Math.max(0, emi.remaining-1);
  save(); renderAll(); closeAll();
  toast(`✅ EMI paid: ${emi.name} ${fmt(emi.monthly)}${emi.remaining===0?' 🎉 Fully paid!':''}`, 'ok');
}

function quickPayEMI(emiId) {
  const emi  = D.data.emis.find(e=>e.id===emiId);
  if (!emi) return;
  const accs = D.data.accounts;
  const accOpts = accs.map(a=>`<option value="${a.id}">${a.name} (${fmt(a.balance)})</option>`).join('');
  openMod('💳 Pay EMI: '+emi.name, `
    <div style="background:var(--card2);border-radius:var(--rr);padding:10px;margin-bottom:13px;text-align:center">
      <div style="font-size:.68rem;color:var(--t3)">Amount Due</div>
      <div style="font-family:var(--fm);font-size:1.4rem;color:var(--am)">${fmt(emi.monthly)}</div>
      <div style="font-size:.65rem;color:var(--t3)">${emi.remaining} payments remaining</div>
    </div>
    <div class="fg"><label class="fl">Pay From Account</label>
      <select class="fs" id="fQEPayAcc">
        <option value="">Cash (not tracked)</option>${accOpts}
      </select></div>
    <div class="fg"><label class="fl">Date</label>
      <input class="fi" type="date" id="fQEPayDate" value="${td()}"/></div>
    <button class="sbtn" onclick="confirmQuickPayEMI('${emiId}')">Pay ${fmt(emi.monthly)} &amp; Deduct</button>`);
}
function confirmQuickPayEMI(emiId) {
  const emi   = D.data.emis.find(e=>e.id===emiId);
  const accId = document.getElementById('fQEPayAcc').value;
  const date  = document.getElementById('fQEPayDate').value;
  if (!emi) return;
  if (accId) debit(accId, emi.monthly, 'EMI: '+emi.name, date);
  emi.remaining = Math.max(0, emi.remaining-1);
  save(); renderAll(); closeAll();
  toast(`✅ ${emi.name} paid ${fmt(emi.monthly)}${emi.remaining===0?' 🎉 Loan closed!':''}`, 'ok');
}

function recordSIP() {
  const invId = document.getElementById('fSipId').value;
  const accId = document.getElementById('fSipAcc').value;
  const date  = document.getElementById('fSipDate').value;
  const inv   = D.data.investments.find(i=>i.id===invId);
  if (!inv) return toast('Select a SIP','err');
  if (accId) debit(accId, inv.sip, 'SIP: '+inv.name, date);
  inv.currentValue = (inv.currentValue||inv.principal||0) + inv.sip;
  save(); renderAll(); closeAll();
  toast(`✅ SIP deducted: ${fmt(inv.sip)} from ${accById(accId)?.name||'Cash'}`, 'ok');
}

function viewAccount(id) {
  const acc = accById(id); if (!acc) return;
  const txs = D.data.transactions.filter(t=>t.accountId===id)
    .sort((a,b)=>b.date.localeCompare(a.date)).slice(0,30);
  openMod('🏦 '+acc.name, `
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:.65rem;color:var(--t3)">Balance</div>
      <div style="font-family:var(--fd);font-size:2rem;font-weight:800;color:var(--g)">${fmt(acc.balance)}</div>
      <span class="bdg p">${acc.type}</span>
    </div>
    <div style="font-size:.78rem;font-weight:500;margin-bottom:8px">Ledger (last 30)</div>
    <div class="txl">
      ${txs.length ? txs.map(t=>`
        <div class="txi">
          <div class="tico ${t.type==='cr'?'cr':'sp'}">${t.type==='cr'?'⬆️':'⬇️'}</div>
          <div style="flex:1;min-width:0"><div class="txn">${t.desc}</div><div class="txs">${t.date}</div></div>
          <div class="txa ${t.type==='cr'?'cb':'db'}">${t.type==='cr'?'+':'-'}${fmt(t.amount)}</div>
        </div>`).join('')
      : `<div class="empty"><div class="eic">📭</div><div class="em">No transactions yet.</div></div>`}
    </div>`);
}

        <input class="fi" type="password" id="sPin" maxlength="4" placeholder="4 digits"/></div>
      <div class="fg"><label class="fl">Confirm PIN</label>
        <input class="fi" type="password" id="sPin2" maxlength="4" placeholder="confirm"/></div>
    </div>
    <div style="font-size:.72rem;color:var(--t3);margin-bottom:13px">
      App set up: ${D.data.settings.activationMonth ? MN[mkp(D.data.settings.activationMonth).m]+' '+mkp(D.data.settings.activationMonth).y : '—'}<br>
      EMI auto-deductions active from: ${(()=>{const act=getActivationYM();const nx=new Date(act.y,act.m+1,1);return MN[nx.getMonth()]+' '+nx.getFullYear();})()}
    </div>
    <button class="sbtn" onclick="saveSettings()">Save Settings</button>
    <div style="height:10px"></div>
    <button class="sbtn sec" onclick="if(confirm('Delete ALL data? Cannot be undone.'))clearData()">⚠️ Clear All Data</button>`;
  document.getElementById('modSet').classList.add('on');
}
function saveSettings() {
  const def  = parseFloat(document.getElementById('sDef').value)||0;
  const pin  = document.getElementById('sPin').value;
  const pin2 = document.getElementById('sPin2').value;
  D.data.defaultIncome = def;
  if (pin) {
    if (!/^\d{4}$/.test(pin)) return toast('PIN must be 4 digits','err');
    if (pin!==pin2) return toast('PINs do not match','err');
    D.pin = pin; D.data.settings.pin = pin;
  }
  save(); renderAll(); closeAll();
  toast('✅ Settings saved','ok');
}
function clearData() {
  localStorage.removeItem('sw3'); localStorage.removeItem('sw3pin');
  location.reload();
}

// ════════════════════════════════════════════════
//  MODAL HELPERS
// ════════════════════════════════════════════════
function openMod(title, html) {
  document.getElementById('modT').textContent = title;
  document.getElementById('modB').innerHTML = html;
  document.getElementById('modMain').classList.add('on');
}
function closeAll() {
  document.getElementById('modMain').classList.remove('on');
  document.getElementById('modSet').classList.remove('on');
}
document.getElementById('modMain').addEventListener('click', e => { if(e.target===e.currentTarget) closeAll(); });
document.getElementById('modSet').addEventListener('click',  e => { if(e.target===e.currentTarget) closeAll(); });

// ════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════
let _tt;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show'+(type?' '+type:'');
  clearTimeout(_tt); _tt = setTimeout(()=>el.classList.remove('show'), 3000);
}

// ════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════
init();
</script>
</body>
</html>
