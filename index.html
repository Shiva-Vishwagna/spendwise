// ═══════════════════════════════════════════════════════════════
//  CASH FLOW PAGE
// ═══════════════════════════════════════════════════════════════
function renderCashFlow() {
  const {y,m} = D.sel;
  const income   = monthIncome(y,m);
  const exps     = monthExpenses(y,m);
  const spent    = exps.reduce((s,e)=>s+e.amount,0);
  const emiTotal = D.data.emis.filter(e=>e.remaining>0).reduce((s,e)=>s+e.monthly,0);
  const emiPaid  = paidEMIsForMonth(y,m).reduce((s,e)=>s+e.monthly,0);
  const emiPend  = totalEMIForMonth(y,m);
  const sipAmt   = totalSIP();
  const ccPay    = D.data.ccPayments.filter(p=>(p.date||'').startsWith(mk(y,m))).reduce((s,p)=>s+p.amount,0);
  const ccOut    = totalCCOutstanding();
  const netCash  = income - spent - emiPaid - sipAmt - ccPay;
  const netPct   = income>0 ? Math.max(0,Math.min(100,(netCash/income)*100)) : 0;
  const daysInM  = new Date(y,m+1,0).getDate();
  const now      = new Date();
  const dayNow   = y===now.getFullYear()&&m===now.getMonth() ? now.getDate() : daysInM;
  const dailyBurn= (spent+emiPaid)>0 ? (spent+emiPaid)/dayNow : 0;
  const projSpend= Math.round(dailyBurn*daysInM);
  const projSave = income - projSpend - emiTotal;

  // 6-month cashflow
  const cf6=[];
  for(let i=5;i>=0;i--){
    const d=new Date(y,m-i,1);const cy=d.getFullYear(),cm=d.getMonth();
    const e2=monthExpenses(cy,cm);const sp2=e2.reduce((s,e)=>s+e.amount,0);
    const inc2=monthIncome(cy,cm);const emi2=D.data.emis.filter(e=>e.remaining>0).reduce((s,e)=>s+e.monthly,0);
    cf6.push({label:MS[cm],cy,cm,inc:inc2,out:sp2+emi2,net:inc2-sp2-emi2,cur:cy===y&&cm===m});
  }
  const maxCF = Math.max(...cf6.map(c=>Math.max(c.inc,c.out)),1);

  document.getElementById('cCashFlow').innerHTML = `
  <div class="hero fi2">
    <div class="hl">Net Cash Available — ${MN[m]} ${y}</div>
    <div class="ha" style="color:${netCash>=0?'var(--g)':'var(--r)'}">${netCash>=0?'':'−'}<span class="rr">₹</span>${Math.abs(netCash).toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
    <div class="ht">
      <span>Income: ${fmt(income)}</span>
      <span style="margin-left:auto;color:var(--am)">Daily burn: ${fmt(dailyBurn)}</span>
    </div>
  </div>

  <!-- INFLOW / OUTFLOW BREAKDOWN -->
  <div class="card fi2">
    <div class="st" style="margin-bottom:12px">Monthly Cash Flow</div>
    <div style="display:flex;flex-direction:column;gap:5px">
      <div class="cf-row inc">
        <div class="cf-label">💼 Income</div>
        <div class="cf-bar-wrap"><div class="cf-bar-fill" style="width:100%;background:var(--g)"></div></div>
        <div class="cf-amt" style="color:var(--g)">+${fmt(income)}</div>
      </div>
      <div class="cf-row exp">
        <div class="cf-label">💸 Expenses</div>
        <div class="cf-bar-wrap"><div class="cf-bar-fill" style="width:${pct(spent,income).toFixed(0)}%;background:var(--r)"></div></div>
        <div class="cf-amt" style="color:var(--r)">-${fmt(spent)}</div>
      </div>
      <div class="cf-row exp">
        <div class="cf-label">🔁 EMIs (total)</div>
        <div class="cf-bar-wrap"><div class="cf-bar-fill" style="width:${pct(emiTotal,income).toFixed(0)}%;background:var(--am)"></div></div>
        <div class="cf-amt" style="color:var(--am)">-${fmt(emiTotal)}</div>
      </div>
      <div class="cf-row exp">
        <div class="cf-label">📊 SIPs</div>
        <div class="cf-bar-wrap"><div class="cf-bar-fill" style="width:${pct(sipAmt,income).toFixed(0)}%;background:var(--bl)"></div></div>
        <div class="cf-amt" style="color:var(--bl)">-${fmt(sipAmt)}</div>
      </div>
      ${ccPay>0?`<div class="cf-row exp">
        <div class="cf-label">💳 CC Payments</div>
        <div class="cf-bar-wrap"><div class="cf-bar-fill" style="width:${pct(ccPay,income).toFixed(0)}%;background:var(--pk)"></div></div>
        <div class="cf-amt" style="color:var(--pk)">-${fmt(ccPay)}</div>
      </div>`:''}
      <div class="cf-row neu" style="border-color:${netCash>=0?'var(--g)20':'var(--r)20'}">
        <div class="cf-label" style="font-weight:600">Net Remaining</div>
        <div class="cf-bar-wrap"><div class="cf-bar-fill" style="width:${netPct.toFixed(0)}%;background:${netCash>=0?'var(--g)':'var(--r)'}"></div></div>
        <div class="cf-amt" style="color:${netCash>=0?'var(--g)':'var(--r)'}"><strong>${netCash>=0?'+':''}${fmt(netCash)}</strong></div>
      </div>
    </div>
  </div>

  <!-- PROJECTION -->
  <div class="card fi2">
    <div class="st" style="margin-bottom:10px">📈 Month Forecast</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;text-align:center">
      <div><div style="font-size:.58rem;color:var(--t3)">Daily Burn</div><div style="font-family:var(--fm);font-size:.88rem">${fmt(dailyBurn)}</div></div>
      <div><div style="font-size:.58rem;color:var(--t3)">Proj. Spend</div><div style="font-family:var(--fm);font-size:.88rem;color:${projSpend>income?'var(--r)':'var(--t)'}">${fmt(projSpend)}</div></div>
      <div><div style="font-size:.58rem;color:var(--t3)">Proj. Save</div><div style="font-family:var(--fm);font-size:.88rem;color:${projSave>=0?'var(--g)':'var(--r)'}">${projSave>=0?'+':''}${fmt(projSave)}</div></div>
    </div>
    <div style="font-size:.72rem;color:var(--t2);margin-top:10px;padding:9px;background:var(--card2);border-radius:var(--rr)">
      ${projSave<0?`<strong style="color:var(--r)">⚠ Overspend risk:</strong> At current rate, you'll spend ${fmt(Math.abs(projSave))} more than income.`:
        projSave>0?`<strong style="color:var(--g)">✅ On track</strong> to save ${fmt(projSave)} this month (${pct(projSave,income).toFixed(0)}% of income).`:
        '📊 Break-even projected this month.'}
    </div>
  </div>

  <!-- 6-MONTH CASHFLOW CHART -->
  <div class="card fi2">
    <div class="st" style="margin-bottom:12px">6-Month Inflow vs Outflow</div>
    <div class="cbr" style="height:80px">
      ${cf6.map(c=>{
        const incH=(c.inc/maxCF*100).toFixed(0);
        const outH=(c.out/maxCF*100).toFixed(0);
        return`<div class="bw ${c.cur?'cur':''}" onclick="selMonth(${c.cy},${c.cm})">
          <div style="display:flex;gap:2px;align-items:flex-end;height:65px">
            <div style="width:8px;border-radius:2px 2px 0 0;background:var(--g);height:${incH}%;min-height:2px;opacity:.8"></div>
            <div style="width:8px;border-radius:2px 2px 0 0;background:var(--r);height:${outH}%;min-height:2px;opacity:.8"></div>
          </div>
          <div class="bl2">${c.label}</div>
        </div>`;}).join('')}
    </div>
    <div style="display:flex;gap:12px;justify-content:center;margin-top:6px;font-size:.62rem;color:var(--t3)">
      <span>🟢 Income</span><span>🔴 Outflow</span>
    </div>
  </div>

  <!-- CC OUTSTANDING -->
  ${ccOut>0?`<div class="card fi2">
    <div class="sh"><div class="st">💳 CC Outstanding Impact</div><div class="sa" onclick="openPage('CC')">Manage →</div></div>
    <div style="font-size:.8rem;color:var(--t2);margin-bottom:8px">
      Total CC debt: <strong style="color:var(--r)">${fmt(ccOut)}</strong>
      ${income>0?` — that's <strong>${pct(ccOut,income).toFixed(0)}%</strong> of your monthly income.`:''}
    </div>
    ${D.data.ccCards.filter(c=>c.outstanding>0).map(c=>{
      const now2=new Date();const due=c.dueDay-now2.getDate();
      return`<div class="cf-row exp" style="margin-bottom:5px">
        <div class="cf-label">${c.name}</div>
        <div style="font-size:.62rem;color:${due<0?'var(--r)':due<=5?'var(--am)':'var(--t3)'}">${due<0?'OVERDUE':due===0?'Due today':'Due in '+due+'d'}</div>
        <div class="cf-amt" style="color:var(--r)">${fmt(c.outstanding)}</div>
      </div>`;}).join('')}
  </div>`:''}`;
}
