<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0a0a0f"/>
<title>SpendWise — Personal Finance OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ===================== RESET & ROOT ===================== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;
  --bg2:#0f0f1a;
  --bg3:#141422;
  --card:#16162a;
  --card2:#1c1c32;
  --border:#ffffff0f;
  --border2:#ffffff18;
  --accent:#6c63ff;
  --accent2:#a78bfa;
  --green:#22d3a5;
  --red:#ff5f7e;
  --amber:#fbbf24;
  --blue:#38bdf8;
  --text:#f0f0ff;
  --text2:#a0a0c0;
  --text3:#606080;
  --font-display:'Syne',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --r:14px;--r2:20px;
  --shadow:0 4px 32px #00000060;
  --glow:0 0 40px #6c63ff30;
}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 50% at 20% -10%,#6c63ff18 0%,transparent 60%),
             radial-gradient(ellipse 60% 40% at 80% 100%,#22d3a520 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

/* ===================== SCROLLBAR ===================== */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#ffffff20;border-radius:2px}

/* ===================== LOCK SCREEN ===================== */
#lockScreen{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;
}
#lockScreen .logo{
  font-family:var(--font-display);font-size:2rem;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent2),var(--green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:-1px;
}
#lockScreen .sub{color:var(--text2);font-size:.875rem;letter-spacing:.1em;text-transform:uppercase}
.pin-dots{display:flex;gap:12px;margin:8px 0}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border2);transition:.2s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);box-shadow:0 0 12px var(--accent)}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px}
.pin-btn{
  width:72px;height:72px;border-radius:50%;border:1px solid var(--border2);
  background:var(--card);color:var(--text);font-family:var(--font-display);font-size:1.4rem;font-weight:600;
  cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;
}
.pin-btn:active{background:var(--accent);transform:scale(.93)}
.pin-btn.zero{grid-column:2}
.pin-btn.del{grid-column:3;font-size:1rem;color:var(--text2)}
.pin-hint{color:var(--text3);font-size:.78rem;margin-top:-8px}
.pin-err{color:var(--red);font-size:.85rem;animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* ===================== MAIN APP ===================== */
#app{display:none;flex-direction:column;min-height:100vh;position:relative;z-index:1}

/* ===================== TOP BAR ===================== */
.topbar{
  padding:20px 20px 0;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  background:linear-gradient(to bottom,var(--bg) 70%,transparent);
}
.topbar-logo{
  font-family:var(--font-display);font-size:1.3rem;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.topbar-month{
  display:flex;align-items:center;gap:8px;
  background:var(--card);border:1px solid var(--border);border-radius:40px;
  padding:6px 14px;cursor:pointer;font-size:.85rem;color:var(--text2);
}
.topbar-actions{display:flex;gap:8px}
.icon-btn{
  width:38px;height:38px;border-radius:50%;border:1px solid var(--border);
  background:var(--card);color:var(--text2);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1rem;transition:.2s;
}
.icon-btn:active{background:var(--card2);transform:scale(.93)}

/* ===================== CONTENT AREA ===================== */
.content{flex:1;padding:16px 16px 90px;display:flex;flex-direction:column;gap:20px}

/* ===================== HERO CARD ===================== */
.hero-card{
  background:linear-gradient(135deg,#1a1a35 0%,#0f1a35 50%,#0a1520 100%);
  border:1px solid var(--border2);border-radius:24px;padding:24px;
  position:relative;overflow:hidden;
}
.hero-card::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,#6c63ff22,transparent 70%);
  pointer-events:none;
}
.hero-label{color:var(--text3);font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px}
.hero-amount{
  font-family:var(--font-display);font-size:2.6rem;font-weight:800;
  letter-spacing:-2px;line-height:1;
}
.hero-amount .rupee{font-size:1.8rem;font-weight:400;color:var(--text2)}
.hero-trend{display:flex;align-items:center;gap:6px;margin-top:6px;font-size:.8rem;color:var(--text2)}
.trend-up{color:var(--green)}.trend-down{color:var(--red)}
.hero-stats{
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px;
}
.stat-item{background:#ffffff06;border-radius:12px;padding:12px;text-align:center}
.stat-label{font-size:.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.stat-val{font-family:var(--font-mono);font-size:.95rem;font-weight:500}
.stat-val.green{color:var(--green)}.stat-val.red{color:var(--red)}.stat-val.amber{color:var(--amber)}

/* ===================== ACCOUNTS STRIP ===================== */
.section-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.section-title{font-family:var(--font-display);font-size:1rem;font-weight:700}
.see-all{color:var(--accent);font-size:.8rem;cursor:pointer}
.accounts-strip{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;scroll-snap-type:x mandatory}
.accounts-strip::-webkit-scrollbar{height:0}
.account-chip{
  min-width:160px;scroll-snap-align:start;
  background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;
  position:relative;overflow:hidden;flex-shrink:0;cursor:pointer;transition:.2s;
}
.account-chip.selected{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.account-chip::after{
  content:'';position:absolute;bottom:-20px;right:-20px;
  width:80px;height:80px;border-radius:50%;
  background:radial-gradient(var(--accent)15,transparent 70%);
}
.chip-bank{font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em}
.chip-name{font-size:.9rem;font-weight:500;margin:2px 0}
.chip-bal{font-family:var(--font-mono);font-size:1.1rem;font-weight:500;color:var(--green)}
.chip-type{
  display:inline-block;font-size:.65rem;background:var(--accent)22;color:var(--accent2);
  padding:2px 8px;border-radius:20px;margin-top:6px;
}
.add-account-chip{
  min-width:120px;scroll-snap-align:start;
  background:transparent;border:1px dashed var(--border2);border-radius:16px;padding:14px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  cursor:pointer;flex-shrink:0;color:var(--text3);font-size:.8rem;transition:.2s;
}
.add-account-chip:hover{border-color:var(--accent);color:var(--accent)}

/* ===================== QUICK ACTIONS ===================== */
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.quick-btn{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;transition:.2s;
}
.quick-btn:active{transform:scale(.96);background:var(--card2)}
.quick-icon{font-size:1.4rem}
.quick-label{font-size:.68rem;color:var(--text2);text-align:center;font-weight:500}

/* ===================== CARDS ===================== */
.card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:20px;
}
.card-sm{border-radius:var(--r);padding:14px}

/* ===================== EMI CARDS ===================== */
.emi-list{display:flex;flex-direction:column;gap:10px}
.emi-item{
  background:var(--card2);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 16px;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;
}
.emi-item::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(to bottom,var(--accent),var(--accent2));border-radius:2px 0 0 2px;
}
.emi-icon{font-size:1.3rem;flex-shrink:0}
.emi-info{flex:1}
.emi-name{font-size:.9rem;font-weight:500}
.emi-meta{font-size:.72rem;color:var(--text3);margin-top:2px}
.emi-right{text-align:right}
.emi-amt{font-family:var(--font-mono);font-size:1rem;font-weight:500;color:var(--amber)}
.emi-remain{font-size:.7rem;color:var(--text3);margin-top:2px}
.emi-progress{
  height:3px;background:var(--border2);border-radius:2px;margin-top:8px;
}
.emi-bar{height:100%;border-radius:2px;background:linear-gradient(to right,var(--accent),var(--accent2))}
.emi-closing-soon{
  background:#fbbf2415;border:1px solid #fbbf2440;border-radius:8px;
  padding:8px 12px;font-size:.75rem;color:var(--amber);margin-top:8px;
  display:flex;align-items:center;gap:6px;
}

/* ===================== INVESTMENT CARDS ===================== */
.inv-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.inv-card{
  background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:14px;
}
.inv-type{font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.inv-name{font-size:.85rem;font-weight:500;margin:4px 0 2px}
.inv-amt{font-family:var(--font-mono);font-size:1rem;color:var(--green);font-weight:500}
.inv-return{font-size:.72rem;color:var(--accent2)}

/* ===================== CHART BARS ===================== */
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:80px;padding:4px 0}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{
  width:100%;border-radius:4px 4px 0 0;
  background:linear-gradient(to top,var(--accent)80,var(--accent2));
  transition:height .4s ease;min-height:2px;
}
.bar-wrap.active .bar{background:linear-gradient(to top,var(--green)80,#34d399)}
.bar-label{font-size:.6rem;color:var(--text3)}
.bar-amt{font-size:.58rem;color:var(--text2);font-family:var(--font-mono)}

/* ===================== TRANSACTIONS ===================== */
.tx-list{display:flex;flex-direction:column;gap:8px}
.tx-item{
  display:flex;align-items:center;gap:12px;
  padding:12px;background:var(--card2);border-radius:var(--r);
  border:1px solid var(--border);
}
.tx-icon{
  width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;flex-shrink:0;
}
.tx-icon.spend{background:#ff5f7e18}
.tx-icon.save{background:#22d3a518}
.tx-icon.emi{background:#6c63ff18}
.tx-icon.invest{background:#38bdf818}
.tx-info{flex:1}
.tx-name{font-size:.875rem;font-weight:500}
.tx-sub{font-size:.72rem;color:var(--text3);margin-top:1px}
.tx-amt{font-family:var(--font-mono);font-size:.95rem;font-weight:500}
.tx-amt.debit{color:var(--red)}.tx-amt.credit{color:var(--green)}

/* ===================== AI ADVISER ===================== */
.adviser-card{
  background:linear-gradient(135deg,#1a2240,#0f1a30);
  border:1px solid #6c63ff30;border-radius:var(--r2);padding:20px;
  position:relative;overflow:hidden;
}
.adviser-card::before{
  content:'';position:absolute;top:-30px;right:-30px;
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(#6c63ff30,transparent 70%);
}
.adviser-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.adviser-avatar{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;
  flex-shrink:0;box-shadow:0 0 20px #6c63ff40;
}
.adviser-name{font-family:var(--font-display);font-size:1rem;font-weight:700}
.adviser-status{font-size:.7rem;color:var(--green);display:flex;align-items:center;gap:4px}
.adviser-status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block}
.insight-list{display:flex;flex-direction:column;gap:10px}
.insight{
  background:#ffffff06;border-radius:10px;padding:12px;
  font-size:.82rem;line-height:1.5;color:var(--text2);
  border-left:2px solid var(--accent);
}
.insight.warning{border-color:var(--amber);background:#fbbf2408}
.insight.success{border-color:var(--green);background:#22d3a508}
.insight.tip{border-color:var(--blue);background:#38bdf808}
.insight strong{color:var(--text);font-weight:500}
.ask-adviser{
  display:flex;gap:8px;margin-top:14px;
}
.ask-input{
  flex:1;background:#ffffff08;border:1px solid var(--border2);border-radius:40px;
  padding:10px 16px;color:var(--text);font-family:var(--font-body);font-size:.85rem;
  outline:none;transition:.2s;
}
.ask-input:focus{border-color:var(--accent);background:#ffffff10}
.ask-input::placeholder{color:var(--text3)}
.ask-btn{
  background:var(--accent);border:none;border-radius:40px;padding:10px 20px;
  color:#fff;font-weight:600;font-size:.85rem;cursor:pointer;transition:.2s;white-space:nowrap;
}
.ask-btn:active{transform:scale(.96)}
.typing-indicator{display:flex;align-items:center;gap:4px;padding:10px 0}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:typing 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* ===================== BOTTOM NAV ===================== */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--bg2);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:8px 0 calc(8px + env(safe-area-inset-bottom));
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;padding:6px 0;transition:.2s;position:relative;
}
.nav-icon{font-size:1.2rem;transition:.2s}
.nav-label{font-size:.62rem;color:var(--text3);font-weight:500;transition:.2s}
.nav-item.active .nav-label{color:var(--accent)}
.nav-item.active .nav-icon{transform:translateY(-2px)}
.nav-item.active::after{
  content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);
  width:24px;height:3px;background:var(--accent);border-radius:0 0 3px 3px;
}
.nav-add{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:1.4rem;
  box-shadow:0 4px 20px #6c63ff60;cursor:pointer;transition:.2s;flex-shrink:0;
  margin:0 4px;
}
.nav-add:active{transform:scale(.93)}

/* ===================== MODALS ===================== */
.modal-overlay{
  position:fixed;inset:0;z-index:500;background:#00000080;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--bg2);border-radius:24px 24px 0 0;
  border:1px solid var(--border);border-bottom:none;
  width:100%;max-width:520px;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  max-height:90vh;overflow-y:auto;
}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0}
.modal-head{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:var(--font-display);font-size:1.1rem;font-weight:700}
.modal-close{
  width:32px;height:32px;border-radius:50%;background:var(--card2);border:none;
  color:var(--text2);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.modal-body{padding:20px}
.form-group{margin-bottom:16px}
.form-label{font-size:.78rem;color:var(--text2);margin-bottom:6px;display:block;font-weight:500}
.form-input,.form-select,.form-textarea{
  width:100%;background:var(--card);border:1px solid var(--border2);border-radius:var(--r);
  padding:12px 14px;color:var(--text);font-family:var(--font-body);font-size:.9rem;
  outline:none;transition:.2s;appearance:none;
}
.form-input:focus,.form-select:focus{border-color:var(--accent);background:var(--card2)}
.form-select option{background:var(--card2);color:var(--text)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-hint{font-size:.72rem;color:var(--text3);margin-top:4px}
.tab-group{display:flex;background:var(--card);border-radius:12px;padding:4px;gap:4px;margin-bottom:20px}
.tab-btn{
  flex:1;padding:8px;border-radius:8px;border:none;background:transparent;
  color:var(--text2);font-size:.82rem;font-weight:500;cursor:pointer;transition:.2s;font-family:var(--font-body);
}
.tab-btn.active{background:var(--accent);color:#fff}
.submit-btn{
  width:100%;padding:16px;border-radius:var(--r);border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-family:var(--font-display);font-size:1rem;font-weight:700;
  cursor:pointer;transition:.2s;letter-spacing:.02em;
}
.submit-btn:active{transform:scale(.98)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}

/* ===================== TABS (PAGES) ===================== */
.page{display:none}.page.active{display:block}
.page-content{padding:16px 16px 90px;display:flex;flex-direction:column;gap:20px}

/* ===================== REPORT PAGE ===================== */
.month-summary{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
}
.summary-box{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;
}
.summary-box .label{font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.summary-box .val{font-family:var(--font-mono);font-size:1.2rem;font-weight:500}
.summary-box.full{grid-column:1/-1}
.progress-bar{height:8px;background:var(--border2);border-radius:4px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .5s ease}
.progress-fill.green{background:linear-gradient(to right,var(--green),#34d399)}
.progress-fill.amber{background:linear-gradient(to right,var(--amber),#f59e0b)}
.progress-fill.red{background:linear-gradient(to right,var(--red),#f87171)}

/* ===================== BADGES ===================== */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:.68rem;padding:3px 10px;border-radius:20px;font-weight:600;
}
.badge.green{background:#22d3a520;color:var(--green)}
.badge.red{background:#ff5f7e20;color:var(--red)}
.badge.amber{background:#fbbf2420;color:var(--amber)}
.badge.blue{background:#38bdf820;color:var(--blue)}
.badge.purple{background:#6c63ff20;color:var(--accent2)}

/* ===================== EMPTY STATE ===================== */
.empty-state{
  text-align:center;padding:40px 20px;color:var(--text3);
}
.empty-state .icon{font-size:2.5rem;margin-bottom:12px}
.empty-state .msg{font-size:.875rem;line-height:1.5}

/* ===================== TOAST ===================== */
.toast{
  position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--card2);border:1px solid var(--border2);border-radius:40px;
  padding:10px 20px;font-size:.85rem;color:var(--text);
  z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  display:flex;align-items:center;gap:8px;white-space:nowrap;
  box-shadow:var(--shadow);
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.success{border-color:var(--green);color:var(--green)}

/* ===================== MISC ===================== */
.divider{height:1px;background:var(--border);margin:4px 0}
.text-muted{color:var(--text3);font-size:.8rem}
.mono{font-family:var(--font-mono)}
.pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.pill{
  font-size:.72rem;padding:4px 12px;border-radius:20px;cursor:pointer;
  background:var(--card2);border:1px solid var(--border);color:var(--text2);transition:.15s;
}
.pill:hover,.pill.sel{background:var(--accent)22;border-color:var(--accent);color:var(--accent2)}
.forecast-table{width:100%;border-collapse:collapse;font-size:.8rem}
.forecast-table th{
  text-align:left;padding:8px 10px;color:var(--text3);
  font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;
  border-bottom:1px solid var(--border);font-weight:500;
}
.forecast-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2)}
.forecast-table tr:last-child td{border:none}
.forecast-table .mono{color:var(--text);font-family:var(--font-mono);font-size:.82rem}

/* ===================== RESPONSIVE ===================== */
@media(min-width:520px){
  .content,.page-content{padding-left:calc((100vw - 520px)/2 + 16px);padding-right:calc((100vw - 520px)/2 + 16px)}
  .bottom-nav{justify-content:center}.bottom-nav>*{max-width:520px;width:100%}
  .modal{max-width:520px}
}

/* ===================== ANIMATIONS ===================== */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease both}
@keyframes countUp{from{opacity:0}to{opacity:1}}
.num-animate{animation:countUp .4s ease}

/* Loading indicator */
.spinner{
  width:20px;height:20px;border:2px solid var(--border2);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;display:inline-block;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ===================== LOCK SCREEN ===================== -->
<div id="lockScreen">
  <div class="logo">💰 SpendWise</div>
  <div class="sub">Personal Finance OS</div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn zero" onclick="pinPress('0')">0</button>
    <button class="pin-btn del" onclick="pinDel()">⌫</button>
  </div>
  <div class="pin-hint" id="pinHint">Default PIN: 1234 (change in Settings)</div>
</div>

<!-- ===================== MAIN APP ===================== -->
<div id="app">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-logo">💰 SpendWise</div>
    <div class="topbar-month" onclick="openMonthPicker()">
      <span id="topbarMonth">May 2025</span> ▾
    </div>
    <div class="topbar-actions">
      <div class="icon-btn" onclick="openSettings()" title="Settings">⚙️</div>
    </div>
  </div>

  <!-- PAGES -->
  <div id="pageHome" class="page active">
    <div class="content" id="homeContent"></div>
  </div>
  <div id="pageEMI" class="page">
    <div class="page-content" id="emiContent"></div>
  </div>
  <div id="pageSavings" class="page">
    <div class="page-content" id="savingsContent"></div>
  </div>
  <div id="pageCards" class="page">
    <div class="page-content" id="cardsContent"></div>
  </div>
  <div id="pageReport" class="page">
    <div class="page-content" id="reportContent"></div>
  </div>
  <div id="pageAdviser" class="page">
    <div class="page-content" id="adviserContent"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <div class="nav-item active" id="navHome" onclick="switchPage('Home')">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">Home</div>
    </div>
    <div class="nav-item" id="navEMI" onclick="switchPage('EMI')">
      <div class="nav-icon">🔁</div>
      <div class="nav-label">EMIs</div>
    </div>
    <div class="nav-add" onclick="openAddModal()">＋</div>
    <div class="nav-item" id="navSavings" onclick="switchPage('Savings')">
      <div class="nav-icon">💰</div>
      <div class="nav-label">Savings</div>
    </div>
    <div class="nav-item" id="navReport" onclick="switchPage('Report')">
      <div class="nav-icon">📊</div>
      <div class="nav-label">Report</div>
    </div>
  </div>
</div>

<!-- ===================== ADD MODAL ===================== -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-title" id="addModalTitle">Add Entry</div>
      <button class="modal-close" onclick="closeModal('addModal')">✕</button>
    </div>
    <div class="modal-body" id="addModalBody"></div>
  </div>
</div>

<!-- ===================== SETTINGS MODAL ===================== -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-title">Settings</div>
      <button class="modal-close" onclick="closeModal('settingsModal')">✕</button>
    </div>
    <div class="modal-body" id="settingsBody"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===================== STATE =====================
const SW = {
  PIN: '1234',
  currentPage: 'Home',
  selectedMonth: null, // {year, month} 0-based
  data: {
    accounts: [],      // {id, name, bank, type, balance, alert}
    expenses: [],      // {id, date, category, desc, amount, paidFrom, accountId}
    emis: [],          // {id, name, monthly, dueDay, remaining, total, interest, type, accountId, startDate}
    investments: [],   // {id, name, type, amount, interest, startDate, maturityDate, sip}
    ccCards: [],       // {id, name, bank, limit, billDay, outstanding}
    ccSpends: [],      // {id, cardId, desc, amount, date}
    income: {},        // {'YYYY-MM': amount}
    transactions: [],  // ledger of all real movements
    settings: {defaultIncome: 0, pin: '1234', currency: '₹'}
  }
};

// ===================== INIT =====================
function init() {
  loadData();
  const now = new Date();
  SW.selectedMonth = {year: now.getFullYear(), month: now.getMonth()};
  updateTopbarMonth();

  // Check if first launch
  if (!SW.data.accounts.length && !SW.data.settings.initialized) {
    setTimeout(() => openSettings(), 400);
  }
}

// ===================== STORAGE =====================
function saveData() {
  localStorage.setItem('sw_data', JSON.stringify(SW.data));
  localStorage.setItem('sw_pin', SW.PIN);
}
function loadData() {
  const raw = localStorage.getItem('sw_data');
  if (raw) {
    const parsed = JSON.parse(raw);
    SW.data = {...SW.data, ...parsed};
    // Ensure all arrays exist
    ['accounts','expenses','emis','investments','ccCards','ccSpends','transactions'].forEach(k => {
      if (!SW.data[k]) SW.data[k] = [];
    });
    if (!SW.data.income) SW.data.income = {};
    if (!SW.data.settings) SW.data.settings = {defaultIncome:0,pin:'1234',currency:'₹'};
  }
  SW.PIN = localStorage.getItem('sw_pin') || SW.data.settings?.pin || '1234';
}

// ===================== PIN =====================
let pinBuf = '';
function pinPress(d) {
  if (pinBuf.length >= 4) return;
  pinBuf += d;
  document.getElementById('d'+(pinBuf.length-1)).classList.add('filled');
  if (pinBuf.length === 4) {
    setTimeout(() => {
      if (pinBuf === SW.PIN) {
        document.getElementById('lockScreen').style.opacity = '0';
        document.getElementById('lockScreen').style.transform = 'scale(1.04)';
        document.getElementById('lockScreen').style.transition = '.3s';
        setTimeout(() => {
          document.getElementById('lockScreen').style.display = 'none';
          document.getElementById('app').style.display = 'flex';
          renderAll();
        }, 300);
      } else {
        document.getElementById('pinHint').innerHTML = '<span class="pin-err">Wrong PIN. Try again.</span>';
        pinBuf = '';
        for (let i=0;i<4;i++) document.getElementById('d'+i).classList.remove('filled');
      }
    }, 150);
  }
}
function pinDel() {
  if (!pinBuf.length) return;
  pinBuf = pinBuf.slice(0,-1);
  document.getElementById('d'+pinBuf.length).classList.remove('filled');
}

// ===================== MONTH =====================
function updateTopbarMonth() {
  const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('topbarMonth').textContent =
    names[SW.selectedMonth.month] + ' ' + SW.selectedMonth.year;
}
function openMonthPicker() {
  const now = new Date();
  const months = [];
  for (let i = -6; i <= 0; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    months.push({year: d.getFullYear(), month: d.getMonth()});
  }
  const names = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const body = months.map(m => `
    <div class="pill ${m.year===SW.selectedMonth.year&&m.month===SW.selectedMonth.month?'sel':''}"
      onclick="selectMonth(${m.year},${m.month});closeModal('addModal')">
      ${names[m.month]} ${m.year}
    </div>`).join('');
  document.getElementById('addModalTitle').textContent = 'Select Month';
  document.getElementById('addModalBody').innerHTML = `<div class="pill-row">${body}</div><div style="height:20px"></div>`;
  openModal('addModal');
}
function selectMonth(y, m) {
  SW.selectedMonth = {year: y, month: m};
  updateTopbarMonth();
  closeModal('addModal');
  renderAll();
}

// ===================== HELPERS =====================
const fmt = n => '₹' + Math.abs(n).toLocaleString('en-IN', {maximumFractionDigits: 0});
const fmtFull = n => '₹' + n.toLocaleString('en-IN', {maximumFractionDigits: 2});
const monthKey = (y, m) => `${y}-${String(m+1).padStart(2,'0')}`;
const todayStr = () => new Date().toISOString().split('T')[0];
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const emiIcons = {home:'🏠',car:'🚗',personal:'💳',education:'📚',device:'📱',ccemi:'💳',other:'📦'};
const catIcons = {food:'🍔',transport:'🚗',shopping:'🛍️',bills:'⚡',health:'💊',entertainment:'🎬',
  education:'📚',recharge:'📱',gym:'💪',salary:'💼',freelance:'💻',rent:'🏠',emi:'🔁',other:'📦',
  groceries:'🛒',dining:'🍽️',travel:'✈️',insurance:'🛡️',fuel:'⛽',savings:'💰'};

function getMonthExpenses(y, m) {
  const key = monthKey(y, m);
  return SW.data.expenses.filter(e => e.date.startsWith(key));
}
function getMonthIncome(y, m) {
  const key = monthKey(y, m);
  return SW.data.income[key] || SW.data.settings.defaultIncome || 0;
}
function getTotalEMI() {
  return SW.data.emis.filter(e => e.remaining > 0).reduce((s, e) => s + e.monthly, 0);
}
function getTotalBalance() {
  return SW.data.accounts.reduce((s, a) => s + a.balance, 0);
}
function getTotalInvestments() {
  return SW.data.investments.reduce((s, i) => s + i.amount, 0);
}
function getTotalSIP() {
  return SW.data.investments.filter(i => i.sip > 0).reduce((s, i) => s + i.sip, 0);
}
function accountById(id) {
  return SW.data.accounts.find(a => a.id === id);
}

// ===================== ACCOUNT DEDUCTION =====================
function deductFromAccount(accountId, amount, desc, date) {
  if (!accountId) return true; // cash, no tracking
  const acc = SW.data.accounts.find(a => a.id === accountId);
  if (!acc) return true;
  if (acc.balance < amount) {
    showToast('⚠️ Low balance on ' + acc.name + '! Proceeding anyway.', 'error');
  }
  acc.balance -= amount;
  // Add transaction to ledger
  SW.data.transactions.push({
    id: uid(), accountId, type: 'debit', amount, desc, date: date || todayStr()
  });
  return true;
}
function creditToAccount(accountId, amount, desc, date) {
  if (!accountId) return;
  const acc = SW.data.accounts.find(a => a.id === accountId);
  if (!acc) return;
  acc.balance += amount;
  SW.data.transactions.push({
    id: uid(), accountId, type: 'credit', amount, desc, date: date || todayStr()
  });
}

// ===================== RENDER ALL =====================
function renderAll() {
  renderHome();
  renderEMI();
  renderSavings();
  renderReport();
  renderAdviser();
}

// ===================== HOME PAGE =====================
function renderHome() {
  const {year, month} = SW.selectedMonth;
  const exps = getMonthExpenses(year, month);
  const income = getMonthIncome(year, month);
  const totalSpent = exps.reduce((s, e) => s + e.amount, 0);
  const emiTotal = getTotalEMI();
  const balance = getTotalBalance();
  const saved = income - totalSpent - emiTotal;
  const dailyAvg = totalSpent / (new Date().getDate()) || 0;
  const projection = dailyAvg * new Date(year, month+1, 0).getDate();
  const savings_pct = income > 0 ? Math.max(0, Math.min(100, saved/income*100)) : 0;

  // 6-month chart data
  const months6 = [];
  for (let i=5; i>=0; i--) {
    const d = new Date(year, month-i, 1);
    months6.push({year: d.getFullYear(), month: d.getMonth()});
  }
  const chartVals = months6.map(m => getMonthExpenses(m.year, m.month).reduce((s,e)=>s+e.amount,0));
  const maxVal = Math.max(...chartVals, 1);
  const monthLabels = ['J','F','M','A','M','J','J','A','S','O','N','D'];

  const recentTx = [...exps].sort((a,b) => new Date(b.date)-new Date(a.date)).slice(0, 5);

  document.getElementById('homeContent').innerHTML = `
    <!-- HERO -->
    <div class="hero-card fade-in">
      <div class="hero-label">Total Balance</div>
      <div class="hero-amount"><span class="rupee">₹</span>${balance.toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
      <div class="hero-trend">
        <span class="${saved>=0?'trend-up':'trend-down'}">${saved>=0?'▲':'▼'} ${fmt(Math.abs(saved))}</span>
        <span>saved this month</span>
        <span style="margin-left:auto">${savings_pct.toFixed(0)}% savings rate</span>
      </div>
      <div class="hero-stats">
        <div class="stat-item">
          <div class="stat-label">Income</div>
          <div class="stat-val green">${fmt(income)}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Spent</div>
          <div class="stat-val red">${fmt(totalSpent)}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">EMIs</div>
          <div class="stat-val amber">${fmt(emiTotal)}</div>
        </div>
      </div>
    </div>

    <!-- ACCOUNTS -->
    <div class="fade-in" style="animation-delay:.05s">
      <div class="section-head">
        <div class="section-title">Accounts</div>
        <div class="see-all" onclick="openAddModal('account')">+ Add</div>
      </div>
      <div class="accounts-strip" id="accountsStrip">
        ${SW.data.accounts.map(a => `
          <div class="account-chip ${a.alert && a.balance < a.alert ? 'alert' : ''}" onclick="openAccountDetail('${a.id}')">
            <div class="chip-bank">${a.bank||'Bank'}</div>
            <div class="chip-name">${a.name}</div>
            <div class="chip-bal">${fmt(a.balance)}</div>
            <div class="chip-type">${a.type||'Savings'}</div>
            ${a.alert && a.balance < a.alert ? '<div style="color:var(--amber);font-size:.65rem;margin-top:4px">⚠ Low balance</div>' : ''}
          </div>`).join('')}
        <div class="add-account-chip" onclick="openAddModal('account')">
          <div style="font-size:1.5rem">🏦</div>
          <div>Add Account</div>
        </div>
      </div>
    </div>

    <!-- QUICK ACTIONS -->
    <div class="fade-in" style="animation-delay:.1s">
      <div class="quick-grid">
        <div class="quick-btn" onclick="openAddModal('expense')">
          <div class="quick-icon">💸</div><div class="quick-label">Add Expense</div>
        </div>
        <div class="quick-btn" onclick="openAddModal('income')">
          <div class="quick-icon">💼</div><div class="quick-label">Add Income</div>
        </div>
        <div class="quick-btn" onclick="switchPage('EMI');openAddModal('emi')">
          <div class="quick-icon">🔁</div><div class="quick-label">Add EMI</div>
        </div>
        <div class="quick-btn" onclick="switchPage('Savings');openAddModal('investment')">
          <div class="quick-icon">📈</div><div class="quick-label">Invest</div>
        </div>
      </div>
    </div>

    <!-- NEXT MONTH INCOME PREVIEW (if set) -->
    ${(()=>{
      const next = new Date(year, month+1, 1);
      const nKey = monthKey(next.getFullYear(), next.getMonth());
      const nIncome = SW.data.income[nKey];
      if (!nIncome) return '';
      const nLabel = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][next.getMonth()] + ' ' + next.getFullYear();
      return `<div style="background:#fbbf2410;border:1px solid #fbbf2435;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer" onclick="selectMonth(${next.getFullYear()},${next.getMonth()})">
        <div style="font-size:1.4rem">⏭</div>
        <div style="flex:1">
          <div style="font-size:.82rem;font-weight:600;color:var(--amber)">Next Month Income Pre-set</div>
          <div style="font-size:.75rem;color:var(--text3);margin-top:2px">${nLabel} · Tap to view that month's budget</div>
        </div>
        <div style="font-family:var(--font-mono);color:var(--amber);font-size:1rem">${fmt(nIncome)}</div>
      </div>`;
    })()}

    <!-- 6 MONTH CHART -->
    <div class="card fade-in" style="animation-delay:.15s">
      <div class="section-head" style="margin-bottom:16px">
        <div class="section-title">6 Month Spend</div>
        <span class="badge purple">${fmt(totalSpent)} this month</span>
      </div>
      <div class="chart-bars">
        ${months6.map((m, i) => {
          const pct = (chartVals[i]/maxVal*100).toFixed(1);
          const isCurrent = m.year===year && m.month===month;
          return `<div class="bar-wrap ${isCurrent?'active':''}" onclick="selectMonth(${m.year},${m.month})">
            <div class="bar-amt">${chartVals[i]>0?fmt(chartVals[i]):''}</div>
            <div class="bar" style="height:${pct}%;"></div>
            <div class="bar-label">${monthLabels[m.month]}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- DAILY STATS -->
    <div class="card fade-in" style="animation-delay:.2s">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div>
          <div class="text-muted" style="margin-bottom:4px">Daily Avg</div>
          <div class="mono" style="font-size:1.1rem">${fmt(dailyAvg)}<span style="font-size:.75rem;color:var(--text3)">/day</span></div>
        </div>
        <div>
          <div class="text-muted" style="margin-bottom:4px">Projection</div>
          <div class="mono" style="font-size:1.1rem;color:${projection>income?'var(--red)':'var(--green)'}">${fmt(projection)}</div>
        </div>
        <div>
          <div class="text-muted" style="margin-bottom:4px">SIP Monthly</div>
          <div class="mono" style="font-size:1.1rem;color:var(--blue)">${fmt(getTotalSIP())}</div>
        </div>
        <div>
          <div class="text-muted" style="margin-bottom:4px">Investments</div>
          <div class="mono" style="font-size:1.1rem;color:var(--green)">${fmt(getTotalInvestments())}</div>
        </div>
      </div>
    </div>

    <!-- RECENT TRANSACTIONS -->
    <div class="fade-in" style="animation-delay:.25s">
      <div class="section-head">
        <div class="section-title">Recent Transactions</div>
        <div class="see-all" onclick="switchPage('Report')">See all →</div>
      </div>
      <div class="tx-list">
        ${recentTx.length ? recentTx.map(tx => `
          <div class="tx-item">
            <div class="tx-icon spend">${catIcons[tx.category]||'📦'}</div>
            <div class="tx-info">
              <div class="tx-name">${tx.desc||tx.category}</div>
              <div class="tx-sub">${tx.category} · ${tx.date}${tx.accountName?' · '+tx.accountName:''}</div>
            </div>
            <div class="tx-amt debit">-${fmt(tx.amount)}</div>
          </div>`).join('') : `<div class="empty-state"><div class="icon">📭</div><div class="msg">No expenses this month.<br>Tap + to add one.</div></div>`}
      </div>
    </div>
  `;
}

// ===================== EMI PAGE =====================
function renderEMI() {
  const emis = SW.data.emis;
  const now = new Date();
  const activeEmis = emis.filter(e => e.remaining > 0)
    .sort((a, b) => a.remaining - b.remaining);
  const closingEmis = activeEmis.filter(e => e.remaining <= 3);
  const totalMonthly = activeEmis.reduce((s, e) => s + e.monthly, 0);
  const totalPending = activeEmis.reduce((s, e) => s + e.monthly * e.remaining, 0);

  // 12-month forecast
  const forecast = [];
  for (let i = 0; i < 12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    const active = emis.filter(e => e.remaining > i && e.remaining > 0);
    forecast.push({
      label: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()] + ' ' + d.getFullYear(),
      total: active.reduce((s, e) => s + e.monthly, 0),
      count: active.length
    });
  }

  document.getElementById('emiContent').innerHTML = `
    <div class="hero-card fade-in">
      <div class="hero-label">Total Monthly EMI Burden</div>
      <div class="hero-amount"><span class="rupee">₹</span>${totalMonthly.toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
      <div class="hero-trend">
        <span class="trend-down">${activeEmis.length} active loans</span>

function renderAdviser() {
  const {year, month} = SW.selectedMonth;
  const income = getMonthIncome(year, month);
  const exps = getMonthExpenses(year, month);
  const totalSpent = exps.reduce((s,e)=>s+e.amount,0);
  const emiTotal = getTotalEMI();
  const sipTotal = getTotalSIP();
  const totalInv = getTotalInvestments();
  const saved = income - totalSpent - emiTotal - sipTotal;
  const spendRate = income > 0 ? totalSpent/income*100 : 0;
  const emiRate = income > 0 ? emiTotal/income*100 : 0;
  const closingEmis = SW.data.emis.filter(e => e.remaining > 0 && e.remaining <= 3);
  const noInvestment = SW.data.investments.length === 0;

  // Generate insights
  const insights = [];

  if (income === 0) {
    insights.push({type:'warning', msg:`<strong>Set your income</strong> for ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][month]} to get personalized insights. Tap ⚙️ → Income.`});
  }

  if (spendRate > 70) {
    insights.push({type:'warning', msg:`<strong>High spending alert!</strong> You've spent ${spendRate.toFixed(0)}% of income on expenses. Aim to keep it under 50% for healthy savings.`});
  } else if (spendRate > 0 && spendRate < 50) {
    insights.push({type:'success', msg:`<strong>Great discipline!</strong> Only ${spendRate.toFixed(0)}% of income spent on expenses. You're on track for solid savings this month.`});
  }

  if (emiRate > 40) {
    insights.push({type:'warning', msg:`<strong>EMI burden is high</strong> at ${emiRate.toFixed(0)}% of income (${fmt(emiTotal)}/mo). Financial advisers recommend keeping EMIs under 30-35% of income.`});
  }

  closingEmis.forEach(e => {
    const sipSuggestion = Math.round(e.monthly * 0.7);
    insights.push({type:'tip', msg:`<strong>${e.name}</strong> closes in ${e.remaining} month${e.remaining>1?'s':''}! When it does, redirect <strong>${fmt(sipSuggestion)}/mo</strong> (70% of freed EMI) into a SIP. Even small amounts compound significantly over 5-10 years.`});
  });

  if (noInvestment && income > 0) {
    insights.push({type:'tip', msg:`<strong>Start investing today!</strong> You have no investments. Even a ₹500/mo SIP in an index fund could grow to ₹${(500*12*10*(Math.pow(1.12,10)-1)/0.12/1000).toFixed(0)}K+ in 10 years at 12% CAGR.`});
  }

  if (sipTotal === 0 && income > 0 && saved > 0) {
    const sipRec = Math.round(saved * 0.5);
    insights.push({type:'tip', msg:`<strong>No SIP running!</strong> You're saving ${fmt(saved)} this month. Consider starting a ₹${sipRec.toLocaleString('en-IN')}/mo SIP (50% of savings) in a diversified mutual fund.`});
  }

  if (totalInv > 0 && income > 0) {
    const invRate = totalInv / (income * 12);
    if (invRate < 1) {
      insights.push({type:'tip', msg:`<strong>Boost your portfolio!</strong> Your investments (${fmt(totalInv)}) are less than 1 year's income. Aim for 6-12x annual income in investments for retirement security.`});
    }
  }

  if (saved > 0 && exps.length > 0) {
    // Find top spending category
    const cats = {};
    exps.forEach(e => { cats[e.category] = (cats[e.category]||0) + e.amount; });
    const topCat = Object.entries(cats).sort((a,b)=>b[1]-a[1])[0];
    if (topCat && topCat[1] > income * 0.2) {
      insights.push({type:'warning', msg:`<strong>${topCat[0]}</strong> is your biggest expense at ${fmt(topCat[1])} (${(topCat[1]/income*100).toFixed(0)}% of income). Look for ways to reduce this category by 15-20%.`});
    }
  }

  if (!insights.length) {
    insights.push({type:'success', msg:`<strong>You're doing great!</strong> Keep adding transactions and I'll give you personalized financial advice. I analyze spending patterns, EMI load, savings rate, and investment gaps.`});
  }

  const adviserEl = document.getElementById('adviserContent');
  if (!adviserEl) return;
  adviserEl.innerHTML = `
    <div class="adviser-card fade-in">
      <div class="adviser-header">
        <div class="adviser-avatar">🤖</div>
        <div>
          <div class="adviser-name">SpendWise AI Adviser</div>
          <div class="adviser-status">Active · Analyzing your finances</div>
        </div>
      </div>
      <div class="insight-list" id="insightList">
        ${insights.map(i => `<div class="insight ${i.type}">${i.msg}</div>`).join('')}
      </div>
      <div class="ask-adviser">
        <input class="ask-input" id="adviserInput" placeholder="Ask anything about your finances..." />
        <button class="ask-btn" onclick="askAdviser()">Ask AI</button>
      </div>
      <div id="adviserReply" style="margin-top:12px"></div>
    </div>

    <!-- FINANCIAL HEALTH SCORE -->
    <div class="card fade-in" style="animation-delay:.1s">
      <div class="section-title" style="margin-bottom:16px">💯 Financial Health Score</div>
      ${renderHealthScore(income, totalSpent, emiTotal, sipTotal, totalInv, saved)}
    </div>
  `;
}

function renderHealthScore(income, spent, emi, sip, inv, saved) {
  const scores = [];
  let total = 0;

  const s1 = income > 0 ? Math.min(100, 100 - (spent/income*100)) : 0;
  scores.push({label:'Spending Control', score: Math.max(0,s1), tip: 'Lower spend = higher score'});
  total += Math.max(0,s1);

  const s2 = income > 0 ? Math.max(0, 100 - (emi/income*100)*2) : 0;
  scores.push({label:'EMI Burden', score: Math.max(0,Math.min(100,s2)), tip: 'Aim for EMIs < 30% of income'});
  total += Math.max(0,Math.min(100,s2));

  const s3 = income > 0 ? Math.min(100, sip/income*1000) : 0;
  scores.push({label:'SIP/Investment', score: Math.min(100,s3), tip: 'Invest at least 10% of income'});
  total += Math.min(100,s3);

  const s4 = income > 0 ? Math.min(100, saved/income*100*3) : 0;
  scores.push({label:'Savings Rate', score: Math.max(0,Math.min(100,s4)), tip: 'Aim to save 20%+ of income'});
  total += Math.max(0,Math.min(100,s4));

  const overall = Math.round(total / 4);
  const grade = overall >= 80 ? {g:'A', c:'var(--green)'} : overall >= 60 ? {g:'B', c:'var(--blue)'} : overall >= 40 ? {g:'C', c:'var(--amber)'} : {g:'D', c:'var(--red)'};

  return `
    <div style="display:flex;align-items:center;gap:20px;margin-bottom:20px">
      <div style="width:70px;height:70px;border-radius:50%;border:3px solid ${grade.c};display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
        <div style="font-family:var(--font-display);font-size:1.5rem;font-weight:800;color:${grade.c}">${grade.g}</div>
        <div style="font-size:.65rem;color:var(--text3)">${overall}/100</div>
      </div>
      <div>
        <div style="font-size:.9rem;font-weight:500">Overall Score: <span style="color:${grade.c}">${overall}</span></div>
        <div style="font-size:.78rem;color:var(--text2);margin-top:4px">${overall>=80?'Excellent financial health! Keep it up.':overall>=60?'Good shape, but room to improve.':overall>=40?'Needs attention in a few areas.':'Take action now to improve your finances.'}</div>
      </div>
    </div>
    ${scores.map(s => `
      <div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:.82rem">
          <span>${s.label}</span>
          <span class="mono">${s.score.toFixed(0)}/100</span>
        </div>
        <div class="progress-bar"><div class="progress-fill ${s.score>=70?'green':s.score>=40?'amber':'red'}" style="width:${s.score}%"></div></div>
        <div style="font-size:.68rem;color:var(--text3);margin-top:2px">${s.tip}</div>
      </div>`).join('')}
  `;
}

async function askAdviser() {
  const input = document.getElementById('adviserInput');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  const replyEl = document.getElementById('adviserReply');
  replyEl.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;

  const {year, month} = SW.selectedMonth;
  const income = getMonthIncome(year, month);
  const exps = getMonthExpenses(year, month);
  const totalSpent = exps.reduce((s,e)=>s+e.amount,0);
  const emiTotal = getTotalEMI();
  const sipTotal = getTotalSIP();
  const totalInv = getTotalInvestments();
  const saved = income - totalSpent - emiTotal - sipTotal;

  const context = `You are SpendWise, a smart personal finance adviser for an Indian user.
User's finances this month:
- Income: ₹${income}
- Expenses: ₹${totalSpent} 
- EMI burden: ₹${emiTotal}/month (${SW.data.emis.filter(e=>e.remaining>0).length} loans)
- SIP: ₹${sipTotal}/month
- Total investments: ₹${totalInv}
- Net saved: ₹${saved}
- EMIs closing soon: ${SW.data.emis.filter(e=>e.remaining>0&&e.remaining<=3).map(e=>e.name).join(', ')||'none'}
Answer the user's question in 2-4 sentences, be specific with numbers, and always suggest an actionable next step. Use ₹ for amounts.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: context,
        messages: [{role:'user', content: q}]
      })
    });
    const data = await res.json();
    const text = data.content?.map(c => c.text||'').join('') || 'Sorry, I couldn\'t process that.';
    replyEl.innerHTML = `<div class="insight tip">${text}</div>`;
  } catch (e) {
    replyEl.innerHTML = `<div class="insight warning">AI is unavailable. Tip: ${saved > 0 ? `You have ₹${saved.toLocaleString()} saved this month — consider putting ${Math.round(saved*0.5).toLocaleString()} into a SIP.` : 'Track your income to get personalized advice.'}</div>`;
  }
}

function saveExpense() {
  const cat = document.getElementById('f_cat').value;
  const desc = document.getElementById('f_desc').value;
  const amt = parseFloat(document.getElementById('f_amt').value);
  const date = document.getElementById('f_date').value;
  const accId = document.getElementById('f_acc').value;
  if (!amt || amt <= 0) return showToast('Enter a valid amount', 'error');
  const acc = accId ? accountById(accId) : null;
  const exp = {
    id: uid(), date, category: cat, desc, amount: amt,
    accountId: accId||null, paidFrom: acc?.name||'Cash', accountName: acc?.name||null
  };
  SW.data.expenses.push(exp);
  if (accId) deductFromAccount(accId, amt, desc||cat, date);
  saveData(); renderAll();
  closeModal('addModal');
  showToast(`✅ ₹${amt.toLocaleString('en-IN')} expense added${acc?' from '+acc.name:''}`, 'success');
}

function incomeMonthChanged() {
  const sel = document.getElementById('f_inc_month');
  if (!sel) return;
  const opt = sel.options[sel.selectedIndex];
  const isNext = opt?.dataset?.next === 'true';
  const mKey = sel.value;
  const existing = SW.data.income[mKey] || 0;

  // Update existing info
  const info = document.getElementById('f_inc_existing_info');
  if (info) info.innerHTML = `Income already set for this month: <strong>${fmt(existing)}</strong>`;
  if (existing > 0) {
    document.getElementById('f_income').value = existing;
  }

  // Show/hide early badge
  const badge = document.getElementById('f_inc_early_badge');
  if (badge) badge.style.display = isNext ? 'block' : 'none';

  // Hint
  const hint = document.getElementById('f_inc_month_hint');
  if (hint) {
    if (isNext) {
      hint.innerHTML = '⏭ Salary credited early? Select next month — it counts in that month\'s budget.';
      hint.style.color = 'var(--amber)';
    } else {
      hint.textContent = '';
    }
  }
}

function saveIncome() {
  const amt = parseFloat(document.getElementById('f_income').value);
  if (!amt || amt <= 0) return showToast('Enter a valid amount', 'error');
  const accId = document.getElementById('f_inc_acc').value;
  const setDefault = document.getElementById('f_inc_def').value === 'yes';
  const incType = document.getElementById('f_inc_type')?.value || 'salary';

  // Use the month the user selected (could be next month)
  const mKey = document.getElementById('f_inc_month')?.value
    || monthKey(SW.selectedMonth.year, SW.selectedMonth.month);

  const [mYear, mMon] = mKey.split('-').map(Number);
  const isNextMonth = (mYear > SW.selectedMonth.year)
    || (mYear === SW.selectedMonth.year && mMon > SW.selectedMonth.month + 1);
  const isFuture = mYear * 12 + mMon > SW.selectedMonth.year * 12 + (SW.selectedMonth.month + 1);

  SW.data.income[mKey] = amt;
  if (setDefault) SW.data.settings.defaultIncome = amt;

  // Account balance updates today regardless of which month is selected
  const incTypeLabels = {salary:'Salary',freelance:'Freelance',bonus:'Bonus',rental:'Rental',interest:'Interest/Dividend',other:'Income'};
  if (accId) creditToAccount(accId, amt, (incTypeLabels[incType]||'Income') + (isFuture ? ' (next month, early credit)' : ''), todayStr());

  saveData(); renderAll();
  closeModal('addModal');

  const mNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const label = mNames[mMon - 1] + ' ' + mYear;
  const msg = isFuture
    ? `✅ ${fmt(amt)} saved for ${label}. Account credited today!`
    : `✅ Income set to ${fmt(amt)} for ${label}`;
  showToast(msg, 'success');
}

function saveEMI() {
  const name = document.getElementById('f_ename').value;
  const monthly = parseFloat(document.getElementById('f_emi').value);
  const dueDay = parseInt(document.getElementById('f_edue').value)||5;
  const remaining = parseInt(document.getElementById('f_erem').value)||0;
  const total = parseInt(document.getElementById('f_etot').value)||remaining;
  const interest = parseFloat(document.getElementById('f_eint').value)||0;
  const type = document.getElementById('f_etype').value;
  const accountId = document.getElementById('f_eacc').value;
  if (!name || !monthly) return showToast('Fill name and EMI amount', 'error');
  SW.data.emis.push({id:uid(), name, monthly, dueDay, remaining, total, interest, type, accountId, startDate: todayStr()});
  saveData(); renderAll();
  closeModal('addModal');
  showToast('✅ EMI added: ' + name, 'success');
}

function saveInvestment() {
  const name = document.getElementById('f_iname').value;
  const type = document.getElementById('f_itype').value;
  const amount = parseFloat(document.getElementById('f_iamt').value)||0;
  const interest = parseFloat(document.getElementById('f_iret').value)||0;
  const startDate = document.getElementById('f_istart').value;
  const maturityDate = document.getElementById('f_imatur').value;
  const sip = parseFloat(document.getElementById('f_isip').value)||0;
  const sipAccId = document.getElementById('f_isacc').value;
  if (!name) return showToast('Enter investment name', 'error');
  SW.data.investments.push({id:uid(), name, type, amount, interest, startDate, maturityDate, sip, sipAccountId: sipAccId});
  if (amount > 0 && sipAccId) deductFromAccount(sipAccId, amount, 'Investment: '+name, startDate||todayStr());
  saveData(); renderAll();
  closeModal('addModal');
  showToast('✅ Investment added: ' + name, 'success');
}

function saveAccount() {
  const name = document.getElementById('f_aname').value;
  const bank = document.getElementById('f_abank').value;
  const type = document.getElementById('f_atype').value;
  const balance = parseFloat(document.getElementById('f_abal').value)||0;
  const alert = parseInt(document.getElementById('f_aalert').value)||0;
  if (!name) return showToast('Enter account name', 'error');
  SW.data.accounts.push({id:uid(), name, bank, type, balance, alert});
  saveData(); renderAll();
  closeModal('addModal');
  showToast('✅ Account added: ' + name, 'success');
}

function saveTransfer() {
  const from = document.getElementById('f_tfrom').value;
  const to = document.getElementById('f_tto').value;
  const amt = parseFloat(document.getElementById('f_tamt').value);
  const date = document.getElementById('f_tdate').value;
  if (!from || !to || !amt || from===to) return showToast('Select different accounts and amount', 'error');
  deductFromAccount(from, amt, 'Transfer out', date);
  creditToAccount(to, amt, 'Transfer in', date);
  saveData(); renderAll();
  closeModal('addModal');
  const fn = accountById(from)?.name, tn = accountById(to)?.name;
  showToast(`✅ Transferred ${fmt(amt)} from ${fn} → ${tn}`, 'success');
}

function saveEMIPayment() {
  const emiId = document.getElementById('f_epay_emi').value;
  const accId = document.getElementById('f_epay_acc').value;
  const date = document.getElementById('f_epay_date').value;
  const emi = SW.data.emis.find(e=>e.id===emiId);
  if (!emi) return showToast('Select an EMI', 'error');
  if (accId) deductFromAccount(accId, emi.monthly, 'EMI: '+emi.name, date);
  emi.remaining = Math.max(0, emi.remaining - 1);
  saveData(); renderAll();
  closeModal('addModal');
  showToast(`✅ EMI paid: ${emi.name} — ${fmt(emi.monthly)}${emi.remaining===0?' 🎉 FULLY PAID!':''}`, 'success');
}

function saveSIPDeduction() {
  const invId = document.getElementById('f_sip_inv').value;
  const accId = document.getElementById('f_sip_acc').value;
  const date = document.getElementById('f_sip_date').value;
  const inv = SW.data.investments.find(i=>i.id===invId);
  if (!inv) return showToast('Select a SIP', 'error');
  if (accId) deductFromAccount(accId, inv.sip, 'SIP: '+inv.name, date);
  inv.amount += inv.sip; // Add SIP amount to investment corpus
  saveData(); renderAll();
  closeModal('addModal');
  showToast(`✅ SIP deducted: ${fmt(inv.sip)} from ${accountById(accId)?.name||'Cash'}`, 'success');
}

// ===================== SETTINGS =====================
function openSettings() {
  const s = SW.data.settings;
  document.getElementById('settingsBody').innerHTML = `
    <div class="form-group" style="margin-bottom:24px">
      <div class="form-label" style="font-size:.9rem;font-weight:600;margin-bottom:12px">💰 Default Monthly Income</div>
      <input class="form-input" type="number" id="s_income" value="${s.defaultIncome||''}" placeholder="e.g. 75000" />
      <div class="form-hint">Used for months where you haven't set specific income.</div>
    </div>
    <div class="form-group" style="margin-bottom:24px">
      <div class="form-label" style="font-size:.9rem;font-weight:600;margin-bottom:12px">🔒 Change PIN</div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">New PIN</label>
          <input class="form-input" type="password" id="s_pin" maxlength="4" placeholder="4 digits" /></div>
        <div class="form-group"><label class="form-label">Confirm PIN</label>
          <input class="form-input" type="password" id="s_pin2" maxlength="4" placeholder="4 digits" /></div>
      </div>
    </div>
    <button class="submit-btn" onclick="saveSettings()">Save Settings</button>
    <div style="margin-top:16px">
      <button class="submit-btn" style="background:var(--card2);border:1px solid var(--red);color:var(--red)"
        onclick="if(confirm('Delete ALL data? This cannot be undone.'))clearAllData()">
        ⚠️ Clear All Data
      </button>
    </div>
  `;
  openModal('settingsModal');
}

function saveSettings() {
  const income = parseFloat(document.getElementById('s_income').value)||0;
  const pin = document.getElementById('s_pin').value;
  const pin2 = document.getElementById('s_pin2').value;
  SW.data.settings.defaultIncome = income;
  if (pin) {
    if (pin.length !== 4 || !/^\d{4}$/.test(pin)) return showToast('PIN must be 4 digits', 'error');
    if (pin !== pin2) return showToast('PINs do not match', 'error');
    SW.PIN = pin;
    SW.data.settings.pin = pin;
  }
  SW.data.settings.initialized = true;
  saveData(); renderAll();
  closeModal('settingsModal');
  showToast('✅ Settings saved', 'success');
}

function clearAllData() {
  localStorage.removeItem('sw_data');
  localStorage.removeItem('sw_pin');
  location.reload();
}

// ===================== NAVIGATION =====================
function switchPage(name) {
  SW.currentPage = name;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page'+name).classList.add('active');
  document.getElementById('nav'+name)?.classList.add('active');

  // Render on switch
  if (name === 'Report') renderReport();
  if (name === 'EMI') renderEMI();
  if (name === 'Savings') renderSavings();
}

// ===================== MODALS =====================
function openModal(id) {
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
// Click outside to close
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

// ===================== TOAST =====================
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ===================== ACCOUNT DETAIL =====================
function openAccountDetail(id) {
  const acc = accountById(id);
  if (!acc) return;
  const txs = SW.data.transactions.filter(t => t.accountId === id)
    .sort((a,b) => new Date(b.date)-new Date(a.date)).slice(0, 20);
  document.getElementById('addModalTitle').textContent = acc.name;
  document.getElementById('addModalBody').innerHTML = `
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:.8rem;color:var(--text3)">Current Balance</div>
      <div style="font-family:var(--font-display);font-size:2rem;font-weight:800;color:var(--green)">${fmt(acc.balance)}</div>
      <div class="badge ${acc.type==='Salary'?'blue':'purple'}" style="margin-top:6px">${acc.type}</div>
    </div>
    <div style="font-size:.82rem;font-weight:500;margin-bottom:10px">Recent Transactions</div>
    <div class="tx-list">
      ${txs.length ? txs.map(t => `
        <div class="tx-item">
          <div class="tx-icon ${t.type==='credit'?'save':'spend'}">${t.type==='credit'?'⬆️':'⬇️'}</div>
          <div class="tx-info">
            <div class="tx-name">${t.desc||t.type}</div>
            <div class="tx-sub">${t.date}</div>
          </div>
          <div class="tx-amt ${t.type==='credit'?'credit':'debit'}">${t.type==='credit'?'+':'-'}${fmt(t.amount)}</div>
        </div>`).join('') : `<div class="text-muted" style="text-align:center;padding:20px">No transactions yet.</div>`}
    </div>
  `;
  openModal('addModal');
}

// ===================== START =====================
init();
</script>
</body>
</html>
